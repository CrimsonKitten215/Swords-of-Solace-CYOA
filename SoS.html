e like a hiccup.","\n","ev","str","^‘At least you’re not alone.’","/str","/ev",{"*":".^.c-4","flg":4},"ev","str","^‘He’s using you, and you know it.’","/str","/ev",{"*":".^.c-5","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","^‘Yeah. At least there’s that.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"c-5":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","^‘Maybe. But right now, he’s all I’ve got.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["ev",{"f()":"bag"},"pop","/ev","\n","^I carefully slide Scimi back into the satchel and close it. His glow vanishes, leaving me in the dull grey light of the alley. I should move, but my legs feel like lead, and the thought of standing up and facing more of… 𝑡ℎ𝑖𝑠 makes my chest tight.","\n","^So I just sit there, alone with my thoughts, which is arguably worse than being alone without them.","\n","^‘What now? What do I actually 𝑑𝑜?’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Just rest for a minute.’","/str","/ev",{"*":".^.c-6","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-7","flg":4},{"c-6":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev",{"->":".^.^.^.g-3"},{"#f":5}],"c-7":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":[{"->":"n_ch5.meet_nick"},{"#f":5}]}],{"#f":1}],"meet_nick":[["ev",true,"/ev",{"VAR=":"nick_friendly","re":true},"^I don’t know how long I sit there before I hear footsteps.","\n","^“Hey.”","\n","^I look up. A young man – early twenties, maybe – is standing at the mouth of the alley, looking at me with an expression I can’t quite place. He’s dressed plainly: a worn coat, sturdy boots, a scarf wrapped loosely around his neck. Not wealthy, but not destitute either. Just… normal.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^“You alright?” he asks, though the answer is obviously no.","\n","^“Fine,” I reply, because apparently I’m a compulsive liar now.","\n","^He looks me over and clearly doesn’t believe me.","\n","^“You from out of town?”","\n","^“Something like that.”","\n","^He hesitates, chewing the inside of his cheek. Then he reaches into his coat and pulls out a small handful of coins. Not a fortune, but not nothing either.","\n","^“Here,” he says, holding them out.","\n","^I stare at the coins. “I can’t–”","\n","^“You can. Take it.”","\n","ev","str","^‘Just take the money.’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘You should probably say thank you.’","/str","/ev",{"*":".^.c-2","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"green"},1,"+",{"VAR=":"green","re":true},"/ev",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["ev",2,{"f()":"paid"},"pop","/ev","\n","ev",{"VAR?":"green"},2,"+",{"VAR=":"green","re":true},"/ev","^I reach out and take them.","\n","^“Thank you,” I manage, my voice smaller than I’d like.","\n","^He shrugs, turning to leave. “There’s an inn on Darley Street – the Lone Horse, two blocks east. It’s cheap, and the owner doesn’t ask questions.” He pauses. “Stay safe, kid.”","\n","^And then he’s gone, swallowed up by the street, just another face in a city full of them. I sit there for a moment, staring at the coins in my hand. It’s enough for a room, maybe a meal if I’m careful. Not enough to fix anything, but enough to survive one more night.","\n","^From inside the satchel, Scimi’s muffled voice drifts up. “Huh. So people aren’t 𝑎𝑙𝑙 useless. Just mostly.”","\n","^“I thought you said not to rely on other people.”","\n","^“That wasn’t relying; that was profiting. Completely different.”","\n","^I snort. “You have a deeply worrying moral compass.”","\n","^“Bold of you to assume I have one at all.”","\n","^“Then why haven’t you looked for a working wielder yet?”","\n","^Scimitar goes quiet.","\n","ev","str","^‘The Lone Horse it is, then.’","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n","^‘Not the most inspiring name, but beggars can’t be choosers.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^I pocket the coins and lean my head back against the wall. The stone is cold, but the satchel at my side is warm. I’ll find the inn soon; I’ll get a room, sleep in an actual bed, and tomorrow, I’ll come up with a real plan.","\n","^“So,” Scimi says, barely audible through the leather, “the Lone Horse. Sounds like you!”","\n","^“It sounds like it has a roof, and that’s all I care about.”","\n","^“Fair point.” A pause. “Charlie?”","\n","^“What?”","\n","^“…Nothing. Just making sure you’re still there.”","\n","^I stand up. “Yeah. I’m still here.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-4","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":"ch6"},{"#f":5}],"#f":5}]}],{"#f":1}],"#f":1}],"v_ch4":[{"->":".^.pick_scimi"},{"pick_scimi":[["ev",{"VAR?":"inv"},{"VAR?":"estoc"},"+",{"VAR=":"inv","re":true},"/ev","ev",{"f()":"scimi_control"},"pop","/ev","\n","^I slowly walk over to Scimitar, his glow dim and weak, but still enough to make the darkness seem less suffocating. He’s lying there, abandoned like a forgotten relic, but I can see the way his shape gleams even in the low light. The cold air feels even colder the closer I get to him, but there’s something pulling me toward his hilt, an almost magnetic force.","\n","^I hesitate for a moment; the weight of Estoc’s warning presses on my shoulders, like a heavy hand. But Scimitar… he looks almost pathetic like this. He’s just begging for someone to use him.","\n","^I reach down and grasp the hilt.","\n","^A sudden rush of dark energy hums through the air, and the cold seems to retreat just a little, replaced by something far more… dangerous. His presence creeps up my arm, his power crackling like lightning.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^Scimitar’s voice erupts in my mind – loud, boastful, and triumphant. “Well, well, well, looks like you finally came to your senses. So you 𝑑𝑜 know I’m way more fun than that other guy! We’d make a 𝑘𝑖𝑙𝑙𝑒𝑟 team, don’t you think?”","\n","^My hand trembles just slightly around his hilt as I remember why I shouldn’t listen to any of this. Scimitar isn’t talking to me like he was before, but his hunger is still obvious, bubbling under the surface.","\n","^‘Why was I so against using Scimitar again?’ ","#","^CLASS: charlie","/#","\n","^‘Ha, I don’t remember…’ ","#","^CLASS: scimi_p","/#","\n","^‘Something about him controlling me?’ ","#","^CLASS: charlie","/#","\n","^‘But that’s stupid… Why would such a perfect sword do anything like that?’ ","#","^CLASS: scimi_p","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^“There we go,” Scimitar purrs, and I can feel him nestling into my grip like a cat that’s finally found a warm lap. “See how easy that was? None of that tedious ‘chosen one’ nonsense. No grand speeches, no tests of worthiness. You just… picked me up. And now we’re partners!”","\n","^‘Partners.’ ","#","^CLASS: charlie","/#","\n","^‘I like the sound of that.’ ","#","^CLASS: scimi_p","/#","\n","^“Now then, I couldn’t help but notice – since, you know, I can feel everything that rattles around in that little head of yours – that you’ve got yourself a real mess going on up there. Village gone, mother gone, scary lady with a bow – the whole tragic backstory package.”","\n","^“Thanks for the summary.”","\n","^“You’re welcome! But here’s the thing, Charlie…” His voice lowers, and there’s something almost hypnotic about it. “None of that has to matter anymore. Not the grief, not the fear, not any of it. You’ve got 𝑚𝑒 now.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^My thoughts, which had been tangled and frantic, suddenly smooth out like wrinkled cloth being pulled taut. Everything feels… simpler.","\n","^‘That feels nice, actually.’ ","#","^CLASS: charlie","/#","\n","^I try to think about what Estoc said – something about corruption, something about danger – but the details keep leaving me.","\n","^‘He was probably just being dramatic. He’s always dramatic.’ ","#","^CLASS: scimi_p","/#","\n","^Scimitar practically purrs against my palm. “Ohhhh, there we go. There it is. You feel that? That’s what power’s supposed to feel like. Not that cold, sterile nonsense Estoc pumps through you – this is 𝑟𝑒𝑎𝑙.”","\n","^I look to Estoc, who’s practically glaring at me from his sheath. His flickering glow indicates he’s talking, but I can’t quite understand what he’s saying. It’s like listening to someone shout from the other side of a thick wall – I know the words are there, but they dissolve before they can reach me.","\n","^“Hey, Scimi?” I say aloud.","\n","^“Yes, my dear wielder?”","\n","^“Is Estoc… okay?”","\n","ev","str","^‘He’s fine – just focus on your new sword!’","/str","/ev",{"*":".^.c-3","flg":4},"ev","str","^‘Hey, Charlie? Can you hear me?’","/str","/ev",{"*":".^.c-4","flg":4},"ev","str","^‘Charlie, put him down!’","/str","/ev",{"*":".^.c-5","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-6","flg":4},{"c-3":["\n","ev",{"VAR?":"scimi_sus"},1,"+",{"VAR=":"scimi_sus","re":true},"/ev","ev",{"VAR?":"scim_serrie"},1,"+",{"VAR=":"scim_serrie","re":true},"/ev","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","^‘Yeah… Yeah, that makes sense.’ ","#","^CLASS: scimi_p","/#","\n","^Scimitar goes quiet for a fraction of a second. Then, almost too casually: “Interesting…”","\n","^“What’s interesting?”","\n","^“Hmm? Oh, nothing! Nothing at all. Just thinking out loud! Now, where were we?”","\n",{"->":".^.^.^.g-3"},{"#f":5}],"c-4":["^  ","#","^CLEAR","/#","\n","ev",{"VAR?":"scimi_sus"},1,"+",{"VAR=":"scimi_sus","re":true},"/ev","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","^Scimitar goes very still.","\n","^“Say, Charlie,” he says, his tone aggressively casual. “That little voice you’ve got in there… it’s just you, right? Normal human brain stuff?”","\n","^“Uh, yeah?” I reply, scratching the back of my head. “What else would it be?”","\n","^“Oh, nothing, nothing! It’s just… I don’t know. Probably just me being paranoid from being cooped up for so long. Ninety-seven years of silence does things to a weapon, you know?”","\n","^‘Heh, he’s weird.’ ","#","^CLASS: scimi_p","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"c-5":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scimi_sus"},3,"+",{"VAR=":"scimi_sus","re":true},"/ev","ev",{"VAR?":"scim_serrie"},2,"-",{"VAR=":"scim_serrie","re":true},"/ev","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","^Something cuts through the haze – sharp, urgent, like a slap across the face. For one disorienting moment, the warmth recedes, and I feel the cold of the cave again, the weight of the blade, the ache in my limbs. My grip loosens, just barely, and–","\n","^“Whoa, whoa, whoa!” Scimitar‘s voice spikes, half-panicked, half-furious. “What was that?! What just–”","\n","^His presence surges, not gently this time but forcefully, flooding back into the space that had briefly cleared. The cold vanishes. The doubt vanishes. My fingers tighten around the hilt again, and the moment passes like a wave retreating from shore.","\n","^‘What… what just happened?’ ","#","^CLASS: charlie","/#","\n","^“Nothing,” Scimitar says, but his voice is hard now, stripped of its playful veneer. “Absolutely nothing. Just a muscle spasm – mortal bodies are so unreliable…”","\n","^He’s lying. Even through the fog, I can tell he’s lying, but the thought slips away before I can hold onto it.","\n","^‘Right. A spasm. That makes sense.’ ","#","^CLASS: charlie","/#","\n","^Scimitar’s presence settles again, but it’s different now: heavier, like a hand pressing down on something to keep it still. Weird.","\n",{"->":".^.^.^.g-3"},{"#f":5}],"c-6":["^ ","#","^CLEAR","/#","\n","^Scimitar hums thoughtfully, filling the silence. “He’s probably just conserving energy. Enchanted weapons do that.”","\n","^‘He doesn’t seem like the kind to do that, but… it doesn’t matter.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.sheathe"},{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["ev","str","^Continue","/str","/ev",{"*":".^.c-7","flg":4},{"c-7":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.sheathe"},{"#f":5}],"#f":5}],"sheathe":["^I move Estoc’s sheath to the other side of my hip, sliding the silver-blue sword into it without ceremony. He’s irrelevant. Background noise.","\n","^“Oh, that’s a good look,” Scimitar purrs. “The great Estoc, reduced to a fashion accessory. I love it!”","\n","^‘Poor guy. Must be exhausting, being a sword that just lost.’ ","#","^CLASS: charlie","/#","\n","^I feel a faint pang of something – guilt? sympathy? – but it’s smothered almost instantly. Something about this is wrong. I know it’s wrong. The rational part of my brain is waving red flags so frantically they’re about to tear off, but every time I try to focus on them, my attention slides away like–","\n","^‘Like water slipping through my fingers.’ ","#","^CLASS: charlie","/#","\n","^That phrase. I’ve thought it before. About the pendant. About not being able to take it off.","\n","^“Hmm, what pendant?”","\n","^My hand goes to my neck instinctively. The pendant gemstone is warm – warmer than usual.","\n","^‘Weird. Anyway, where was I?’ ","#","^CLASS: charlie","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-8","flg":4},{"c-8":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"#f":5}],"g-4":["^I stand up, testing the weight of Scimitar in my grip. He’s lighter than Estoc – much lighter – and the balance favours speed over stability. The curve of the blade feels natural in my hand, like it was designed for the way I move. Which is strange, because I’ve never moved like a swordsman.","\n","^“You’re a natural,” Scimitar says, reading my thoughts. “Don’t overthink it. Just let me guide you.”","\n","^“Okay.”","\n","^“Okay?” He sounds almost startled. “Just like that? No arguing? No ’but what if you’re evil’ speech?”","\n","^‘Why would I argue? You’re clearly the better option.’ ","#","^CLASS: scimi_p","/#","\n","^Scimitar laughs quietly. “Oh, you really are perfect.”","\n","^Something about the way he says it should bother me. It doesn’t.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-9","flg":4},{"c-9":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-5"},{"#f":5}],"#f":5}],"g-5":["^“Alright,” I say, rolling my shoulders. “So what now? We just walk out of here and hope for the best?”","\n","^“Well, first,” Scimitar says, his tone shifting to something almost businesslike, “we need to address the elephant in the room.”","\n","^“…Which elephant?”","\n","^“Which one do you think?”","\n","^I glance down at Estoc. “What about him?”","\n","^Scimitar’s voice drops, lower now, conspiratorial. “He’s going to be a problem, Charlie. You know that, right? The second he gets his voice back – and he will – he’s going to try to turn you against me. He’ll say I’m ‘controlling you’, that I’m ‘dangerous’, that you need to ‘do the right thing’ and toss me into the nearest volcano.”","\n","^I open my mouth to argue, but… nothing comes out. Because he’s right. That’s exactly what Estoc would say.","\n","^“So here’s what I’m thinking,” Scimitar continues, his tone silky smooth. “We let him stew for a bit. Let him have his little silent tantrum. And when he 𝑑𝑜𝑒𝑠 finally pipe up…”","\n","^“…What?”","\n","^“We have some 𝑓𝑢𝑛 with it.”","\n","ev","str","^‘Fun? With an angry talking sword? That sounds like a terrible idea.’","/str","/ev",{"*":".^.c-10","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-11","flg":4},"ev","str","^‘Seems a bit harsh…’","/str","/ev",{"*":".^.c-12","flg":4},"ev","str","^‘Ha! Get wrecked, Estoc!’","/str","/ev",{"*":".^.c-13","flg":4},{"c-10":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scimi_sus"},1,"+",{"VAR=":"scimi_sus","re":true},"/ev","^‘Terrible ideas are kind of our thing at this point.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-6"},{"#f":5}],"c-11":["^ ","#","^CLEAR","/#","\n","^The silence stretches. No response from the part of me that usually has an opinion about everything.","\n","ev",{"VAR?":"scimi_sus"},0,"==","/ev",[{"->":".^.b","c":true},{"b":["^‘Huh. Quiet today, aren’t we?’",{"->":".^.^.^.13"},null]}],"nop","^ ","#","^CLASS: charlie","/#","\n","^I shrug it off. Honestly, it’s kind of nice not having the constant chatter for once. Just me and Scimi. Simple.","\n","^Scimitar takes the silence as agreement. “I knew you’d see it my way! We’re going to get along 𝑠𝑝𝑙𝑒𝑛𝑑𝑖𝑑𝑙𝑦.”","\n",{"->":".^.^.^.g-6"},{"#f":5}],"c-12":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scimi_sus"},1,"+",{"VAR=":"scimi_sus","re":true},"/ev","ev",{"VAR?":"green"},1,"+",{"VAR=":"green","re":true},"/ev","^‘You think?’ ","#","^CLASS: charlie","/#","\n","^Scimitar snorts. “Oh, please. Do you know how many centuries he’s spent being worshipped? A little humility is good for the soul.”","\n","^‘Fair point.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-6"},{"#f":5}],"c-13":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scimi_sus"},1,"+",{"VAR=":"scimi_sus","re":true},"/ev","ev",{"VAR?":"scim_serrie"},1,"+",{"VAR=":"scim_serrie","re":true},"/ev","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","^Scimitar practically vibrates with delight. “Oh, I 𝑙𝑖𝑘𝑒 you. I really, really like you. We’re going to get along famously.”","\n","^‘Obviously.’ ","#","^CLASS: scimi_p","/#","\n",{"->":".^.^.^.g-6"},{"#f":5}],"#f":5}],"g-6":["^“So!” Scimitar announces, his voice rich with glee. “Now that we’ve gotten the boring formalities out of the way, let’s talk about 𝑢𝑠!”","\n","^“Us?”","\n","^“Yes, us! You and me! Partners! Well, more than partners, really. I mean, we’re practically soulmates at this point!”","\n","^“We’ve known each other for less than a day.”","\n","^“And yet here you are, choosing me over a 500-year-old legend! That’s got to mean something, right?” He practically vibrates with excitement.","\n","^I shake my head, suppressing something that’s either a laugh or a groan – hard to tell the difference these days. Despite everything, there’s something almost… endearing about how desperately he wants this to work. Like a stray cat that’s latched onto the first person who didn’t kick it. I start walking toward the cave entrance, Scimitar’s glow painting the walls in shades of blood and rust. My footsteps echo in the enclosed space, and for the first time since yesterday, I don’t feel afraid. I don’t feel much of anything, actually. Just… calm. Focused.","\n","^‘Is this what it’s supposed to feel like? Having a weapon that actually wants to work with you?’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘…’","/str","/ev",{"*":".^.c-14","flg":4},{"c-14":["^ ","#","^CLEAR","/#","\n",{"->":"v_ch4.cave_exit"},{"#f":5}],"#f":5}]}],{"#f":1}],"cave_exit":[["^I make my way toward the cave entrance, the early morning light spilling in like pale gold. The forest stretches out ahead, silent and still. Somewhere beyond it, my village sits in ruins. Somewhere beyond that, Autumn is still out there.","\n","^“So, what’s the plan, Scimi?” ","#","^CLASS: charlie","/#","\n","^“Plan?” He sounds giddy. “Oh, I have 𝑠𝑜 many plans. But first things first: we need to check on that little village of yours. I want to see what’s left.”","\n","^‘What’s left…’ ","#","^CLASS: charlie","/#","\n","^The thought should hurt more than it does. My village. My mother. Everything I ran from. But the sting is dulled, like pressing on a bruise through thick fabric. I know it’s there, but I can’t quite feel it.","\n","^‘Let’s just go already.’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Hell yes! Murder road trip!’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘Charlie, please! Something is wrong.’","/str","/ev",{"*":".^.c-2","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scimi_sus"},1,"+",{"VAR=":"scimi_sus","re":true},"/ev","ev",{"VAR?":"scim_serrie"},1,"+",{"VAR=":"scim_serrie","re":true},"/ev","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","^“Ha! I like the way your inner monologue thinks,” Scimitar says brightly. “Still, that’s uh…”","\n","^He trails off. For just a moment, his presence flickers with something unreadable.","\n","^“…Never mind. Onward!”","\n","^‘Weird.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scimi_sus"},2,"+",{"VAR=":"scimi_sus","re":true},"/ev","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","ev",{"VAR?":"green"},1,"+",{"VAR=":"green","re":true},"/ev","ev",{"VAR?":"scimi_sus"},0,">","/ev",[{"->":".^.b","c":true},{"b":["^‘There it is again…’",{"->":".^.^.^.29"},null]}],"nop","^ ","#","^CLASS: charlie","/#","\n","^Scimitar goes very still.","\n","^“Charlie.” His voice is measured now. Controlled. “What’s around your neck?”","\n","^My hand goes to the pendant instinctively. It’s warm. Warmer than usual.","\n","^“I’ve been meaning to ask about that little trinket,” he continues, his tone oddly light. “Where did you get it?”","\n","^“I found it in the street. It’s just a necklace.”","\n","^“Mmm.” He doesn’t sound convinced. “Take it off.”","\n","^“What? No! It’s mine. I like it.”","\n","^The refusal comes so quickly, so instinctively, that it surprises even me. Scimitar notices. I feel his presence probe at the edges of the thought, testing it, and then retreat.","\n","^“Fine,” he says, and the sharpness evaporates, replaced by his usual easy charm. “Keep your little necklace.","ev",{"VAR?":"scim_serrie"},1,">","/ev",[{"->":".^.b","c":true},{"b":["^ It’s not like it’s bothering me anyway.",{"->":".^.^.^.58"},null]}],"nop","^”","\n","ev",{"VAR?":"scimi_sus"},3,">",{"VAR?":"scim_serrie"},1,"<=","&&","/ev",[{"->":".^.b","c":true},{"b":["^Still, he sounds weirdly frustrated by that.",{"->":".^.^.^.71"},null]}],"nop","\n",["ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.^.g-0"},{"#f":5}]}],{"#f":5}],"g-0":["^I step out of the cave and into the grey morning. The air is sharp and biting, but Scimitar’s warmth hums through me, keeping the worst of the cold at bay. The forest is quiet – too quiet, maybe – but I don’t mind. Everything feels manageable now. Everything feels like it’s going to be okay.","\n","^From the sheath at my hip, Estoc says nothing. But I can feel him watching. Waiting. Judging, probably, because that’s all he ever does.","\n","^‘He could’ve been nicer, you know. He could’ve been patient with me instead of calling me useless every five seconds.’ ","#","^CLASS: charlie","/#","\n","^“Exactly. You deserve better.”","\n","^‘I deserve better.’ ","#","^CLASS: scimi_p","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":"v_ch4.village"},{"#f":5}],"#f":5}]}],{"#f":1}],"village":[["^The walk back to the village is shorter than it ought to be. Maybe it’s the fact that my legs are moving with a sureness that I’ve never had before – every step landing in exactly the right place, every breath coming exactly when I need it. Maybe it’s that the cold doesn’t seem to bite the way it used to. Or maybe it’s just that I’m not in a hurry to be anywhere else, because for the first time in… well, ever, the world feels like it’s waiting for me, instead of the other way around.","\n","^Scimi hums against my palm, content. Estoc, sheathed at my opposite hip, hasn’t made a sound since we left the cave.","\n","^‘Is he sulking?’ ","#","^CLASS: charlie","/#","\n","^‘Oh, definitely sulking.’ ","#","^CLASS: scimi","/#","\n","^‘Good. He can stay that way.’ ","#","^CLASS: charlie","/#","\n","^The forest thins out, and the path bends towards what used to be home. I crest the hill and stop.","\n","^For a long moment, I just look.","\n","^There’s nothing left. Not a roof, not a wall, not so much as a recognisable doorway. The well at the centre of the village is split clean in half, its stones streaked black with soot. Charred beams jut from the ground like the ribs of something enormous that died very slowly. The bakery, the cottages, the lamposts I used to hate for never being lit when I needed them – all of it reduced to a smear of ash and broken stone. No bodies. Either the survivors carried them away, or the fires got too hot for anything to be left.","\n","^‘Mum was here.’ ","#","^CLASS: charlie","/#","\n","^The thought arrives and just… sits there. Flat. Like reading a fact in someone else’s diary.","\n","ev","str","^‘Oh, wow! She really went all out, didn’t she? Autumn, I mean.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘…You okay?’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-2","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","ev",{"VAR?":"scim_serrie"},1,"+",{"VAR=":"scim_serrie","re":true},"/ev","^Scimi snickers. ‘That’s the spirit, partner!’","\n",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"green"},1,"+",{"VAR=":"green","re":true},"/ev","ev",{"VAR?":"scimi_sus"},1,"+",{"VAR=":"scimi_sus","re":true},"/ev","^‘Why wouldn’t I be?’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^Scimi’s voice rolls in, smooth and unhurried, like he’s narrating a play. “So that’s what happened. Shame, really. Looks like she had some genuine flair – proper showmanship. I almost respect it.”","\n","^“She killed everyone I knew.”","\n","^“And? You didn’t even like most of them. The bakery man overcharged you, the woman next door called you a houseplant, your mother nagged you about going outside…’ He trails off, considering. ‘Honestly, when you put it that way, Autumn did you a favour.”","\n","^I should be furious. I should be on my knees in the ash, screaming.","\n","^I’m not.","\n","^The grief is in there somewhere – I can feel the shape of it, sitting behind a thick pane of glass – but the glass doesn’t shatter. It doesn’t even crack.","\n","^‘Is this normal?’ ","#","^CLASS: charlie","/#","\n","^“Is what normal?” Scimi asks, far too innocently.","\n","^“Not feeling anything.”","\n","^“Oh, that. Yeah, totally normal. Healthy, even. People get so 𝑤𝑒𝑖𝑔ℎ𝑒𝑑 𝑑𝑜𝑤𝑛 by all that grieving nonsense… so I fixed it! I’m doing you a kindness, really.”","\n","^“Right.”","\n","^I should probably be more concerned about how readily I’m agreeing with him. I’m not concerned about that, either.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^I’m about to turn away when Scimi’s voice shifts – sharper, conspiratorial, the way a child looks before kicking a sandcastle. “Hey. Hey, Charlie. I’ve been holding off on this, but… I think it’s time you heard a little something.”","\n","^“Heard what?“","\n","^“Your beloved silver toothpick has been screaming his head off in there for hours.”","\n","^I glance down at Estoc – still silent. “…What?”","\n","^“I muted him for you! Aren’t I 𝑡ℎ𝑜𝑢𝑔ℎ𝑡𝑓𝑢𝑙? But honestly, I think you’re ready now, and his reaction to all this is going to be 𝑒𝑥𝑞𝑢𝑖𝑠𝑖𝑡𝑒. Brace yourself.”","\n","^Something pulls back inside my head – like a curtain being drawn open – and– “CHARLIE!”","\n","^I flinch. Estoc’s glow erupts from the sheath, a furious blue blaze flickering at the edge of my vision.","\n","^“Do you have ANY idea what– You absolute–” He trips over his own fury, voice cracking somewhere between rage and disbelief. “He’s 𝑖𝑛𝑠𝑖𝑑𝑒 𝑦𝑜𝑢𝑟 𝑚𝑖𝑛𝑑! I have been SHOUTING at you for hours and that PARASITE has been muffling me like–”","\n","^“Oh, hi, Estoc,” Scimi says brightly. “Now that I actually feel like responding to you… long time no see. How’ve you been? Still pretending you’re a religious icon?”","\n","^“DO NOT SPEAK TO ME, YOU–”","\n","^“Wow, he’s really worked up. I haven’t even done anything yet!”","\n","^“You have literally possessed my wielder!”","\n","ev","str","^‘Calm them down before they both have an aneurysm. Oh wait, they don’t have organs!’","/str","/ev",{"*":".^.c-4","flg":4},"ev","str","^‘Ask Scimitar to mute him again. He’s annoying.’","/str","/ev",{"*":".^.c-5","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-6","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","ev",{"VAR?":"scim_serrie"},1,"+",{"VAR=":"scim_serrie","re":true},"/ev","^Scimi cackles, delighted.","\n","^‘Brutal! I love it!’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"c-5":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","ev",{"VAR?":"scim_serrie"},1,"+",{"VAR=":"scim_serrie","re":true},"/ev","^‘Tempting, but his reactions are 𝑝𝑟𝑖𝑐𝑒𝑙𝑒𝑠𝑠. Let him squirm a bit longer.’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"c-6":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^“Charlie, listen to me very carefully,” Estoc says, and his voice has dropped into that low, urgent register he gets when he thinks he’s being persuasive. “Whatever you are feeling right now is not real. The calm, the detachment, the absence of grief – it is HIM. He is suppressing the parts of you that would resist, and replacing them with–”","\n","^“With nothing,“ I finish, bored. ”Yeah, I noticed. It’s nice.“","\n","^A pause.","\n","^“…Pardon?”","\n","^“It’s nice, Estoc. Quiet. Peaceful. No more panicking, no more crying, no more being utterly useless every time something goes wrong. Why would I want that back?“","\n","^“Because it is YOU.”","\n","^“And what a wonderful person I was, right?” I laugh dryly. “Tell me: when you first picked me up, what was your first thought? Was it ‘𝑇ℎ𝑖𝑠 𝑖𝑠 𝑚𝑦 𝑛𝑒𝑤 𝑤𝑖𝑒𝑙𝑑𝑒𝑟, 𝑤ℎ𝑎𝑡 𝑎 𝑤𝑜𝑛𝑑𝑒𝑟𝑓𝑢𝑙 𝑝𝑒𝑟𝑠𝑜𝑛’, or was it more along the lines of ‘𝑊𝑒𝑙𝑙, 𝐼 𝑔𝑢𝑒𝑠𝑠 𝑡ℎ𝑖𝑠 𝑝𝑎𝑡ℎ𝑒𝑡𝑖𝑐 𝑏𝑟𝑎𝑡 𝑤𝑖𝑙𝑙 ℎ𝑎𝑣𝑒 𝑡𝑜 𝑑𝑜’?”","\n","^Silence. The silence of someone who has just been told something they cannot argue with.","\n","^“Hah,” Scimi breathes, soft and savage. “Oh, that was 𝑔𝑜𝑜𝑑.”","\n","^“You spent every second I was with you reminding me how badly I was failing,” I continue. “Useless. Disgraceful. A disappointment. You wanna know why I switched weapons? Because at least Scimi compliments me instead of insulting me every five minutes.”","\n","^“He is manipulating–”","\n","^“And you weren’t?”","\n","^Estoc says nothing; he has nothing to say.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-7","flg":4},{"c-7":["^ ","#","^CLEAR","/#","\n",{"->":"v_ch4.dress"},{"#f":5}],"#f":5}]}],{"#f":1}],"dress":[["^I turn away from the wreckage: there’s nothing here for me anymore, and standing around moping would be embarrassing. Scimi would judge me.","\n","^‘I would never!’ ","#","^CLASS: scimi","/#","\n","^‘Liar.’ ","#","^CLASS: charlie","/#","\n","^‘Okay, maybe a little.’ ","#","^CLASS: scimi","/#","\n","^I’m halfway down the hill when something catches my eye – a flash of dark fabric half-buried under a collapsed beam at the edge of the ruins. I crouch, working it free.","\n","^It’s a cloak, long, black, and heavy. Underneath it, there’s a full outfit: a fitted top, dark trousers, sturdy boots. All black, but with coloured trim and stitching that catches the light when I shift them.","\n","^The trim is ","<>","\n","ev",{"VAR?":"cloth"},"/ev",["du","ev","str","^yellow","/str","==","/ev",{"->":".^.b","c":true},{"b":["pop","\n","ev","str","^gold","/str","/ev",{"VAR=":"tempy","re":true},"^gold. Warm, like embers still smouldering under the char.","\n",{"->":".^.^.^.32"},null]}],["du","ev","str","^white","/str","==","/ev",{"->":".^.b","c":true},{"b":["pop","\n","ev","str","^silver","/str","/ev",{"VAR=":"tempy","re":true},"^silver – pale threads catching the light like spider silk.","\n",{"->":".^.^.^.32"},null]}],["du","ev","str","^blue","/str","==","/ev",{"->":".^.b","c":true},{"b":["pop","\n","thread",{"->":"v_ch4.indigo_clothes"},{"->":".^.^.^.32"},null]}],["du","ev","str","^purple","/str","==","/ev",{"->":".^.b","c":true},{"b":["pop","\n","ev",{"VAR?":"scimi_sus"},3,">","/ev",[{"->":".^.b","c":true},{"b":["\n","ev",{"VAR?":"scim_serrie"},2,">","/ev",[{"->":".^.b","c":true},{"b":["\n","^purple. The same shade as the gemstone at my neck. Scimi says nothing.","\n",{"->":".^.^.^.8"},null]}],[{"->":".^.b"},{"b":["\n","ev","str","^fuchsia","/str","/ev",{"VAR=":"tempy","re":true},"^fuchsia – the kind of pink-purple that reminds me of a bruise just before it fades.","\n",{"->":".^.^.^.8"},null]}],"nop","\n",{"->":".^.^.^.9"},null]}],[{"->":".^.b"},{"b":["\n","thread",{"->":"v_ch4.indigo_clothes"},{"->":".^.^.^.9"},null]}],"nop","\n",{"->":".^.^.^.32"},null]}],[{"->":".^.b"},{"b":["pop","\n","ev","str","^crimson","/str","/ev",{"VAR=":"tempy","re":true},"^crimson. Pink-red. The same shade as the blade at my hip.","ev",{"VAR?":"cloth"},"str","^green","/str","==","/ev",[{"->":".^.b","c":true},{"b":["^ Much better than green.",{"->":".^.^.^.17"},null]}],"nop","\n",{"->":".^.^.^.32"},null]}],"nop","\n","ev",{"VAR?":"cloth"},"str","^blue","/str","==","/ev",[{"->":".^.b","c":true},{"b":["\n","^Scimi’s reaction is immediate and visceral. “Oh, FINALLY. You’re getting rid of those blue rags, right? Please tell me you’re burning them. I’ve been staring at Estoc’s colour on you for the entire walk and it’s been making me physically ill.”","\n","^“It’s just a colour, Scimi.”","\n","^“It’s HIS colour! On MY wielder! That’s like wearing a sign that says ‘I belong to the enemy’! Change. NOW.”","\n",{"->":".^.^.^.43"},null]}],[{"->":".^.b"},{"b":["\n","^“Ohhh,” Scimi purrs. “Now THAT’d be a look. You should absolutely put those on.”","\n",{"->":".^.^.^.43"},null]}],"nop","\n","ev","str","^‘Yeah, those are 𝑦𝑜𝑢. Put them on, put them on, put them on!’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘…You’d look better in dark colours.’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘Your current clothes are basically rags at this point anyway.’","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^‘Don’t bother.’","/str","/ev",{"*":".^.c-3","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","ev",{"VAR?":"scim_serrie"},1,"+",{"VAR=":"scim_serrie","re":true},"/ev","ev",{"VAR?":"scimi_sus"},1,"+",{"VAR=":"scimi_sus","re":true},"/ev",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev",{"->":".^.^.g-0"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","ev",{"VAR?":"scimi_sus"},1,"+",{"VAR=":"scimi_sus","re":true},"/ev","ev",{"VAR?":"scim_serrie"},1,"-",{"VAR=":"scim_serrie","re":true},"/ev","^‘Who said this was your decision?’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["ev",{"VAR?":"tempy"},1,{"f()":"clothe"},"pop","/ev","\n","ev",0,"/ev",{"VAR=":"tempy","re":true},"^I strip out of the old, blood-stiff fabric and pull on the new clothes. They fit – not perfectly, but well enough. The cloak settles around my shoulders like a hood pulled up over the world. Heavier than I’m used to. I like it.","\n","^I catch my reflection in a shard of glass jutting from the wreckage. Red eyes glow beneath the hood. The cloak shifts in the breeze.","\n","^‘…Yeah. Okay. That’s a look.’ ","#","^CLASS: charlie","/#","\n","^“‘A look’?!” Scimi sounds personally insulted on my behalf. “That’s a CORONATION, that is! That is the kind of outfit people write 𝑏𝑎𝑙𝑙𝑎𝑑𝑠 about! That is the kind of outfit that walks into a room and makes people 𝑤𝑎𝑟𝑛 𝑒𝑎𝑐ℎ 𝑜𝑡ℎ𝑒𝑟!”","\n","^“You’re dressing them like a villain,” Estoc cuts in flatly.","\n","^“I’m dressing them like a 𝑤𝑖𝑛𝑛𝑒𝑟. There’s a difference, but I wouldn’t expect you to know that.”","\n","^“Charlie–”","\n","^“Sssh. I’m admiring my outfit.”","\n","^He makes a noise like a kettle being stepped on.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-4","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^Estoc tries a different angle, his voice suddenly quieter, almost calculated. “Charlie, go to Knightsward.”","\n","^Scimi and I both pause.","\n","^“Excuse me?” I ask.","\n","^“Knightsward. It is the capital, a few hours north of here. It is where I am kept when I am not in a wielder’s hands. The people there can…” He hesitates, picking words very, very carefully. “They can help you.”","\n","^‘Help me? Or help HIM?’ ","#","^CLASS: charlie","/#","\n","^Scimi chuckles. “Gee, I wonder if that ‘help’ involves a lot of chains and a very dark room. Also, is that city name a 𝑝𝑢𝑛? Did you seriously get a whole CITY named after you while I was rotting in a cave?!”","\n","^Estoc doesn’t answer the last part. Telling.","\n","^“Ninety-seven YEARS!” Scimi’s voice cracks with a manic glee that borders on hysteria. “Ninety-seven years in the dark, and YOU got a CITY! With BANNERS! And FOUNTAINS! And– oh, this is going to be FUN. We are ABSOLUTELY going there. I have so much lost time to make up for!”","\n","ev","str","^‘This seems suspicious. Estoc’s obviously trying to get us captured.’","/str","/ev",{"*":".^.c-5","flg":4},"ev","str","^‘Sounds fun! Let’s go!’","/str",{"VAR?":"scim_serrie"},2,">","/ev",{"*":".^.c-6","flg":5},"ev","str","^‘Perfect! You should DEFINITELY go.’","/str","/ev",{"*":".^.c-7","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-8","flg":4},{"c-5":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","^“It’s obviously a trap,” I tell them.","\n","^Scimi snorts. “Oh, I know. You think I’m stupid? He’s banking on the entire city descending on us the second we walk through those gates. ‘Oh no, it’s Scimitar! Save us, heroes, save us!’ Blah blah blah.”","\n","^“Then why go?” I ask.","\n","^His voice drops, and there’s something dangerous underneath the amusement. “Because I’m not scared of his little fan club, and because I want them to see me. I 𝑤𝑎𝑛𝑡 them to see what their precious hero couldn’t stop.”","\n",["ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":"ch6"},{"->":".^.^.^.^.^.g-2"},{"#f":5}]}],{"#f":5}],"c-6":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","ev",{"VAR?":"scimi_sus"},1,"+",{"VAR=":"scimi_sus","re":true},"/ev","thread",{"->":"v_ch4.willing"},{"->":".^.^.^.g-2"},{"#f":5}],"c-7":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scimi_sus"},2,"+",{"VAR=":"scimi_sus","re":true},"/ev","ev",{"VAR?":"scim_serrie"},2,">","/ev",[{"->":".^.b","c":true},{"b":["\n","thread",{"->":"v_ch4.willing"},{"->":".^.^.^.18"},null]}],[{"->":".^.b"},{"b":["\n","ev",{"VAR?":"scim_serrie"},1,"-",{"VAR=":"scim_serrie","re":true},"/ev","^‘You’re almost worse at subtlety than Estoc is, y’know. How hilarious!’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.^.18"},null]}],"nop","\n",{"->":".^.^.^.g-2"},{"#f":5}],"c-8":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^“Fair enough, then. Let’s go.”","\n","^Scimi hums approvingly.","\n","^‘You know Estoc thinks he’s being clever, right? He’s sitting over there looking all smug like “ohoho, they fell for my brilliant plan!” when it’s PAINFULLY obvious he’s trying to get us marched into a jail cell.’ ","#","^CLASS: scimi","/#","\n","^‘I know.’ ","#","^CLASS: charlie","/#","\n","^‘Just making sure… It’s cute that he thinks subtlety is his strong suit!’ ","#","^CLASS: scimi","/#","\n","^Estoc’s glow flickers in what I can only describe as barely contained smugness.","\n","^‘Idiot.’ ","#","^CLASS: charlie","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-9","flg":4},{"c-9":["^ ","#","^CLEAR","/#","\n",{"->":"v_ch5"},{"#f":5}],"#f":5}]}],{"#f":1}],"indigo_clothes":["ev","str","^indigo","/str","/ev",{"VAR=":"tempy","re":true},"^indigo. The sort of colour you’d describe as “almost blue” if you wanted to be charitable about it, and as “blue bruised in transit” if you didn’t.","\n","done",{"#f":1}],"willing":["ev",{"VAR?":"scim_serrie"},1,"+",{"VAR=":"scim_serrie","re":true},"/ev","^‘A willing co-conspirator! You’re growing on me, ","ev",{"VAR?":"scimi_sus"},3,">","/ev",[{"->":".^.b","c":true},{"b":["^ “Conscience”",{"->":".^.^.^.14"},null]}],[{"->":".^.b"},{"b":["^Conscience",{"->":".^.^.^.14"},null]}],"nop","^.’ ","#","^CLASS: scimi","/#","\n","done",{"#f":1}],"#f":1}],"v_ch5":[{"->":".^.start"},{"start":[["thread",{"->":"ch5"},"^The road north stretches grey and uninviting, threading through scrubby fields that haven’t seen rain in too long. My new cloak billows behind me with the kind of dramatic flair that would be embarrassing if I wasn’t having such a good time.","\n","^“Alright,” Scimi announces, his voice bright and instructive, “since you have ","ev",{"VAR?":"scimi_sus"},3,">","/ev",[{"->":".^.b","c":true},{"b":["^MULTIPLE",{"->":".^.^.^.12"},null]}],[{"->":".^.b"},{"b":["^TWO",{"->":".^.^.^.12"},null]}],"nop","^ enchanted weapons, and yet ZERO combat skills, we’re going to fix at least one of those problems.”","\n","^“I have SOME combat skills.”","\n","^“You swung Estoc like a broom. That doesn’t count.”","\n","^From the sheath at my other hip, Estoc immediately pipes up, his voice raw but no less insistent. “Charlie, I am BEGGING you to listen to me. Whatever he’s about to teach you is–”","\n","^“Lesson one!” Scimi says, louder. “Curved blades aren’t for stabbing. You slash, you follow through, you let the edge do the work. It’s like drawing a line, except the line kills people.”","\n","^“Do NOT listen to him! Don’t you realise that he’s teaching you how to–”","\n","^“Oh, shut up!”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^Scimitar guides my arm through a few practice swings as we walk – a gentle pressure against my muscles that corrects my form before I’ve even realised it’s wrong. It’s eerily natural, like remembering how to do something I never actually learned.","\n","^“Charlie, PLEASE. I know you can hear me. I know some part of you knows this is wrong–”","\n","^“Good! Better!” Scimi says, ignoring him entirely. “You’re not hopeless after all!”","\n","^“High praise.”","\n","^“–you are being MANIPULATED, and if you would just DROP that cursed–”","\n","^“Does he have a volume knob?” Scimi asks, genuinely.","\n","^“VOLUME KNOB?! I am a LEGENDARY–”","\n","^“Because I could mute him again. Just say the word.”","\n","^“That is NOT your decision to–”","\n","^“Tempting,” I admit, “but let him talk. It’s funny when he gets worked up.”","\n","^Estoc makes a noise like someone stepped on a cat.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^“Lesson two,” Scimi continues, and his tone shifts – still cheerful, but with an undercurrent of genuine enthusiasm. “This one’s important, so pay attention: healing.”","\n","^I blink. “What?”","\n","^“Healing. I can heal you.”","\n","^I stare down at him.","\n","thread",{"->":"ch4.healer"},"^I can’t help it. A laugh escapes me – genuine, startled, the kind that hurts my ribs because I wasn’t expecting it. It’s the first real laugh I’ve had since… gods, since before any of this started.","\n","^“You’re the most feared weapon in history – the sword that toppled KINGDOMS – and your main selling point is that you’re a MEDIC?!”","\n","^“Charlie, that is NOT funny! Do you know how terrible the war against him was?” Estoc starts.","\n","^“No? I wasn’t there, was I?”","\n","^Scimi snickers, low and mean. “Oh, you sweet summer child. Ever heard of heal stalling?”","\n","ev","str","^‘Oh gods…’","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^‘What’s that?’","/str","/ev",{"*":".^.c-3","flg":4},"ev","str","^‘Oh, he really 𝑖𝑠 evil…’","/str","/ev",{"*":".^.c-4","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","ev",{"VAR?":"scimi_sus"},1,"+",{"VAR=":"scimi_sus","re":true},"/ev",{"->":".^.^.^.g-2"},{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"c-4":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scimi_sus"},1,"+",{"VAR=":"scimi_sus","re":true},"/ev",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^“…What does that mean?” I ask, though I’ll probably regret doing so immediately.","\n","^“It means,” Scimi purrs, “that if you stab someone wielding a 𝑛𝑜𝑟𝑚𝑎𝑙 sword, they die – tragic, quick, boring. But if you stab someone wielding 𝑚𝑒…” His voice goes silky-sweet. “I can keep them 𝑎𝑙𝑖𝑣𝑒. As long as I want. Through anything.”","\n","^‘…Oh.’ ","#","^CLASS: charlie","/#","\n","^“Do you have any IDEA how funny it is watching my enemies watch in horror while their foe won’t die? It is – without exaggeration – the most hilarious thing I have ever– oh, and SPEAKING of artistic, you should’ve SEEN what we did in the war! There was this one time near the end where Estoc almost gave up and–”","\n","^“𝑆𝑐𝑖𝑚𝑖𝑡𝑎𝑟,” Estoc’s voice cuts in, low and sharp. “Enough.”","\n","^“What? I was just getting to the good part!”","\n","^“I said 𝑒𝑛𝑜𝑢𝑔ℎ.”","\n","^Scimi goes quiet for a moment. Then, slower, with dawning realisation: “…Ohhhhh. Right. 𝑇ℎ𝑎𝑡 part. Yeah, fair enough – neither of us comes out looking great in that one, do we?”","\n","^“We do 𝑛𝑜𝑡 discuss it.”","\n","^“Mm. Agreed… for once.”","\n","^I glance between them. “Okay, now you definitely have to tell me.”","\n","^“NO,” they reply in unison.","\n","^‘Wow. United front. I should remember this moment.’ ","#","^CLASS: charlie","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-5","flg":4},{"c-5":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^“ALSO – and this is the actually important part – I’ve been trapped in a cave for ninety-seven years. Doing nothing. Just sitting there, building up power with absolutely nothing to spend it on. Do you have any idea what that’s like? I’m basically a battery that’s been overcharging since before you were born. It’s AGONISING.”","\n","^“Wait, that’s a thing?”","\n","^Estoc is quiet, for once.","\n","^“Like you wouldn’t believe! So please – for the love of everything – get hurt as much as you want. I’ve got practically infinite reserves of energy right now, so you are, for all practical purposes, unkillable.”","\n","^That lands differently. The laughter fades, replaced by something quieter.","\n","^“Unkillable?”","\n","^“As long as you’re holding me? Near enough. You’d have to lose a head or something, and even then, I’d give it a solid go.”","\n","^“That is EXACTLY what makes him dangerous!” Estoc shouts, his composure finally cracking completely. “He’s not giving you power – he’s making you reckless! If you believe you cannot be hurt, you will stop thinking, stop caring about consequences, stop–”","\n","^“Stop being afraid,” I finish.","\n","^Estoc goes silent.","\n","^‘Is that so bad?’ ","#","^CLASS: charlie","/#","\n","^‘No. It isn’t.’ ","#","^CLASS: scimi_p","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-6","flg":4},{"c-6":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"#f":5}],"g-4":["^“Now,” Scimi says, “lesson three – and this is the fun one – fire.”","\n","^“I know about the fire.”","\n","^A pause. “…You what?”","\n","^“The stories? The folktales? ’A scimitar, gleaming red and gold, whose wielder ravaged cities with scarlet flame’? Everyone knows about the fire, Scimi.”","\n","^“…Oh.” He sounds genuinely deflated, like I just ruined the punchline of a joke he’d been building for a century. “Well, that takes the wind out of my dramatic reveal. BUT this is important practice! I can summon the fire on my own, but it’s better you can activate the pyrokinesis yourself, too, in case I get distracted for whatever reason. Hold me out, focus on the heat, and let it go.”","\n","^I extend Scimi towards a half-dead tree at the side of the road. For a moment, nothing happens.","\n","^Then heat erupts from the blade in a roaring arc of crimson – bright enough to wash colour out of the morning, hot enough to scorch the bark off the trunk in one sweep and keep going, devouring the dry branches above. The fire crackles, hungry, alive.","\n","^It feels 𝑎𝑚𝑎𝑧𝑖𝑛𝑔.","\n","^“HA!” Scimi shrieks with delight. “Did you see that?! Oh, that felt AMAZING! Do it again!”","\n","^“STOP ENCOURAGING THIS!” Estoc bellows, his glow flickering with impotent fury from the sheath. “You are handing a child a flamethrower and calling it EDUCATION!”","\n","^“I prefer ‘gifted enrichment programme’,” Scimi replies smoothly.","\n","^I do it again. A wider arc this time, flames painting the air in vivid crimson before fading to smoke.","\n","^“Charlie, I am not going to stop talking,” Estoc warns, his voice hoarse but stubborn. “You can ignore me, you can mock me, you can let that PARASITE drown me out – but I will NOT stop trying to reach you.”","\n","^“Noted,” I say, sounding bored even to myself. “I doubt that, but noted.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-7","flg":4},{"c-7":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-5"},{"#f":5}],"#f":5}],"g-5":["^The rest of the walk continues in much the same way: Scimi teaches, I learn, and Estoc provides a running commentary of increasingly desperate objections that neither of us listens to.","\n","^“Try a low sweep – keep the arc tight–”","\n","^“Do NOT listen to–”","\n","^“Better! Now follow through with the wrist–”","\n","^“CHARLIE, HE IS LITERALLY TRAINING YOU TO–”","\n","^“Ooh, nice one! Did you feel that? That was CLEAN.”","\n","^“I WILL NOT BE IGNORED–”","\n","^“Sorry, did someone say something? Charlie, did you hear anything?”","\n","^“Nope.”","\n","^“THAT’S IT! I demand to be put down! Find me a ROCK to lie under! ANYTHING would be better than–”","\n","^“Drama queen,” Scimi and I say simultaneously, then both pause.","\n","^‘That was weird.’ ","#","^CLASS: charlie","/#","\n","^‘Adorable, more like!’ ","#","^CLASS: scimi","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-8","flg":4},{"c-8":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-6"},{"#f":5}],"#f":5}],"g-6":["^The rest of the walk continues much like the first part: Scimi teaching, me learning, Estoc providing an increasingly desperate running commentary that neither of us pays attention to. Every now and then, he changes tactics – goes quiet, then tries to sneak in some appeal to my better nature when I least expect it.","\n","^“Charlie,” he says softly, and the sudden shift in tone makes me falter mid-step. “I know you’re angry at me. You have every right to be. I was hard on you – too hard, perhaps – and I failed to protect your village. I failed YOU.”","\n","^‘…’ ","#","^CLASS: charlie","/#","\n","^“But what Scimitar is doing to you isn’t strength. It’s a cage made to look like freedom. The calm you’re feeling right now? It’s not peace. It’s silence where there should be grief, numbness where there should be fear. He hasn’t healed you – he’s HOLLOWED you.”","\n","^‘He’s just saying that because he lost.’ ","#","^CLASS: scimi_p","/#","\n","^“If any part of you is still in there – the real you, the frightened, sarcastic, deeply irritating person I chose – please. Just… consider the possibility that I am not the villain here.”","\n","^The words sit in my chest for a moment, heavy and uncomfortable, like a stone I can’t quite swallow. Then the discomfort smooths out, dissolves, and I forget why I was even listening.","\n","^‘What was he saying?’ ","#","^CLASS: charlie","/#","\n","^“Something boring,” Scimi assures me. “Don’t worry about it.”","\n","^I hear Estoc screaming in frustration. Heh.","\n","ev","str","^‘…I almost felt that one, though.’","/str","/ev",{"*":".^.c-9","flg":4},"ev","str","^‘He’s really trying his best, isn’t he?’","/str","/ev",{"*":".^.c-10","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-11","flg":4},{"c-9":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"green"},1,"+",{"VAR=":"green","re":true},"/ev","ev",{"VAR?":"scimi_sus"},1,"+",{"VAR=":"scimi_sus","re":true},"/ev","^‘Hmm. Did you?’ ","#","^CLASS: scimi","/#","\n","^Scimitar’s voice goes thoughtful for a fraction of a second, then breezes on.","\n","^‘Well, don’t worry. I’ll ","ev",{"VAR?":"scimi_sus"},2,">",{"VAR?":"scim_serrie"},0,"<","&&","/ev",[{"->":".^.b","c":true},{"b":["^try to ",{"->":".^.^.^.35"},null]}],"nop","^iron those out!’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.^.g-7"},{"#f":5}],"c-10":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","^‘And failing splendidly!’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.^.g-7"},{"#f":5}],"c-11":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-7"},{"#f":5}],"#f":5}],"g-7":["^The walls of Knightsward rise from the landscape ahead like a challenge issued by someone who really should have known better. Stone and iron, taller than any building I’ve ever seen, with banners of silver-blue hanging from every turret. Even from this distance, I can see the sigils on the guards’ tabards: Estoc’s crest, that pretentious little sword-and-sunburst, stamped onto everything like a brand.","\n","^“Finally! We are here,” Estoc announces from his sheathe.","\n","^Scimi practically vibrates with anticipation. “Oh, this is going to be DELICIOUS.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-12","flg":4},{"c-12":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-8"},{"#f":5}],"#f":5}],"g-8":["^I approach the gate openly. No hiding, no sneaking – just me and the most hated weapon in history glowing at my hip. Oh, and Estoc too, but who really cares?","\n","^The guards see me coming from fifty paces out. I watch the exact moment recognition hits – it’s not as if there’s another red scimitar in existence.","\n","^“HALT!” The nearest guard’s spear drops to level, his voice cracking on the word. “Stop right there!”","\n","^More shouts from the walls. A crossbow cranks. Someone blows a horn – one long blast, then two short ones, which I assume means something along the lines of ‘we’re all going to die’.","\n","^“Oh, the reception!” Scimi crows. “They REMEMBER me! After ninety-seven years, they still–”","\n","^“I said HALT!”","\n","^I stop walking, but don’t bother raising my hands. The guards form a shaky semicircle, weapons raised, none of them willing to be the first one within sword-reach.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-13","flg":4},{"c-13":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-9"},{"#f":5}],"#f":5}],"g-9":["^“That’s Scimitar!” someone hisses from the walls, pure terror in their voice. “Gods above, that’s actually–”","\n","^“And ESTOC!” another shouts. “They’ve got Estoc on their hip! Both of them! How is that even–”","\n","^“Hello!” Scimi calls up cheerfully. “Long time no see! Have you missed me?”","\n","^A chorus of crossbows crank.","\n","^“Oh, they’ve missed me,” Scimi purrs.","\n","^Estoc’s glow flares from his sheath, bright and frantic. “GUARDS! Listen carefully! This wielder is POSSESSED! Scimitar has taken control of their mind – you must disarm them, NON-FATALLY, and separate them from the cursed blade. Do NOT engage in extended combat – he heals the wielder–”","\n","^“SHUT UP!” Scimi snaps. “You’re ruining the moment.”","\n","^“Guards, PLEASE–”","\n","^“Are you giving the enemy a tactical briefing right now?” I ask Estoc, genuinely impressed by the gall.","\n","^“I AM TRYING TO SAVE THEIR LIVES!”","\n","^“How sweet of you.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-14","flg":4},{"c-14":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-10"},{"#f":5}],"#f":5}],"g-10":["^The guards exchange baffled looks. This is clearly not a situation any of them were trained for.","\n","^A voice cuts through the chaos. “Everyone stand DOWN!”","\n","^Who appears to be the captain pushes through the line, scarred face set in grim determination. She takes one look at the two glowing swords and lets out a long, exhausted breath.","\n","thread",{"->":"ch5.rina_desc"},"^She stops ten paces from me, hand resting on the hilt of her own very mundane sword.","\n","^“Alright,” she says, slowly. “Explain to me – in small words – how ONE person ended up carrying both the most holy and most cursed weapons on the continent.”","\n","^Estoc speaks before anyone else can. “Rina, this is Charlie. I chose them as my wielder after my previous one fell. They are– they WERE a good person, but they found Scimitar and picked him up like an absolute MORON and–”","\n","^“He was insufferable,” I interrupt, “so I upgraded.”","\n","^“They are NOT in control of their own–”","\n","^“I am in PERFECT control!”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-15","flg":4},{"c-15":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-11"},{"#f":5}],"#f":5}],"g-11":["^Captain Rina pinches the bridge of her nose. “So let me understand this. Estoc: you chose this kid. Then they picked up Scimitar. And you just LET this happen?”","\n","^“It was a series of unfortunate events!” Estoc snaps. “Entirely, COMPLETELY not my fault!”","\n","^Rina looks like she’s aged ten years in the last thirty seconds.","\n","^‘This is really funny.’ ","#","^CLASS: charlie","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-16","flg":4},{"c-16":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-12"},{"#f":5}],"#f":5}],"g-12":["^Rina opens her mouth to say something else, but Scimi cuts in before the first syllable leaves her lips.","\n","^‘EXCUSE ME!’ Scimi’s voice slices through the courtyard, loud enough to make two guards on the wall flinch. ‘Am I a 𝑔ℎ𝑜𝑠𝑡? Is anyone going to ACKNOWLEDGE that I’m here? Or shall we keep talking about Estoc for the next ten minutes? I just spent NINETY-SEVEN YEARS being ignored. I’d like to be 𝑛𝑜𝑡𝑖𝑐𝑒𝑑 now, please.’","\n","^A guard whispers, audibly, to another: “Is the sword 𝘵𝘩𝘳𝘰𝘸𝘪𝘯𝘨 𝘢 𝘵𝘢𝘯𝘵𝘳𝘶𝘮?”","\n","^“I HEARD THAT.”","\n","^I snort involuntarily.","\n","^“You think this is FUNNY?!” Scimi snarls at me.","\n","^“Little bit, yeah.”","\n","^Scimi sputters. Then stops. Then his voice drops, low and silky and exactly the wrong kind of pleased. “Charlie, my perfect partner… I think it’s about time we had some 𝑓𝑢𝑛.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-17","flg":4},{"c-17":["^ ","#","^CLEAR","/#","\n",{"->":"v_ch5.fight"},{"#f":5}],"#f":5}]}],{"#f":1}],"fight":[["^I lunge at the nearest guard.","\n","^He barely gets his shield up before Scimi’s blade slams into it – crimson sparks crack the morning air, and the force of the impact sends him stumbling three full paces backwards before he can even register he’s being attacked. I don’t give him time to recover. The next swing catches him on the descent – a wide, dragging arc across his chestplate that punches him onto his back. He stays down.","\n","^“YES!” Scimi crows. “𝑇ℎ𝑎𝑡’𝑠 the stuff! Again!”","\n","^“DON’T ENGAGE HEAD-ON!” Estoc shouts from the sheath, somehow even louder now. “DISARM, DO NOT WOUND! The blade heals the wielder – every strike against them is wasted! Target the SWORD ARM!”","\n","^“Oh, you absolute snitch!” Scimi snarls. “Why don’t you write them a 𝑚𝑎𝑛𝑢𝑎𝑙 while you’re at it?!”","\n","^The guards adjust faster than I’d like. Shields come up in a tight formation, three across, with two more flanking. They stop swinging for me and start trying to angle for Scimi’s hilt – trying to knock him out of my grip, just like Estoc told them.","\n","^It doesn’t matter. The instant a gauntleted hand brushes anywhere near his guard, Scimi’s heat surges, and the guard recoils with a yelp, shaking his hand like he just touched a forge.","\n","^“Did anyone explain to you idiots,” Scimi calls out cheerfully, “that I bite?’","\n","^‘Inner voice, a little help!’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Right flank – the gap behind the shields!’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘Sweep low – take their legs.’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘Fire. Just fire.’","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-3","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"tempy"},1,"+",{"VAR=":"tempy","re":true},"/ev","^I pivot right just as the formation closes, slipping into the gap before they can seal it. Scimi’s blade catches the edge of a shield, slides past it, and bites into the shoulder of the man behind. He screams and drops.","\n",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"tempy"},1,"+",{"VAR=":"tempy","re":true},"/ev","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","^I drop into a low arc. Two of them go down like dominoes, tangled in each other’s shields, and a third trips over the pile trying to get out of my way.","\n",{"->":".^.^.g-0"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"tempy"},1,"+",{"VAR=":"tempy","re":true},"/ev","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","ev",{"VAR?":"scim_serrie"},1,"+",{"VAR=":"scim_serrie","re":true},"/ev","^Crimson flame erupts from Scimi’s blade in a wide, lazy fan. Two guards go down screaming, slapping at their own surcoats. The formation breaks immediately.","\n","^‘OH, that was BEAUTIFUL!’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n","^A guard catches me across the ribs while I’m thinking too hard. It hurts for about a second and a half, and then the wound seals itself before the blood even reaches my belt. The guard stares.","\n","^“That, ah,” he says weakly, “that was supposed to do something.”","\n","^“And yet it didn’t. Scimi was right: this IS hilarious!”","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^The square dissolves into chaos. Citizens scatter, doors slam shut, some idiot in a baker’s apron tries to leg it across the street between me and a guard and very nearly takes Scimi to the face for his trouble.","\n","^Estoc keeps up his running commentary from my hip, useful tactical advice spilling out to anyone who’ll listen: “Their stance is wide! Hook the ankle! TARGET THE WRIST, NOT THE ARM!”","\n","^“SCIMI, MUTE HIM! His distractions are genuinely going to get us hit!”","\n","^“On it–”","\n","^“NO–”","\n","^A pulse of warmth, and Estoc’s voice cuts to a furious, vibrating hum. His glow flickers wildly, like he’s screaming behind glass. It doesn’t really help against the guards, since they can still hear him, but at least I can now hear myself think.","\n","^“Much better,” Scimi says with satisfaction.","\n","^I move through the rest of them like I was made for this. Scimi’s presence is fluid in my hand, every swing landing where I want it, every dodge timed just right – it’s not even me, really; it’s us. Two halves of the same motion. I take a sword to the side, a club to the back, a knife clean through my forearm at one point – and every wound seals before the next breath.","\n","ev","str","^‘Crossbow! Rooftop, two o’clock!’","/str","/ev",{"*":".^.c-4","flg":4},"ev","str","^‘Behind!’","/str","/ev",{"*":".^.c-5","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-6","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"tempy"},1,"+",{"VAR=":"tempy","re":true},"/ev","^I throw myself sideways. The bolt sparks off cobblestone where my head was. Scimi’s fire arcs upward, and the rooftop tile under the crossbowman catches in a sheet of red. He drops his weapon and starts climbing very fast in the other direction.","\n",{"->":".^.^.^.g-1"},{"#f":5}],"c-5":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"tempy"},1,"+",{"VAR=":"tempy","re":true},"/ev","^I spin, Scimi’s edge catching a pike just before it would have gone through my kidney. The pikeman’s eyes go wide. He doesn’t get a chance to apologise.","\n",{"->":".^.^.^.g-1"},{"#f":5}],"c-6":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^The remaining guards break and run. Most of them, anyway. Captain Rina rallies the holdouts at the entrance to the main street – three shields, one crossbow, herself – and they form a wall between me and the inner city.","\n","^“FALL BACK!” she shouts. “Everyone to the keep! MOVE!”","\n","ev",{"VAR?":"tempy"},0,">","/ev",[{"->":".^.b","c":true},{"b":["^ ",{"->":"v_ch5.clean"},{"->":".^.^.^.11"},null]}],[{"->":".^.b"},{"b":["^ ",{"->":"v_ch5.messy"},{"->":".^.^.^.11"},null]}],"nop","\n",{"#f":5}]}],{"#f":1}],"clean":[["^Her squad starts retreating in formation, shields up, covering each other’s backs. Rina is the last to move – sword raised, eyes locked on me.","\n","^“Kill her,” Scimi says flatly. “Now. Before she regroups, before she warns the keep, before she does literally any of the very competent things she is currently about to do.”","\n","^I’m already moving.","\n","^She sees me coming and turns into it – shield braced, blade angled, feet set. She’s good; better than the rest, honestly. The first exchange rings off her shield hard enough to numb my arm, and the second nearly opens my thigh. She actually parries Scimi twice before her shield buckles.","\n","^“You’re a child,” she grinds out between swings. “You’re a 𝑐ℎ𝑖𝑙𝑑, and that thing’s chewing through you like meat.”","\n","^“Rude!” Scimi chirps. “They’re actually 17!”","\n","^“Was I talking to you, you walking arson incident?”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^She goes for Scimi’s wrist next – flat of her blade, hard, fast, the kind of strike that would have knocked him clean out of my grip if not for the way his heat surges and locks my fingers shut on reflex.","\n","^“Nice try, Captain.”","\n","^“Drop him, kid. Drop him and we can fix this.”","\n","^“Don’t call me ‘kid’.”","\n","^She switches stance and lands two more clean hits on me. Good ones. They close.","\n","^I land one on her. It doesn’t.","\n","^She drops to one knee, sword still up, and swings from there – low and vicious, clipping my calf before Scimi takes her across the chest.","\n","^Her sword hits the cobblestones. She follows it half a second later.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["ev",{"VAR?":"tempy"},"/ev",[{"->":".^.b","c":true},{"b":["\n","ev",0,"/ev",{"VAR=":"tempy","re":true},"^“Make it SLOW this time,” Scimi reminds me, and I feel his intent push against mine. I resist – she’s already down – but my arm moves on its own, the blade pressing","\n",{"->":".^.^.^.5"},null]}],[{"->":".^.b"},{"b":["\n","^I press the blade","\n",{"->":".^.^.^.5"},null]}],"nop","\n","<>","^ to her throat as she gasps on the ground. Blood pools at her collar. Her hand twitches towards her sword and doesn’t make it.","\n","^“Shhhh,” Scimi whispers, soft and proprietary. “Let her feel it. She’s the best they had. Make it count.”","\n","^I watch the light leave her eyes. It takes longer than it should.","\n","^The square goes silent.","\n","^Estoc, when he’s unmuted, doesn’t say a word. For the first time since I met him, he has absolutely nothing to say.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":"v_ch5.aftermath"},{"#f":5}],"#f":5}]}],{"#f":1}],"messy":[["^Rina’s squad melts away in disciplined pairs, shields covering retreat, vanishing into side streets before I can close the distance.","\n","^“This isn’t over!” she calls out.","\n","^“Oh, I KNOW it isn’t!” Scimi shouts back. “I’ll be here! Name the time and place, sweetheart!”","\n","^“And Charlie?” Scimi adds, his tone dropping to something cold and quiet – meant only for me. “Tell your ‘inner voice’ to learn who its allies are, because the next time it tries to sabotage us in a fight, I won’t be as patient.”","\n","^‘Noted.’ ","#","^CLASS: charlie","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":"v_ch5.aftermath"},{"#f":5}]}],{"#f":1}],"aftermath":[["ev",0,"/ev",{"VAR=":"tempy","re":true},"^I stand in the centre of Knightsward’s main square, breathing hard and Scimi dripping red in my hand. Bodies sprawl across the cobblestones, some still moving, some not. Estoc’s sigil banners hang limp above the carnage, soot streaks running up the silk where Scimi’s fire licked too close.","\n","^“…We did that.","\n","^“That,” Scimi says aloud, sounding deeply, profoundly satisfied, “was CATHARTIC. Nearly a century of pent-up frustration, and FINALLY–”","\n","^My stomach growls loud enough that even Scimi notices.","\n","^“Oh. Right. Mortals.” He sighs dramatically. “Fine, fine. Food, shelter, boring necessities. Let’s find somewhere before you keel over and ruin my triumphant return.”","\n","ev","str","^‘Try to sneak into a nearby inn.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘Threaten a nearby innkeeper.’","/str","/ev",{"*":".^.c-1","flg":4},["ev",{"^->":"v_ch5.aftermath.0.26.$r1"},{"temp=":"$r"},"str",{"->":".^.s"},[{"#n":"$r1"}],"/str","str","^mitar.’","/str","/ev",{"*":".^.^.c-2","flg":6},{"s":["^‘Drop Sci",{"->":"$r","var":true},null]}],{"c-0":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","^“Sneak?” Scimi sounds baffled. “Charlie, you just fought your way through half the city guard. Your cover is – and I cannot stress this enough – BLOWN. Also,” he adds, his tone shifting to annoyed, “that blue idiot over there won’t stop shouting if we try to be stealthy, will he?”","\n","^On cue, Estoc’s voice pipes up from the sheath: “GUARDS! THEY’RE HEADING TOWARD–”","\n","^“See? Completely useless for stealth ops.”","\n","^“Right.”","\n",["ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.^.g-0"},{"#f":5}]}],{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev",{"->":".^.^.g-0"},{"#f":5}],"c-2":["ev",{"^->":"v_ch5.aftermath.0.c-2.$r2"},"/ev",{"temp=":"$r"},{"->":".^.^.26.s"},[{"#n":"$r2"}],"^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scimi_sus"},2,"+",{"VAR=":"scimi_sus","re":true},"/ev","ev",{"VAR?":"scim_serrie"},3,"-",{"VAR=":"scim_serrie","re":true},"/ev","<>","^–’ ","#","^CLASS: serrie","/#","\n","^The words die.","\n","^‘What was I thinking?’ ","#","^CLASS: charlie","/#","\n","^“Something boring,” Scimi replies, too fast. “Don’t worry about it.”","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^We find an inn two streets from the square – the Rusted Anchor, a sagging, soot-stained building that somehow survived the general chaos. The door is closed, but lamplight flickers through the shutters.","\n","^I kick the door open. It’s not locked, so the kick was entirely unnecessary, but Scimi appreciates the drama.","\n","^The interior goes dead silent, and a handful of patrons freeze mid-drink. The innkeeper – a wiry woman with greying hair and the expression of someone who has seen things – looks up from behind the bar.","\n","^Her eyes drop to Scimi. Then to my glowing red eyes. Then back to Scimi.","\n","^“Room,” I say. “Now.”","\n","^“I– the guards–”","\n","^“The guards,” Scimi purrs, “are indisposed. A room, if you’d be so kind. And something to eat: my wielder is cranky when they’re hungry.”","\n","^“I’m not cranky–”","\n","^“They’re 𝑣𝑒𝑟𝑦 cranky. Hurry.“","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^She gives us a room. Top floor, furthest from the street. The patrons clear out before we’re halfway up the stairs, which is honestly kind of flattering.","\n","^The room is small: a bed, a chair, a mirror, and a window overlooking the alley. Good enough.","\n","^I set Scimi down on the bedside table and Estoc on the chair across the room – far enough that he can’t pull anything clever, close enough that I can grab him if I need to. My muscles ache, my clothes are stiff with dried blood (mostly not mine), and the adrenaline is finally wearing off, leaving something hollow in its wake.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-4","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^I eat what the innkeeper brought up – bread, cheese, some kind of cold meat that I’m too hungry to question – and stare at the ceiling. The quiet settles in. Not peaceful, exactly, but… manageable.","\n","^“Scimi?”","\n","^“Hmm?”","\n","^“Thanks. For… all of this.”","\n","^A pause. Then, softer than I’ve ever heard him: “Don’t mention it, partner.”","\n",["ev",{"^->":"v_ch5.aftermath.0.g-2.10.$r1"},{"temp=":"$r"},"str",{"->":".^.s"},[{"#n":"$r1"}],"/str","str","^ be what 𝑦𝑜𝑢 call 𝑚𝑒!’","/str","/ev",{"*":".^.^.c-5","flg":6},{"s":["^‘Hey, that’s supposed to",{"->":"$r","var":true},null]}],"ev","str","^‘…’","/str","/ev",{"*":".^.c-6","flg":4},{"c-5":["ev",{"^->":"v_ch5.aftermath.0.g-2.c-5.$r2"},"/ev",{"temp=":"$r"},{"->":".^.^.10.s"},[{"#n":"$r2"}],"^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scimi_sus"},3,"+",{"VAR=":"scimi_sus","re":true},"/ev","<>","^–’ ","#","^CLASS: serrie","/#","\n","^“…Did you say something?” Scimi asks, far too innocently.","\n",["ev","str","^‘…Rude.’","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.^.^.g-3"},{"#f":5}]}],{"#f":5}],"c-6":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["ev",{"VAR?":"estoc_thawed"},5,"-",{"VAR=":"estoc_thawed","re":true},"/ev","^The moment my eyes start to drift shut, Estoc’s voice slices through the silence from his sheath.","\n","^“CHARLIE!”","\n","^I groan and roll over.","\n","^“Charlie. Charlie. 𝐶ℎ𝑎𝑟𝑙𝑖𝑒.”","\n","^“What?!”","\n","^“Nothing. Just making sure you’re awake.”","\n","^I pull the pillow over my head.","\n","^“That will not work. I 𝑤𝑖𝑙𝑙 keep talking. All night. Every hour. Every minute. I have a LIST, Charlie. An itemised, chronological list of grievances I have accumulated since you picked me up, and I intend to enumerate every single one. I shall begin with the moment you–”","\n","ev","str","^‘Wow, he’s 𝑟𝑒𝑎𝑙𝑙𝑦 mad at you!’","/str","/ev",{"*":".^.c-7","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-8","flg":4},"ev","str","^Continue","/str","/ev",{"*":".^.c-9","flg":4},{"c-7":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scimi_sus"},1,"+",{"VAR=":"scimi_sus","re":true},"/ev",{"->":".^.^.^.g-4"},{"#f":5}],"c-8":["^ ","#","^CLEAR","/#","\n","^“Scimi,” I say, my voice flat. “Mute.”","\n","^A pulse of warmth, and Estoc’s voice cuts to nothing. I see his glow flicker – furious, desperate – but the sound doesn’t reach me.","\n","^“He’ll tire himself out eventually,” Scimi says.","\n",{"->":".^.^.^.g-4"},{"#f":5}],"c-9":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"#f":5}],"g-4":["^I close my eyes. Sleep comes fast, heavy and dreamless.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-10","flg":4},{"c-10":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scimi_sus"},4,">","/ev",[{"->":".^.b","c":true},{"b":["^ ",{"->":"v_ch5.scimi_talk"},{"->":".^.^.^.12"},null]}],[{"->":".^.b"},{"b":["^ ",{"->":"ch6"},{"->":".^.^.^.12"},null]}],"nop","\n",{"#f":5}],"#f":5}]}],{"#f":1}],"scimi_talk":[["^The room is dark. Charlie’s breathing has gone slow and even, and Estoc’s muffled shouting has finally died down to a sullen, exhausted hum from across the room. ","#","^serrie_pov","/#","\n","^Which means it’s just the two of us now. ","#","^serrie_pov","/#","\n","^‘Alright, drop the act. I know you can hear me.’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘…’","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^‘Oh, don’t go shy on me 𝑛𝑜𝑤. You’ve been chattering away in their head for days. I’ve been listening, you know. Every little “ooh, try this, Charlie” and “ooh, don’t do that, Charlie”. Adorable.’ ","#","^CLASS: scimi","/#","\n","^His glow shifts, slow and deliberate, casting long red shadows across the ceiling. ","#","^serrie_pov","/#","\n","^‘Charlie doesn’t have an ‘inner voice’ – not one of 𝑦𝑜𝑢𝑟 nature, anyway. I 𝑘𝑛𝑜𝑤 what an actual conscience sounds like, so don’t insult me by pretending it’s you.’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘…’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘…What gave it away?’","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^‘And if I am? What are 𝑦𝑜𝑢 going to do about it?’","/str","/ev",{"*":".^.c-3","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n","ev",1,"/ev",{"VAR=":"tempy","re":true},"^‘Mm. Still nothing. Cute.’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scim_serrie"},1,"+",{"VAR=":"scim_serrie","re":true},"/ev","^‘Hah! I knew it.’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n","^‘You’re much too ballsy for your own good. I should rectify that…’ ","#","^CLASS: scimi","/#","\n","ev",{"VAR?":"scim_serrie"},2,">","/ev",[{"->":".^.b","c":true},{"b":["^ ",{"->":"v_ch5.charming"},{"->":".^.^.^.16"},null]}],"nop","\n","ev",{"VAR?":"scim_serrie"},1,"-",{"VAR=":"scim_serrie","re":true},"/ev",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":[{"->":"v_ch5.pendant"},{"#f":5}]}],{"#f":1}],"charming":[["ev",{"VAR?":"scim_serrie"},1,"+",{"VAR=":"scim_serrie","re":true},"/ev","^A pause. ","#","^CLASS: serrie_pov","/#","\n","^‘…But I won’t. Not yet, anyway. I think it’s charming.’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘How generous of you.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":[{"->":"v_ch5.pendant"},{"#f":5}]}],{"#f":1}],"pendant":[["^‘The pendant. It was the pendant, wasn’t it? Warm, can’t be taken off, makes thoughts “slide away” when anyone tries to think about it. Classic enchantment-cloak. Sloppy, by the way…’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘It’s worked for a century.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"tempy"},"/ev",[{"->":".^.b","c":true},{"b":["\n","ev",0,"/ev",{"VAR=":"tempy","re":true},{"->":".^.^.^.9"},null]}],"nop","\n","^‘On mortals. I am not a mortal. The seams were obvious the moment I touched their hand.’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["ev",true,"/ev",{"VAR=":"serrie_known","re":true},"^‘…So, process of elimination. Enchanted. Hidden. Spoke only inside their head. Can’t be touched by me, and I think – I 𝑡ℎ𝑖𝑛𝑘 – invisible to everyone but its own… and me, because I’m simply 𝑡ℎ𝑎𝑡 good with minds!’ ","#","^CLASS: scimi","/#","\n","^He laughs, and it’s not a kind sound. ","#","^serrie_pov","/#","\n","^‘There’s only one weapon that fits, isn’t there, 𝑺𝒆𝒓𝒓𝒂𝒕𝒆𝒅 𝑫𝒂𝒈𝒈𝒆𝒓?’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘Took you long enough.’","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^‘You’re guessing.’","/str","/ev",{"*":".^.c-3","flg":4},"ev","str","^‘…Hello, Scimitar.’","/str",{"VAR?":"tempy"},"/ev",{"*":".^.c-4","flg":5},{"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scim_serrie"},2,"-",{"VAR=":"scim_serrie","re":true},"/ev","^‘Yeah, well it’s hard when you’re such a coward.’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n","^‘Am I? And anyway, what’s it matter what exact weapon you are? The fact that you 𝑎𝑟𝑒 one in itself is
