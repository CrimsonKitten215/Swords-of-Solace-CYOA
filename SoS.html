ision in a while. I’m almost proud!’","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^‘You like me really.’","/str","/ev",{"*":".^.c-3","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev",{"->":"ch3.flee"},{"#f":5}]}],{"#f":1}],"abandon_estoc":[["ev",{"VAR?":"purple"},2,"+",{"VAR=":"purple","re":true},"/ev","ev",{"VAR?":"estoc_thawed"},999,"-",{"VAR=":"estoc_thawed","re":true},"/ev","^I pinch the bridge of my nose, exhaling slowly. My side still stings from the last hit, and my arms ache from swinging Estoc around like a glorified baseball bat. This isn’t working; I’m not a fighter, and yet Estoc’s grand battle plan so far has just consisted of “don’t die”.","\n","^Yeah, I’m done.","\n","^“Okay, listen,” I say, levelling a look at the sword in my hands. “Since you’re so good at fighting, why don’t you just handle this?”","\n","^There’s a sharp pause.","\n","^“What?!” Estoc’s voice spikes in outrage.","\n","^“You clearly know what you’re doing, and I don’t, so why don’t I just – oh, I don’t know – hand you over to her and let you deal with it?”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^The silence that follows is deafening. Then, Estoc makes a strangled noise that can only be described as offended. “That is the most moronic–”","\n","^I grin, because annoying him is the only thing bringing me any joy from this miserable situation. “Oh, I dunno, I really think I should consider it.”","\n","^Across from me, Autumn, who has been watching this entire exchange like she just wandered into a play she definitely did not audition for, finally speaks. Her brows knit together in what might actually be disbelief.","\n","^“…Are you offering me the sword?”","\n","^I think for a moment. “…Maybe?”","\n","^Estoc practically splutters. “This is blasphemous! Unbelievable! I chose you, and you would throw me away like a pathetic throwing knife?!”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^I shift my grip on Estoc, weighing my options. The sword is still humming with barely restrained fury, his glow pulsing in agitation. Honestly, I don’t know why he’s so surprised. What did he expect? That I’d suddenly become some great warrior in the last five minutes?","\n","^“I mean, don’t get me wrong, Estoc, it’s been fun…”","\n","^‘It has not been fun.’ ","#","^CLASS: charlie","/#","\n","^“…but let’s be real here. You’re obviously way more invested in this than I am, and I’m going to die at this rate.”","\n","^Estoc’s outrage crackles through the air like a storm barely held at bay. His glow pulses erratically, casting jagged shadows against the ruined village square.","\n","^“I chose you,” he hisses, his voice low with fury. “Do you even comprehend what that means? What I have offered? You stand in the presence of a legend, and your response is to–”","\n","^“Yeah, yeah, sacrilege or whatever,” I interrupt, rolling my eyes. “Listen, buddy, I didn’t exactly sign up for this whole ‘chosen one’ gig. You kind of just latched onto me like some sword-shaped parasite. So, if Autumn here wants you, she’s welcome to it.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["ev","str","^None","/str","/ev",{"VAR=":"wielding","re":true},"^Autumn doesn’t look convinced. “You’re serious?”","\n","^“As a heart attack. You want the sword, right? Take it.”","\n","^“But I 𝑑𝑜𝑛’𝑡 want him!” Autumn interjects, her tone sharp.","\n","^I glance at her, then back at Estoc. “Well, that’s not really my problem now, is it?”","\n","^Estoc practically vibrates with indignation. “You ungrateful, insufferable–”","\n","^“Alright, cool, decision made,” I reply, gripping Estoc by the hilt. “Catch.”","\n","^Before I can change my mind, I toss him straight at her. For a split second, Autumn’s face flickers with surprise, but her reflexes take over and she catches him with both hands. The moment her fingers close around his hilt, her entire body jerks like she’s been struck by lightning. Her lime eyes widen, the glow melting into a ","ev",{"VAR?":"r_col"},{"VAR?":"e_col"},{"f()":"mix"},"out","/ev","^ colour for a split second before she throws him to the ground like he just seared through her skin.","\n","^“What–” she hisses, shaking out her hand like it burns. “What the hell was that?!”","\n","^Estoc hits the dirt with a clatter, his glow pulsing erratically. “You dare resist me?!”","\n","^Autumn is already reaching for Recurve like it’s her only lifeline. “Don’t–”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^I don’t know what just happened, but I do know an opportunity when I see one. The second her attention is sent away from me, I run. As I bolt past the shattered remnants of the village square, my feet pound against the dirt as adrenaline pushes me forward. Behind me, their voices cut through the air in spliced fragments.","\n","^“—you think you can force me?! You think I’m weak—”","\n","^“—rejected by—? I am Estoc!”","\n","^“—stay out of—, you arrogant—”","\n","^“Charlie, you pathetic traitor, get back here this instant! You cannot leave me!”","\n","^And yet I do.","\n","^“CHARLIE!”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-4","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"#f":5}],"g-4":["^Their voices grow fainter as I clear the last ruined street, sprinting out of the village and into the open landscape beyond. My breath is ragged, my heartbeat pounding in my skull, but I don’t slow down; I don’t look back. My burning village blurs past me as I sprint for the encroaching treeline – anywhere that isn’t here.","\n","^Just as I think I’m free, a sudden sharp pain stabs into my side. I stagger, but keep running, because the moment I pause I know I’m dead. It’s probably just a scratch – a jolt of pain that I can’t focus on right now.","\n","^Something warm trickles down my side, but I keep running.","\n","^And I don’t stop.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-5","flg":4},{"c-5":["^ ","#","^CLEAR","/#","\n",{"->":"n_ch4"},{"#f":5}],"#f":5}]}],{"#f":1}],"flee":[["^The second my legs start moving, instinct takes over. I bolt, shoving off the ground with everything I have with Estoc clutched in a death grip. The burning remnants of my village blur past me, the glow of firelight casting wild shadows against the trees as I break into the open wilderness.","\n","^“Charlie, what are you doing?!” Estoc’s voice is sharp with disbelief.","\n","^“Not dying!” I gasp.","\n","^Behind me, there’s a pulse of energy. I don’t need to look to know what’s coming.","\n","^“Coward,” Autumn calls from behind, her voice carrying easily over the wind.","\n","^“Yeah, well, better a coward than dead.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^The forest looms ahead, dark and endless, but it’s my only hope. If I can make it far enough, deep enough, maybe she’ll give up. Maybe she won’t risk following.","\n","^“She’s gaining on us,” I breathe, half-panicked.","\n","^“Then stop running like a fool!” Estoc barks. “Zigzag! Take cover! Do something intelligent!”","\n","^“I am doing something intelligent! I’m leaving!”","\n","^Another arrow shoots through the air, narrowly missing my shoulder. The heat of it singes the fabric of my sleeve, and I nearly trip over my own feet. A second follows almost immediately – and this one doesn’t miss. A burning pain rips across my side, lower this time, but I grit my teeth and push harder, too terrified to stop and check how bad it is.","\n","^The wreckage of the village gives way to wild undergrowth, the uneven terrain making every step more dangerous. Twigs snap beneath my boots, and branches claw at my skin as I force my way forward.","\n","^I don’t look back. I can’t look back. I just keep running.","\n","^“Run all you want. It won’t change anything.”","\n","^I don’t wait to find out what she means.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^The trees swallow me whole, shadows stretching long in the dying light. My breath is ragged, my pulse a frantic drumbeat in my ears. Somewhere behind me, I hear her bow hum again, another arrow loosed into the night.","\n","^It never lands.","\n","^Seconds pass. Then minutes. The forest is silent aside from my breaths.","\n","^I finally risk a glance over my shoulder. No one.","\n","^No lime green glow, no exploding arrows, no cold, piercing stare. She isn’t following me anymore.","\n","^I slow to a stop, bracing my hands against my knees as I try to catch my breath. My lungs burn, and my side aches from where she grazed me earlier, but I’m alive. Estoc, however, is livid.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^“Charlie, this is disgraceful!” Estoc shouts at me. “A wielder of a sword of my calibre does not flee like a frightened rabbit!”","\n","^“Oh, shut up,” I groan, straightening. “I didn’t see you doing anything useful!”","\n","^“I am a sword!”","\n","^“And I’m a person who likes living!”","\n","^He huffs, the faint glow of his blade flickering in irritation. “That was pathetic.”","\n","^I sigh, rubbing my face and sounding overall very drained. “Yeah, well, welcome to my life.”","\n","^The wind rustles through the leaves, carrying the lingering scent of smoke. The village – what’s left of it – is far behind me now.","\n","^And Autumn… has let me go.","\n","^For now…","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":"h_ch4"},{"#f":5}],"#f":5}]}],{"#f":1}],"#f":1}],"ch4":[{"->":".^.to_cave"},{"to_cave":["^Chapter 4: The Devil You Know ","#","^CLASS: chapter","/#","\n","^It’s been a few hours since I ran. The sun has long since set, leaving the world in cold darkness. The wind bites through my clothes, and every step forward feels heavier than the last, my aching side where Autumn’s arrow ","ev",{"CNT?":"n_ch4"},"/ev",[{"->":".^.b","c":true},{"b":["^shot",{"->":".^.^.^.11"},null]}],[{"->":".^.b"},{"b":["^grazed",{"->":".^.^.^.11"},null]}],"nop","^ me not exactly helping the matter. The only thing","ev",{"CNT?":"n_ch4"},"!","/ev",[{"->":".^.b","c":true},{"b":["^s",{"->":".^.^.^.18"},null]}],"nop","^ of even slight warmth nearby ","ev",{"CNT?":"n_ch4"},"/ev",[{"->":".^.b","c":true},{"b":["^is",{"->":".^.^.^.25"},null]}],[{"->":".^.b"},{"b":["^are Estoc and",{"->":".^.^.^.25"},null]}],"nop","^ the strange gem around my neck.","\n","^The forest stretches endlessly around me, silent except for the occasional rustle in the underbrush – probably only animals, but my nerves are too frayed to ignore it. Twisted branches claw at the sky, black against the faint glow of the stars. I try not to think about how lost I am… or how I abandoned ","ev",{"CNT?":"n_ch4"},"!","/ev",[{"->":".^.b","c":true},{"b":["^almost ",{"->":".^.^.^.34"},null]}],"nop","^everyone I know.","\n","^I need shelter – a place to rest, even for a moment. My body feels like it’s running on fumes, and the cold is leeching away what little strength I have left. If I don’t stop soon, I’ll collapse.","\n","^‘Fantastic. Just what I needed: freezing to death in the middle of nowhere.’ ","#","^CLASS: charlie","/#","\n","done",{"#f":1}],"in_cave":["^I’ve been walking for what feels like hours, and just when I think I can’t go any further, I spot it: a cave, its entrance barely visible against the darkened rock. I breathe a sigh of relief. Shelter. It’s not much, but it’s something.","\n","^The entrance looms before me, like the gaping maw of some great beast. The shadows inside are thick and impenetrable, but it’s better than nothing. 𝐼𝑡 ℎ𝑎𝑠 𝑡𝑜 𝑏𝑒 𝑏𝑒𝑡𝑡𝑒𝑟 𝑡ℎ𝑎𝑛 𝑛𝑜𝑡ℎ𝑖𝑛𝑔.","\n","^“Okay, creepy cave in the middle of nowhere. Definitely not suspicious,” I murmur, more to myself than anything, rubbing my arms for warmth. “This is probably a terrible idea.”","\n","^‘Still, the cold is worse than whatever’s inside. Probably.’ ","#","^CLASS: charlie","/#","\n","^The cave smells damp, but not unpleasant – just the earthy scent of rock and moss. The crunch of loose pebbles under my boots echoes faintly as I step inside, and the walls press close, rough beneath my fingers as I trace along them for balance. I sit down and let out a long breath, grateful for the break. My teeth are chattering now, my whole body shivering from the cold","<>","\n","done",{"#f":1}],"before_scimi":["^I roll my shoulders, trying to shake off the tension in my muscles. ","<>","\n","done",{"#f":1}],"scimi_glow":["^The crimson glow doesn’t brighten, but I can see more of it now: twisting patterns of light tracing faint lines along the stone, barely visible.","\n","done",{"#f":1}],"scimi_desc":["^sword, or what seems to be a sword, is embedded deep into the stone, the wicked-looking blade gleaming a rich pinkish-red, curved and serrated like the wing of some long-forgotten beast. The hilt is wrapped in near-black leather, while the guard flares outward in two sharp, golden arcs, cradling a single crimson gem embedded at its centre. The blade and gemstone glow faintly, not quite alive but never truly at rest.","\n","done",{"#f":1}],"touch_scimi":[["^My mind races, connecting dots I didn’t even know were there. The sword from the story… the one that was hidden away, sealed in a cave to prevent its influence from spreading.","\n","^I didn’t think it was real.","\n","^And yet, here it is. Right in front of me.","\n","^I reach out, my fingers brushing the hilt – just the lightest touch","<>","\n","ev",{"CNT?":"n_ch4"},"/ev",[{"->":".^.b","c":true},{"b":["\n","^. ","<>","\n",{"->":".^.^.^.14"},null]}],[{"->":".^.b"},{"b":["\n","^ – and immediately, Estoc lets out a sharp cry.","\n","^“No! Get away from him!”","\n",{"->":".^.^.^.14"},null]}],"nop","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^I pull my hand away after that, and for a moment, nothing happens, the cave silent aside from my own unsteady breathing. Then, the glow flickers. Just as I take a cautious step back, the weapon speaks.","\n","^“Hahahahaha! Oh, it’s been so long! I thought I’d never feel the warmth of a hand again!” Scimitar’s voice rings out, rich with a manic, almost unhinged joy.","\n","^Though almost charming in its enthusiasm, it has a dark edge to it – like a creature that’s been starved too long. It’s too happy for something that’s been locked away for almost a century.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^I freeze. A part of me wants to run, but I can’t seem to move.","\n","^“What… what are you?” I whisper, more to myself than anyone else.","\n","^“Me? Oh, I’m Scimitar! The one who’s been trapped here,” it states, its voice rising into a near-hysterical tone. “Gods, do you have any idea what it’s like, just sitting here? Waiting? Thinking? For nearly a 𝑐𝑒𝑛𝑡𝑢𝑟𝑦?! Ninety-seven years, four months, and six days, but who’s counting?”","\n","^I stumble back. “What the hell?”","\n","ev","void","/ev","->->",{"#f":5}]}],{"#f":1}],"happy_scimi":["^“And you… you’re the one who found me?” It practically purrs. “Yes, I can feel it. You’re special, aren’t you? You’re the one who’s going to make it all better, who’s going to finally wield me once more! Ohhh, you clever thing, you wonderful little–”","\n","^Mid-sentence, it stops, and the glow dims. The cave, which had been filled with this unsettling, almost giddy energy, suddenly feels… colder.","\n","done",{"#f":1}],"healer":["^“You’re telling me that the 𝑒𝑣𝑖𝑙 sword is a ℎ𝑒𝑎𝑙𝑒𝑟?”","\n","^Scimitar bristles. “Don’t say it like that.”","\n","^“Like what?”","\n","^“Like I’m just some… 𝑠𝑢𝑝𝑝𝑜𝑟𝑡 character.” It sounds… weirdly affronted by being compared to that.","\n","done",{"#f":1}],"#f":1}],"ch5":[{"->":".^.start"},{"start":["^Chapter 5: Social Ineptivity ","#","^CLASS: chapter","/#","\n","^(A made-up phrase that means really, really bad at socialising) ","#","^CLASS: subchapter","/#","\n","done",{"#f":1}],"rina_desc":["^She’s tall – taller than most of the men under her command, wearing armour that has seen actual use rather than ceremonial polishing. Her hair is cut short and practical, and a scar traces a line from her left eyebrow down to her cheek. ","<>","\n","done",{"#f":1}],"with_king":[["^into a wide stone hall where a crowned man sits on a raised seat of carved oak and iron. There are advisors nearby, guards at the walls, the whole setup.","\n","ev",{"CNT?":"n_ch5"},"/ev",[{"->":".^.b","c":true},{"b":["^Every eye in the room turns to me, and not a single one looks impressed.",{"->":".^.^.^.6"},null]}],"nop","\n","^I bow; a bit too late, a bit too awkwardly. “Hi.”","\n","ev",{"CNT?":"n_ch5"},"/ev",[{"->":".^.b","c":true},{"b":["^The silence that follows is suffocating.",{"->":".^.^.^.14"},null]}],"nop","\n","^“State your name,” the king says, “and ","ev",{"CNT?":"n_ch5"},"/ev",[{"->":".^.b","c":true},{"b":["^your purpose",{"->":".^.^.^.22"},null]}],[{"->":".^.b"},{"b":["^explain why two relics that should never be in the same place are currently attached to your waist",{"->":".^.^.^.22"},null]}],"nop","^.”","\n","^I swallow. “Charlie, from a village that doesn’t exist anymore.”","\n","^The king gestures for me to elaborate","ev",{"CNT?":"n_ch5"},"!","/ev",[{"->":".^.b","c":true},{"b":["^, and suddenly everyone’s looking at me like I’m about to give a very important speech, which is… deeply unfortunate",{"->":".^.^.^.33"},null]}],"nop","^. I keep it short: fire, screaming, people dead or missing, me running, yada yada yada. I definitely don’t start tearing up towards the end of it – why would I do that?","\n","ev","str","^‘Only a baby would cry. You’re not a baby, are you?’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘Don’t lie – it’s scientifically proven that talking about your feelings is “better for your mental health” or something.’","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","^‘O-of course not.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"yellow"},2,"+",{"VAR=":"yellow","re":true},"/ev","ev",{"CNT?":"n_ch5"},"/ev",[{"->":".^.b","c":true},{"b":["\n","ev",1,"/ev",{"VAR=":"tempy","re":true},{"->":".^.^.^.15"},null]}],"nop","\n","^‘Easy for you to say…’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^“And now,” I finish, gesturing vaguely at myself, “my home is gone, and ","ev",{"CNT?":"n_ch5"},"/ev",[{"->":".^.b","c":true},{"b":["^I…” I trail off, suddenly aware of how small I must look in this enormous hall. “",{"->":".^.^.^.5"},null]}],"nop","^I need help","ev",{"CNT?":"n_ch5"},"!","/ev",[{"->":".^.b","c":true},{"b":["^ before Autumn decides Knightsward also looks flammable",{"->":".^.^.^.12"},null]}],"nop","^.”","\n","ev","void","/ev","->->",{"#f":5}]}],{"#f":1}],"#f":1}],"ch6":[{"->":".^.start"},{"start":["^Chapter 6: Angels and Outcasts ","#","^CLASS: chapter","/#","\n","end",{"#f":1}],"#f":1}],"h_ch4":[{"->":".^.to_cave"},{"to_cave":[["thread",{"->":"ch4"},"^I sigh, shifting my grip on Estoc.","\n","^He’s been mostly quiet since I ran. Not silent, not quite, but not his usual self either. No endless criticisms, no impassioned speeches about duty or heroism. Just the occasional hum of awareness, like he’s deep in thought. And honestly? I don’t mind – his usual self-important attitude would be unbearable right now. I already know what he’d say: “𝐶𝑜𝑤𝑎𝑟𝑑. 𝐹𝑎𝑖𝑙𝑢𝑟𝑒. 𝑊𝑖𝑒𝑙𝑑𝑒𝑟 𝑢𝑛𝑤𝑜𝑟𝑡ℎ𝑦 𝑜𝑓 𝑚𝑦 𝑏𝑙𝑎𝑑𝑒.” I’ll probably have to deal with that later, anyway, but right now I have bigger problems… like not dying from hypothermia.’","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["thread",{"->":"ch4.in_cave"},"^, so I set Estoc down for a moment, letting my hands rest.","\n","^I glance down at him. It’s only then that I realise it’s not that he’s quiet; it’s more like he’s sulking. I feel slightly guilty about that but ignore it.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["thread",{"->":"ch4.before_scimi"},"^“Not even a single complaint? Thought you’d have something to say about hiding in a cave like a–”","\n","^He cuts me off before I can continue my sentence.","\n","^“I don’t lose.” His voice is low, almost a growl. “And yet, today, I’ve been made to look like a fool.”","\n","^“I never even signed up for this,” I retort.","\n","^“You literally did,” Estoc shoots back, pausing before continuing. “You should have fought harder…”","\n","^I feel a sharp pang of irritation, but I bite it back. There’s no time for that. Not now. Not when I already feel guilty enough.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^I shiver again, wrapping my arms around myself for warmth. I pick Estoc up again and stand back up, holding him like a torch. His azure glow lights up the cave as I take a cautious step forward. The deeper I go, the darker it becomes… until it doesn’t: I think I see something flickering in the distance.","\n","^In the far corner of the cave, there’s a faint red glow; it isn’t strong, but it’s enough to catch my attention. My breath catches, and I stop to make sure I’m not imagining it. But no, the further I walk, the stronger it gets – a low, pulsing light, casting warped shadows against the stone.","\n","^“This place…” Estoc murmurs, voice softer now.","\n","^I frown. “What?”","\n","^There’s a pause. I can feel him reaching for something – maybe a buried memory just out of reach.","\n","^“…We should not be here,” he states at last.","\n","^I roll my eyes. “It’s a cave, Estoc. Big deal.”","\n","ev","str","^‘Keep going.’","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^Another step. ","<>","\n","thread",{"->":"ch4.scimi_glow"},"^Estoc exhales sharply. “Charlie, we need to leave. Now. What is kept here is dangerous!”","\n","^The urgency in his voice sharpens, and for the first time, I can sense something almost… fearful in his tone. I ignore him; my instincts scream at me to turn back, ","ev",{"VAR?":"poss"},1,"==","/ev",[{"->":".^.b","c":true},{"b":["^to listen to Estoc, ",{"->":".^.^.^.14"},null]}],"nop","^but curiosity wins out and I can’t stop myself.","\n","^“Why? What’s so bad about a–”","\n","^I see it then: a ","<>","\n","thread",{"->":"ch4.scimi_desc"},"ev","str","^Continue","/str","/ev",{"*":".^.c-4","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"#f":5}],"g-4":["^“Charlie,” Estoc repeats again, his voice barely a whisper now, “you don’t understand. That sword… it’s Scimitar.”","\n","^I freeze in place.","\n","^Scimitar?","\n",{"->t->":"ch4.touch_scimi"},{"->":"h_ch4.sales_pitch"},{"#f":5}]}],{"#f":1}],"sales_pitch":[["^“Scimitar, you…” Estoc’s voice cuts through the madness, sharp and full of warning. “You’re still here.”","\n","^The evil sword doesn’t seem to hear him. Or maybe it just doesn’t care.","\n","^‘Charlie, he doesn’t seem well. That colour… We should leave.’ ","#","^CLASS: estoc","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["thread",{"->":"ch4.happy_scimi"},"^“…Wait. What’s that?” Its glow pulses, scanning me.","\n","^“Oh. Oh, no. No, no, no, no, no.” The joyous energy vanishes, replaced by pure disgust. “You have ℎ𝑖𝑚?”","\n","^I glance down at Estoc, who is practically vibrating in frustration and unease.","\n","^The crimson blade lets out a groan, filled with bitter disbelief. “You’ve got to be kidding me. Out of everyone… ℎ𝑖𝑠 wielder?!”","\n","^I don’t even know what to say to that.","\n","^“Well,” it purrs, “since you’re here anyway… you could always take me instead…”","\n","ev","str","^‘Ignore the creepy sword.’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘Considering…’","/str","/ev",{"*":".^.c-2","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"blue"},1,"+",{"VAR=":"blue","re":true},"/ev",{"->":".^.^.^.g-1"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","ev",{"VAR?":"likes_scimi"},1,"+",{"VAR=":"likes_scimi","re":true},"/ev","^‘Dumbass.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^“What? I don’t– no! I’m not picking you up!”","\n","^“Wait, you’re choosing that—that 𝑡ℎ𝑖𝑛𝑔 over me?” the scimitar sneers. “What does he even offer you that I don’t? Honour? Duty? How’s that working out for you, hmm? If you’re here, clearly 𝑠𝑜𝑚𝑒𝑡ℎ𝑖𝑛𝑔 went wrong.” Its tone shifts, softening. “But you… you don’t have to be like him. Just… just drop him. Pick me up, and I’ll make you unstoppable!” If it wasn’t just an evil, demonic sword, I’d almost think it sounded touch-starved.","\n","^“Charlie,” Estoc says, his tone clipped, “don’t listen to him. Either he is putting on an act or he has gone insane.”","\n","^“You mean it wasn’t insane before this?” I whisper.","\n","^“Let me guess. You’re going to gloat now, aren’t you? ‘Ohhh, look at me! I’m Estoc, I get wielded, I get to go on grand adventures while you 𝑟𝑜𝑡 𝑖𝑛 𝑎 𝑐𝑎𝑣𝑒!’”","\n","^“Shut up,” Estoc snaps, his glow flickering dangerously. “We are not here for you. We are here because it’s cold, and this was the first shelter we found. That is it. Sorry.”","\n","^There’s a pause. “…Oh.”","\n","^Scimitar sounds almost… disappointed? Like it wanted this to be about it. It seems to brush it off, though.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^“Let me guess: Estoc was just an accident, wasn’t he? So was finding me – what’s the difference?” Its voice drips with venom. “You think he’ll protect you forever? How long before he abandons you for another wielder, hmm? I can give you everything you’ve ever wanted: loyalty, power, control…”","\n","^I feel something stir in me – doubt and confusion. The promise of strength… Couldn’t that help me? But then, just as quickly, I feel a pang of guilt. Estoc hasn’t steered me wrong, hasn’t lied to me… right?","\n","^I roll my eyes, acting like its words hadn’t affected me at all. “Oh, wow. Never heard 𝑡ℎ𝑎𝑡 one before.”","\n","^“Come on,” it tries again, tone a little more desperate. “Don’t be difficult! Just one little decision, and you’d never have to be afraid again!”","\n","^I glance down at Estoc, the weight of his presence heavy in my hands. The thought of switching feels wrong. “Pass.”","\n","^“You’re not even listening!”","\n","^“I am,” I shout back. “I’m just choosing to ignore you.”","\n","^Scimitar makes an exaggerated gasp. “How dare you ignore me? I’ve been stuck here for nearly a century! But you wouldn’t get it – you’re pathetically mortal.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-4","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^I groan, rubbing my temples. “Look, can we do this in the morning?”","\n","^“Sure. Leave me alone again, just like everyone else.” Its voice wavers, and I swear, if swords could cry, it’d be doing it right now. “No one ever wants me. No one ever stays. You’ll just leave me here, cold and forgotten, forever…”","\n","^I stare at it; it sounds genuinely distressed. Before I can even process that, Estoc lets out a long, suffering sigh.","\n","^“Charlie, ignore him. It’s for the best.”","\n","^Scimitar sniffles. “Stop ignoring meeee!”","\n","^I lie down and roll onto my side, turning my back to it. “Goodnight.”","\n","^“No, no, no, don’t go to sleep! Come on! Pick me up! Just one time! Just one little touch! I swear, you won’t regret it!” The psychopath, now worried, begins to change tactics. The tone of his voice shifts to become softer and more desperate. “Please… Please, I just need someone… I’ve been so alone. You can’t leave me like this. You… You’re not going to leave me in this cave, are you? I– I can’t be left alone again… I can’t!”","\n","^The last words are strangled, half-choked with the sound of something that sounds like a sob – a pathetic, broken sound.","\n","^My breath catches. It sounds so real. Almost like it’s crying. Almost ℎ𝑢𝑚𝑎𝑛.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-5","flg":4},{"c-5":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"#f":5}],"g-4":["^“Charlie.”","\n","^No response.","\n","^“…Charlie?”","\n","^Nothing.","\n","^“CHARLIE, PLEASE!”","\n","^I squeeze my eyes shut, willing the voice away, but it’s still there, clinging to my thoughts like cobwebs. The sheer desperation in it makes my stomach twist uncomfortably. It sounds so… lost. So alone. But I know better: it’s a trick, it has to be.","\n","^“Please… I need you…”","\n","^I wrap my arms around myself, shivering slightly as I settle onto the cold ground. It’s not comfortable, but it’s better than nothing. The light from Estoc is warm against my skin, a quiet reassurance that, for now, I’m not alone (well, aside from the glowing red scimitar that likely won’t leave me alone when I wake up).","\n","^Eventually, my body gives in to exhaustion, and sleep pulls me under.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-6","flg":4},{"c-6":["^ ","#","^CLEAR","/#","\n",{"->":"h_ch4.next_morning"},{"#f":5}],"#f":5}]}],{"#f":1}],"next_morning":[["^When I wake, it’s to the faintest hint of light filtering into the cave, casting long shadows across the walls. For a moment, I forget where I am. Then the cold seeps back into my bones, and I remember everything.","\n","^I groan, stretching out my stiff limbs. “Great. Still in a creepy cave. Still freezing.”","\n","^Estoc hums in acknowledgement. “At least you didn’t wake up possessed.”","\n","^It’s then that I’m quickly reminded why Estoc made that comment.","\n","^“Oh, you’re awake!” Scimitar’s voice bursts through the cave, bright and eager, like a child who’s been waiting to open presents. “I missed you while you were asleep! It was so boring in here! So dark… But now you’re back, so come on, let’s talk.”","\n","^I groan, dragging a hand down my face. “Oh my gods.”","\n","^Estoc sighs heavily. “Charlie, do not engage.”","\n","^“Right, right.” I push myself to my feet; my muscles protest the movement, but I shake it off. “Let’s just get out of here.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^Scimitar gasps, scandalised. “Wait, you’re leaving already?”","\n","^“Yep,” I reply, walking toward the entrance. “Been fun. Let’s not do this again.”","\n","^“But we just met!” Scimitar whines. “You can’t just go! Just—just pick me up real quick. You won’t regret it!”","\n","^I don’t even slow down.","\n","^“You will regret it…” Estoc mutters under his breath.","\n","^“Charlie.” Something in its– his voice makes me pause. It’s not playful anymore; it’s small, raw. “Please.”","\n","ev","str","^‘It’s a monster. Don’t empathise with it!’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘You shouldn’t just abandon him.’","/str","/ev",{"*":".^.c-2","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"blue"},3,"+",{"VAR=":"blue","re":true},"/ev","ev",{"VAR?":"likes_scimi"},3,"-",{"VAR=":"likes_scimi","re":true},"/ev",{"->":".^.^.^.g-1"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"f()":"humanise_scimi"},"pop","/ev","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","ev",{"VAR?":"green"},2,"+",{"VAR=":"green","re":true},"/ev","ev",{"VAR?":"likes_scimi"},2,"+",{"VAR=":"likes_scimi","re":true},"/ev",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^I exhale sharply, forcing myself to keep moving.","\n","^‘Don’t listen. Don’t fall for it.’ ","#","^CLASS: charlie","/#","\n","^But my steps falter. I glance back, just for a second. ","ev",{"VAR?":"s_His"},"out","/ev","^ glow is dimmer now, a soft ember against the stone, flickering like it might go out completely. Alone. Forgotten.","\n","^“Charlie, no,” Estoc warns.","\n","^I turn around anyway.","\n","^The cave feels heavier as I step toward ","ev",{"VAR?":"s_him"},"out","/ev","^, like the air itself is thickening. ","ev",{"VAR?":"s_He"},"out","/ev","^’s right there, waiting. I glance over at Estoc; he says nothing, but I know he’s not okay with this. I probably shouldn’t be, either, but… there’s this nagging curiosity.","\n","^Estoc speaks again. “Don’t do this.”","\n","^I don’t answer. Not yet.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^The closer I get, the more I notice the cracks along Scimitar’s blade, thin and jagged like old lightning scars.","\n","^‘Is that from Estoc? I didn’t see him use electricity in combat…’ ","#","^CLASS: charlie","/#","\n","^I stop just a foot away. ","ev",{"VAR?":"s_He"},"out","/ev","^ doesn’t speak; ","ev",{"VAR?":"s_he"},"out","/ev","^ doesn’t beg; ","ev",{"VAR?":"s_he"},"out","/ev","^ just waits.","\n","^‘What do you think, ","ev",{"f()":"p_nick"},"out","/ev","^? Shall I pick ","ev",{"VAR?":"s_him"},"out","/ev","^ up?’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Hell yes! He looks way cooler than that annoying other one!’","/str",{"VAR?":"s_he"},"str","^he","/str","==","/ev",{"*":".^.c-4","flg":5},"ev","str","^‘What? No! Did you forget that ","ev",{"VAR?":"s_he"},"out","/ev","^’s an 𝑒𝑣𝑖𝑙 sword?! Just ","ev",{"VAR?":"s_he"},"str","^he","/str","==","/ev",[{"->":".^.b","c":true},{"b":["^ shove him somewhere for safekeeping.",{"->":".^.^.^.67"},null]}],[{"->":".^.b"},{"b":["^leave it there for safety.",{"->":".^.^.^.67"},null]}],"nop","^’","/str","/ev",{"*":".^.c-5","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","ev",{"VAR?":"likes_scimi"},2,"+",{"VAR=":"likes_scimi","re":true},"/ev","ev",{"VAR?":"scim_serrie"},1,"+",{"VAR=":"scim_serrie","re":true},"/ev",["ev",{"VAR?":"poss"},1,"==","/ev",{"->":".^.b","c":true},{"b":["\n",{"->":"h_ch4.ban_scimi"},{"->":".^.^.^.26"},null]}],["ev",{"VAR?":"likes_serrie"},0,"<","/ev",{"->":".^.b","c":true},{"b":["\n",{"->":"h_ch4.ignore_serrie"},{"->":".^.^.^.26"},null]}],[{"->":".^.b"},{"b":["\n",{"->":"v_ch4"},{"->":".^.^.^.26"},null]}],"nop","\n",{"#f":5}],"c-5":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"blue"},1,"+",{"VAR=":"blue","re":true},"/ev","ev",{"VAR?":"scim_serrie"},1,"-",{"VAR=":"scim_serrie","re":true},"/ev",{"->":"h_ch4.pick_estoc"},{"#f":5}],"#f":5}]}],{"#f":1}],"ban_scimi":["^‘Actually, on second thought… That’s a terrible idea.’ ","#","^CLASS: charlie","/#","\n","^‘Why was I silly enough to even consider that?’ ","#","^CLASS: estoc_p","/#","\n",{"->":".^.^.pick_estoc"},{"#f":1}],"ignore_serrie":["^‘Of all your ideas, that was probably the worst. Why’d I even ask for your advice at this point?’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.pick_estoc"},{"#f":1}],"pick_estoc":[["ev",{"VAR?":"blue"},1,"+",{"VAR=":"blue","re":true},"/ev","ev",{"VAR?":"inv"},{"VAR?":"scimitar"},"+",{"VAR=":"inv","re":true},"/ev","^‘","ev",{"CNT?":"h_ch4.ban_scimi"},{"CNT?":"h_ch4.ignore_serrie"},"||","/ev",[{"->":".^.b","c":true},{"b":["^Whatever","ev",{"CNT?":"h_ch4.ban_scimi"},"/ev",[{"->":".^.b","c":true},{"b":["^ , I still need a solution here",{"->":".^.^.^.5"},null]}],"nop","^. O",{"->":".^.^.^.20"},null]}],[{"->":".^.b"},{"b":["^Well, o",{"->":".^.^.^.20"},null]}],"nop","^n my person is kind of safe, right?’ ","#","^CLASS: charlie","/#","\n","^“Alright,” I murmur, “I’ll take you.”","\n","^I take a deep breath, ignoring the part of me that already regrets this, and step closer. Scimitar practically vibrates in excitement, now talking like ","ev",{"VAR?":"s_he"},"out","/ev","^’s calling a cat. “Oh yes, that’s right! Come on, just reach out…”","\n","^I pick ","ev",{"VAR?":"s_him"},"out","/ev","^ up… Sort of.","\n","^Not by the hilt, obviously: I’m not stupid. Instead, I grab the scabbard next to ","ev",{"VAR?":"s_him"},"out","/ev","^ – someone must have conveniently left it here when they sealed ","ev",{"VAR?":"s_him"},"out","/ev","^ away – and slide ","ev",{"VAR?":"s_him"},"out","/ev","^ inside with the least amount of touching possible (I only barely hold onto the pommel with two fingers). There, safe and contained.","\n","^Scimitar practically vibrates with joy. “Oh, yes, yes, yes! You won’t regret this, wielder! This is going to be amazing!”","\n","^I hoist ","ev",{"VAR?":"s_him"},"out","/ev","^ up, securing the scabbard at my waist, Scimitar being the opposite side to Estoc. “Right, sure. Let’s get moving.”","\n","^I don’t even take two steps before Scimitar goes completely still. “…Wait. Why aren’t you holding me? You’re keeping me sheathed?!” His voice rises in pitch, incredulous.","\n","^“Well,” I say, stepping toward the cave entrance, “this way, I get to keep an eye on you while letting you come with me outside, and you don’t get to do whatever weird evil mind-trick stuff you’re probably capable of. I’d call that a win-win.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^Estoc is quiet, but I can feel his frustration simmering beneath the surface. Scimitar, on the other hand, does not take this well.","\n","^“What? NO! You’re supposed to swing me in battle – not keep me in a glorified sock!”","\n","^“Too bad,” I say, stepping out of the cave and into the cold morning air.","\n","^“You absolute imbecile! I waited ninety-seven years for this, just to be carried like decoration?!”","\n","^“If you don’t shut up,” I interrupt, “I will personally walk back over to that rock and put you right back where I found you.”","\n","^“Wait–”","\n","^I take one step forward.","\n","^“WAIT, NO, NO! I WAS JOKING!” ","ev",{"VAR?":"s_His"},"out","/ev","^ voice cracks in panic. “I– I didn’t mean it! You can carry me! That’s fine! Completely fine! I LOVE being carried!”","\n","^I narrow my eyes. “Uh-huh.”","\n","^“Please don’t put me back in there,” ","ev",{"VAR?":"s_he"},"out","/ev","^ whispers, ","ev",{"VAR?":"s_his"},"out","/ev","^ voice so quiet it almost disappears in the morning breeze. “…It’s so dark.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^“Why did you even take him?” Estoc questions, barely trying to control his anger.","\n","^I sigh. “Because.”","\n","^“That is not an answer.”","\n","^“It’s an answer,” I reply, “just not a good one.”","\n","^The words are barely out before Estoc lets out a loud, exasperated noise. “Charlie, I swear, you are the worst decision-maker I have ever met. Whatever is in that half a brain of yours, making your decisions, is either an idiot or a demon… or both.”","\n","ev","str","^‘Rude…’","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^‘Fair enough.’","/str","/ev",{"*":".^.c-3","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^“I don’t need your approval,” I reply, adjusting my grip on him and trying to ignore the almost suffocating heat from my chest – as quick as it came, it left.","\n","^‘I can’t tell if he was being serious with what he said or not – probably not, since if he knew I talked to a made-up voice in my head, he’d 𝑙𝑖𝑘𝑒𝑙𝑦 be a lot more horrified.’ ","#","^CLASS: charlie","/#","\n","^“Yes, you do, because you have the judgement of a rotting fish.”","\n","^Scimitar sneers, acting almost as if that insult was aimed at ","ev",{"VAR?":"s_him"},"out","/ev","^ instead of me. “At least I’m not a self-righteous, pompous toothpick who–”","\n","^“Here we go…”","\n","^“That’s it!” I start walking. “I am not spending my morning listening to two magical swords argue like petulant children.”","\n","^Estoc scoffs. “Children?! I am over 500 years old!”","\n","^“And I’m 119!”","\n","^‘119? But isn’t 119 - 97…’ ","#","^CLASS: charlie","/#","\n","^“Scimitar! Estoc! Shut up!” I snap, louder this time.","\n","^They actually stop talking… for two whole seconds. Then, a mutter: “Still the ugliest weapon I’ve ever seen.”","\n","^“You no-good red–” Estoc cuts himself off before he can say anything too bad.","\n","^I press my fingers to my temples. “Gods, I hate this.”","\n","^They don’t acknowledge me, too busy bickering like siblings. Estoc should be above this. He’s not.","\n","ev","str","^‘What did you expect?’","/str","/ev",{"*":".^.c-4","flg":4},"ev","str","^‘He has to get off 𝑠𝑜𝑚𝑒ℎ𝑜𝑤.’","/str","/ev",{"*":".^.c-5","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"c-5":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","ev",{"VAR?":"likes_scimi"},1,"+",{"VAR=":"likes_scimi","re":true},"/ev","^‘Pfft… True!’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^I sigh heavily, trudging through the wilderness. This is my life now: just me, two talking weapons, and an ever-growing headache. I glance toward the sky, hoping for some kind of divine intervention. A bolt of lightning. A sudden earthquake. 𝑆𝑜𝑚𝑒𝑡ℎ𝑖𝑛𝑔 to shut them up.","\n","^Nothing happens. Figures.","\n","^The forest stretches out before me, quiet and endless. I need to check on my village after that whole ordeal yesterday. Hopefully it’s in one piece, but I can’t help but think I’m being too hopeful… I try not to think about it.","\n","^‘Well, that was an absolute disaster. Good job, inner voice. You had one job: don’t make things worse. And what do you do? You double our problems. Brilliant. Spectacular.’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘","ev",{"VAR?":"s_he"},"str","^he","/str","==","/ev",[{"->":".^.b","c":true},{"b":["^You’re the one who listened to me.",{"->":".^.^.^.23"},null]}],[{"->":".^.b"},{"b":["^Hey, that was your idea, not mine!",{"->":".^.^.^.23"},null]}],"nop","^’","/str","/ev",{"*":".^.c-6","flg":4},{"c-6":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"#f":5}],"g-4":["^‘Whatever. At least it can’t get any worse…’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘It will absolutely get worse.’","/str","/ev",{"*":".^.c-7","flg":4},{"c-7":["^ ","#","^CLEAR","/#","\n",{"->":"h_ch4.village"},{"#f":5}],"#f":5}]}],{"#f":1}],"village":[["^The walk is long. Longer than I remember.","\n","^I don’t know why I thought it’d be quick – maybe some part of me still thinks of this place as close, like I never really left – but everything feels distant now. The trees are taller, the undergrowth thicker, and the path barely recognisable beneath layers of fallen leaves and time. And yet, my feet know where to go. Like they were always meant to bring me back.","\n","^The forest is quiet, save for the sound of my own footsteps. You’d think travelling with two enchanted, petty swords would be a nightmare, but after a while, they just… stopped arguing. Maybe they got bored; maybe they realised I wasn’t listening. Either way, only the rustling leaves and the crunch of my boots remain.","\n","^It should be peaceful. It’s not.","\n","^The further I walk, the more the wrongness settles in my stomach, heavy and sick. My hands clench at my sides. Each step feels heavier.","\n","^Then, the hill slopes down before me, revealing what’s left of my home.","\n","^Or rather, what isn’t left.","\n","^Where there should have been homes and streets and people, there is nothing but ruin. Charred beams jut from the earth like broken bones. The buildings – what remains of them – are crumbled, blackened. The well at the village centre is cracked down the middle, its stones stained with soot. There’s no movement, no sound, no life at all.","\n","^Maybe there’s someone left. Maybe there’s a trace of something familiar.","\n","^I scan the wreckage. Nothing.","\n","^I don’t realise I’m clenching my fists until my knuckles ache.","\n","^‘My mother was here when it happened.’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘And now she’s not.’","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^There’s no body, no proof, no final confirmation, but I don’t need it. No one could have survived this, and even if they had, they’d be long gone; no point standing here like an idiot.","\n","^But I stay anyway, rooted as the truth fully sinks in. Whatever hope I carried here – whatever miracle I secretly believed in – died right here on this hill. I take another step forward, and the ground crunches beneath my foot. It sounds too loud, like it doesn’t belong here. Like I don’t.","\n","^“I thought… maybe—maybe some of them would still be here…”","\n","^Silence. I almost think you’re gone now, too, but you’re still here: watching, waiting.","\n","^“Well, that’s it. It’s all gone,” I whisper to myself, unable to stop the flood of emotions rushing in. It feels like the last thread tying me to this place has snapped, leaving me untethered.","\n","^Scimitar, of course, doesn’t notice the weight of the moment, and somehow sounds even more excited than usual. “Oh, wow! Look at this! What happened here? A dragon, maybe? Or… wait. Did you do this?!”","\n","^I can’t help but groan. “No, this wasn’t me. This was… someone else. Her name was Autumn.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^The evil weapon falls quiet, realising that the situation isn’t quite as fun as ","ev",{"VAR?":"s_he"},"out","/ev","^ thought. “Wait… This was your home, wasn’t it?” I can feel the comment ","ev",{"VAR?":"s_he"},"out","/ev","^ wants to make, the joke lingering at the tip of ","ev",{"VAR?":"s_his"},"out","/ev","^ non-existent tongue, but ","ev",{"VAR?":"s_he"},"out","/ev","^ doesn’t say it. I don’t think it’s out of respect – I doubt ","ev",{"VAR?":"s_he"},"out","/ev","^’s capable of that – but…","\n","^“…You gonna be okay?” ","ev",{"VAR?":"s_he"},"out","/ev","^ asks, after a moment. ","ev",{"VAR?":"s_His"},"out","/ev","^ voice is surprisingly soft – not kind, exactly, but not mocking either. It’s something.","\n","^“I don’t need your pity,” I speak a bit harsher than I intended, but I can’t bring myself to care.","\n","^“It’s not pity, it’s…” ","ev",{"VAR?":"s_He"},"out","/ev","^ trails off. “Okay, yeah, it’s probably pity. But I’m trying, okay! And anyway, why didn’t Estoc fix it? He literally has the power to–”","\n","^Scimitar is cut off abruptly…","\n","^‘What happened? Well, that…’ ","#","^CLASS: charlie","/#","\n","^‘…wasn’t that weird. Let’s just move on.’ ","#","^CLASS: estoc_p","/#","\n","^I barely hear Estoc when he mutters, “I should have stopped this.”","\n","^“I-I should have, too…”","\n","^The wind shifts, carrying the faintest scent of smoke. My fists clench tighter. My mother, my people… They were all here when this happened. Were they still alive when the fires started? Did they run? Were they–","\n","^I shut my eyes and breathe, the ground feeling unsteady beneath me. I want to say something – I should say something – but the words won’t come. And then you decide to chime in, because of course you do.","\n","ev","str","^‘Oh wow, this is actually kind of sad. That’s your whole village – your whole life – gone. Forever. That’s rough, buddy.’","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^‘It’s going to be okay, got it? We’ll bring Autumn to justice.’","/str","/ev",{"*":".^.c-3","flg":4},"ev","str","^‘On the bright side, your mum can’t nag you anymore. It’s something, right? You should be thanking Autumn, really. …No? Too soon?’","/str","/ev",{"*":".^.c-4","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},5,">","/ev",[{"->":".^.b","c":true},{"b":["\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev",{"->":".^.^.^.12"},null]}],[{"->":".^.b"},{"b":["\n","ev",{"VAR?":"green"},1,"+",{"VAR=":"green","re":true},"/ev",{"->":".^.^.^.12"},null]}],"nop","\n",{"->":"h_ch4.mourning"},{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"green"},3,"+",{"VAR=":"green","re":true},"/ev",{"->":"h_ch4.mourning"},{"#f":5}],"c-4":["^ ","#","^CLEAR","/#","\n",{"->":"h_ch4.intrusive_thoughts"},{"#f":5}],"#f":5}]}],{"#f":1}],"mourning":[["ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","^You don’t say anything else. I can feel you hovering in the back of my mind, awkward and unsure, but even so… I’m glad you said something. Even if it was clumsy, at least you tried.","\n","^I don’t reply; I just stand there, letting the weight of it all settle on my shoulders. For a moment, no one says anything.","\n","^Scimitar’s voice breaks the quiet. “Hey. Hey, come on now. Don’t look like that, future wielder. You’ll get your sweet, sweet revenge later! Think about it: Autumn’s head rolling down a hill, you standing victorious, covered in glory, vengeance and possibly flames… I mean, the flames are optional but encouraged.” A beat. “A-anyway, doesn’t that make you feel a little better?”","\n","^I sniff, turning slightly. “Are you seriously trying to cheer me up with murder?”","\n","^“Not 𝑗𝑢𝑠𝑡 murder. Revenge. Completely different category!” ","ev",{"VAR?":"s_he"},"out","/ev","^ says, now getting back into ","ev",{"VAR?":"s_his"},"out","/ev","^ usual, cocky tone, but still trying to sound comforting in ","ev",{"VAR?":"s_his"},"out","/ev","^ own twisted way. “Just imagine it! Closure. Catharsis. Fireworks. You’ll feel amazing!”","\n","ev","str","^‘Psychopath.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘Well, at least he’s trying.’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘Wow… I have no idea what I was expecting, exactly.’","/str","/ev",{"*":".^.c-2","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},3,">","/ev",[{"->":".^.b","c":true},{"b":["\n","ev",{"VAR?":"scim_serrie"},1,"-",{"VAR=":"scim_serrie","re":true},"/ev",{"->":".^.^.^.12"},null]}],[{"->":".^.b"},{"b":["\n","ev",{"VAR?":"scim_serrie"},1,"+",{"VAR=":"scim_serrie","re":true},"/ev",{"->":".^.^.^.12"},null]}],"nop","\n",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"likes_scimi"},2,"+",{"VAR=":"likes_scimi","re":true},"/ev",{"->":".^.^.g-0"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^Estoc groans audibly from the other side of me. “Gods, you’re insufferable.” Then, more directed at me: “Don’t listen to him. Revenge should not be your goal. Justice, maybe, but not vengeance – it won’t bring them back, and it won’t make you whole again. We will make her answer for this, but you are not going to crawl out of this grief by fantasising about her blood… or continuing to wallow in the dirt.”","\n","^“I’m not–” I cut myself off, wiping at my eyes again. “Whatever. Just… drop it.”","\n","^“…I didn’t mean to make it worse,” Scimitar mumbles.","\n","^“Neither did I,” Estoc adds, the frustration melting into something softer. “You don’t have to carry all of this alone.”","\n","^“S-sorry, I didn’t mean to snap…”","\n","^“Don’t apologise,” Estoc says, blunt but not unkind. “You have lost something irreplaceable.”","\n","^Scimitar scoffs. “No, they’ve lost everything. There’s a difference.”","\n","^“Enough!” Estoc cuts in, sharp.","\n","^The silence returns, heavier than before. But this time, it doesn’t feel quite as lonely.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":"h_ch5"},{"#f":5}],"#f":5}]}],{"#f":1}],"intrusive_thoughts":[["ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","ev",{"VAR?":"likes_serrie"},2,"-",{"VAR=":"likes_serrie","re":true},"/ev","ev",{"VAR?":"scimi_sus"},2,"+",{"VAR=":"scimi_sus","re":true},"/ev","ev",{"VAR?":"likes_scimi"},1,"+",{"VAR=":"likes_scimi","re":true},"/ev","ev",{"VAR?":"scim_serrie"},1,"-",{"VAR=":"scim_serrie","re":true},"/ev","^I stare down at the village – what’s left of it, anyway – and something inside me snaps.","\n","^‘That’s what you went with?! Everyone’s dead, my home is gone, and you think now’s the time to joke about how I won’t get nagged anymore?! What kind of twisted, sadistic–’ ","#","^CLASS: charlie","/#","\n","^My fists clench. I want to scream, but the sound catches somewhere between fury and something else I cannot even name. I grit my teeth. Maybe it shouldn’t surprise me – you’re just… you: that irritating little parasite living in my head.","\n","ev","str","^‘I’m just saying what we’re both thinking. Don’t pretend part of you didn’t want to say it.’","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^‘No, 𝑦𝑜𝑢 wanted to say it.’ ","#","^CLASS: charlie","/#","\n","^But even as I think it, I feel the lie in it. Because the worst part?","\n","^You’re not entirely wrong.","\n","^I should be furious – and I am – but beneath the anger, your voice has already burrowed in. She drove me mad. Always worrying, always hovering. Gods, she could nag like it was her job. But… she cared. And now she’s… gone.","\n","^‘And I never even got that stupid pie.’ ","#","^CLASS: intrusive","/#","\n","^I look out at the wreckage, and another thought creeps in – not mine, but also 𝑚𝑖𝑛𝑒:","\n","^‘Would it really be that bad if they were all gone?’ ","#","^CLASS: intrusive","/#","\n","^I shove it down. Still, guilt gnaws at the edges of my mind. Maybe it is just grief twisting me inside out. At least, I hope so. Still, a part of me feels lighter now. I hate it; I hate you for giving it a voice.","\n","ev","str","^‘Honestly, I feel bad. Not for her, but for you – you really wanted that pie.’","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^‘That was just an intrusive thought!’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘And I’m just the voice that noticed. But let’s be honest, the pie’s the real tragedy here.’","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["ev",{"f()":"humanise_scimi"},"pop","/ev","\n","ev","str","^Scimi","/str","/ev",{"VAR=":"s_nick","re":true},"^‘You’re meant to be my conscience, not… whatever this is. Even Scimi’s better than this!’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Oh, so ℎ𝑒 gets a cute nickname now? That’s nice. No, really. “Scimi” gets a pet name, but I stay “conscience”, like something out of a philosophy textbook.’","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n","ev",true,"/ev",{"VAR=":"serrie_wants_nick","re":true},{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^I wince. I didn’t mean to make you jealous – didn’t even know you 𝑐𝑜𝑢𝑙𝑑 be jealous.","\n","^‘I didn’t–’ ","#","^CLASS: charlie","/#","\n","^“Okay,” Scimi’s voice slices in, “I’ve been trying to ignore this whole dramatic mental breakdown, but seriously, what is going on in there?”","\n","^I flinch. Right, mind-reading swords.","\n","^“I mean, you are thinking 𝑙𝑜𝑢𝑑. You alright?”","\n","^“Charlie?” Estoc’s voice is wary.","\n","^“I’m fine,” I lie. “Just… thinking.”","\n","^Scimitar hums. “Sure you were. Because really, it sounded like a lovers’ spat with your own brain. Should I be concerned? Should Estoc be concerned? Also…” His tone shifts, “are you genuinely that upset about a pie?”","\n","^I stare at him. “What?”","\n","^“I caught that. Don’t lie. Grieving’s one thing, but really? You’re thinking about a pie you didn’t get?”","\n","^Estoc says nothing, but I feel the weight of his silence. Judging? Concerned? Maybe both.","\n","^Scimi presses. “What’s the deal? Was it a legendary pie or something?”","\n","^The words are out before I can stop them. “She was making it for me. One of the last things she ever said to me was that she was going to bake me one. And now? Gone. Everything. And no pie, either!”","\n","^Scimitar whistles, low. “Right, so the pie really was that important.”","\n","^“Yes! I mean no! I don’t know!” My voice cracks halfway through, the frustration boiling over into something messier, hotter. He was probably being sarcastic, but it doesn’t matter right now. “It’s stupid, I know, but it was going to be mine. And now it’s just… just one more thing I never got.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-4","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"#f":5}],"g-4":["^I wipe angrily at my face before any tears have time to fall. He wouldn’t understand; I don’t think he can hear you – at least not properly, not the way I do.","\n","^Estoc finally speaks, cautiously. “Are you all right?”","\n","^“Do I 𝑙𝑜𝑜𝑘 all right?” I snap back, harsher than I mean to.","\n","^“I merely meant…” Estoc hesitates. “I can feel your anger. It is sharp. Unfocused. I believed it was directed at Autumn, but now… I am unsure. You must be careful: such rage does not guide; it devours.”","\n","^I look away. I don’t answer him, because I don’t know how to. All I know is I’m angry: at the world, at fate, at myself, at you. I should be mourning. Instead, I’m annoyed, frustrated, tired, and yes, a little bitter about a pie I never got.","\n","^What the hell is wrong with me?","\n","^Scimitar shifts, voice softening – well, soft for him, anyway. “Look, I get it. You’re upset about your mother, and the pie was just the last thing holding you together. That’s fair. But hey, at least now we’ve got a new reason to kill Autumn, right?”","\n","^Estoc groans. “Gods, Scimitar…”","\n","^“I’m helping,” Scimitar insists, though he sounds less sure of it now. “Let them mourn the pie if they want to. It’s, uh, symbolic. Right?”","\n","^“…Sure.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-5","flg":4},{"c-5":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-5"},{"#f":5}],"#f":5}],"g-5":["^Estoc lets out a tired sigh. “You are an idiot.”","\n","^Scimitar makes a sputtering noise. “Well, no offence, knight-boy, but if somebody torched everything I loved 𝑎𝑛𝑑 denied me dessert, 𝐼’𝑑 be going on a warpath too.” He sighs. “Look, the point is, Autumn’s not getting away with this. We’ll kill her, you’ll feel better, and then maybe we can make our own pie after with her blood as the filling!”","\n","^“You have a deeply worrying definition of ‘culinary art’…” Estoc comments, before finally saying his piece to me: “Charlie, you are not going to heal by killing her. That is not how grief works.”","\n","^“Says you,” Scimitar huffs. “I always feel great after murder.”","\n","^Estoc ignores him, voice low but firm. “Justice will come, but if you let vengeance shape you, you will become no better than she or he is.”","\n","^I don’t say anything; I just stand there, breathing hard and shaking slightly. Not from fear, but from rage, from loss, from that gnawing little voice that won’t let go of what I didn’t get. A single tear slips down my cheek, but I brush it away before the others can notice. Or, at least, I pretend they don’t.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-6","flg":4},{"c-6":["^ ","#","^CLEAR","/#","\n",{"->":"h_ch5"},{"#f":5}],"#f":5}]}],{"#f":1}],"#f":1}],"h_ch5":[{"->":".^.start"},{"start":[["thread",{"->":"ch5"},"^Estoc speaks first. “We should move.”","\n","^“I know. There’s nothing left here.”","\n","^“There is a town not far: Knightsward, if you have ever been there. It is where I am usually kept when not being wielded. Sort of a base of operations.”","ev",{"VAR?":"public_insanity"},"/ev",[{"->":".^.b","c":true},{"b":["^ A pause. “And, if you lose your mind completely, I can probably find a better wielder there – one who preferably doesn’t argue with voices in their head.”",{"->":".^.^.^.11"},null]}],"nop","\n","ev",{"VAR?":"public_insanity"},"/ev",[{"->":".^.b","c":true},{"b":["^I ignore that comment. ",{"->":".^.^.^.17"},null]}],"nop","^“Yeah, I visited once, but it was when I was younger. It’s a nice place, but too busy for me to want to go there often, since it’s a capital.”","\n","^“Oh, good,” Scimitar mutters. “Can’t wait to meet the Estoc Appreciation Society. Also, its name sounds like a pun.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^“There’s one issue,” Estoc says. “If they see him, they might assume you’re hostile.”","\n","^Scimitar scoffs. “Please. I’ve been stuck in a cave for a century. No one even remembers–”","\n","^“They remember,” Estoc cuts in sharply. “You made sure of that.”","\n","^Scimitar falls uncharacteristically silent.","\n","^“But I can vouch for you,” Estoc adds. “Probably. Depends on how weird you act.”","\n","^“Wow,” Scimitar says, mock offended. “Didn’t realise just existing was such a red flag.”","\n","^“You 𝑎𝑟𝑒 a cursed weapon,” I point out.","\n","^“I prefer ‘charmingly misunderstood’.”","\n","^I shake my head and start down the ruined slope.","\n","ev","str","^‘Oh, good. More walking. Riveting.’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘Nothing. Just saying, if this were a storybook, then it’s lost the plot.’","/str","/ev",{"*":".^.c-2","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n","^‘…What?’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^I roll my eyes but keep moving. ","ev",{"VAR?":"likes_serrie"},0,"<","/ev",[{"->":".^.b","c":true},{"b":["^It’s not the most ridiculous thing you’ve said lately, after all",{"->":".^.^.^.8"},null]}],[{"->":".^.b"},{"b":["^Either I’m losing it, or you’re getting weirder… and more talkative for some reason",{"->":".^.^.^.8"},null]}],"nop","^.","\n","^The trees begin to thin, the sun dipping low behind the forest as the tall outer wall of the city looms ahead. A gate stands in the centre of said wall, thick, heavy, and closed, and 2 figures stand either side of it – probably guards. I stop just short of the clearing, staring at the gate.","\n","^“Well,” I say, mostly to myself. “Here goes nothing.”","\n","^As I approach the gate, the guards straighten.","\n","^“Halt,” one of the guards shout, hand already on his spear. “State your business in Knightsward.”","\n","^Scimitar snickers. “Say you’re here to overthrow the government. Really sets expectations.”","\n","^I ignore ","ev",{"VAR?":"s_him"},"out","/ev","^. “My village was attacked,” I say, pitching my voice louder. “We need help. Medical aid. Somewhere not on fire.”","\n","^There’s a beat of silence. Then, the guard’s eyes flick to my side – more specifically, to the swords.","\n","^“That’s… Estoc,” he says slowly.","\n","^Estoc’s voice carries, clear and authoritative. “It is, and I vouch for this wielder. Open the gate.”","\n","^The guard stiffens immediately. “Y-yes, sir.” He hesitates, squinting harder. “But that other one…”","\n","^“Oh, come on,” Scimitar mutters. “I haven’t even said hello yet.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^“I-is that Scimitar?!” someone whispers in pure horror, like they’ve just seen a ghost crawl out of its grave. “I thought it was just a myth!”","\n","^Several crossbows are now aimed directly at my chest.","\n","^I raise my hands on instinct. “Okay, listen. Technically, this is ","ev",{"VAR?":"s_him"},"out","/ev","^, but–”","\n","^“It was sealed,” the guard shouts accusingly.","\n","^“He is contained,” Estoc cuts in, his voice hardening. “He is not in control, and if he were, this city would already be burning.”","\n","^Scimitar snorts. “Rude. Also, untrue: I’d leave some survivors to tell of my feats first!”","\n","^“Scimi,” I hiss. “Please, for once in your life.”","\n","^A long, tense silence stretches across the gate. Finally, a forceful voice calls out from behind the guards.","\n","^“Bring them inside.”","\n","^“Captain–”","\n","^“I said bring them inside!” the guards’ captain(?) repeats. “I trust Estoc’s judgement. However, if that cursed thing so much as flickers, I want every ward in this city lit.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-4","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":"h_ch5.meet_rina"},{"#f":5}],"#f":5}]}],{"#f":1}],"meet_rina":[["^The gate opens, and we’re promptly allowed in. It is then that I see the captain fully. ","<>","\n","thread",{"->":"ch5.rina_desc"},"^Her expression sits somewhere between exhausted and deeply unimpressed, which honestly feels fair given the situation.","\n","^“Ohhh, she looks fun. I bet she’d scream nicely!”","\n","^“","ev",{"VAR?":"s_nick"},"out","/ev","^,” I mutter.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^The captain ignores ","ev",{"VAR?":"s_him"},"out","/ev","^. “Either you’re the bravest person I’ve seen, or the stupidest.”","\n","^“Bit of column A, bit of column B.”","\n","^One of the guards chokes, and the captain’s mouth twitches despite herself. “You’re coming with me. Slowly. No sudden movements, no glowing, no chanting, and no ancient curses waking up.","\n","^“I can’t promise anything about ","ev",{"VAR?":"s_him"},"str","^him","/str","==","/ev",[{"->":".^.b","c":true},{"b":["^him",{"->":".^.^.^.21"},null]}],[{"->":".^.b"},{"b":["^that",{"->":".^.^.^.21"},null]}],"nop","^,” I say, pointing towards Scimitar, “but I don’t chant.”","\n","^“That’s a shame,” Scimitar mutters. “You’d look great chanting.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^The captain sighs. “I’m Captain Rina. By authority of Knightsward, you are to be escorted to the keep – the king will want an explanation. A thorough one.”","\n","^As we’re led through the city, guards flanking us on all sides, nearby eyes lock onto the swords at my sides like they’re magnets for bad decisions.","\n","^‘Two swords. Both of them. Yeah, I get it already. Can they just stop looking at me? Surely they would’ve forgotten ","ev",{"VAR?":"s_nick"},"out","/ev","^ by now – it’s been almost a century! Then again, I can’t exactly judge…’ ","#","^CLASS: charlie","/#","\n","^Eventually, we reach the keep. Stone steps, banners, the whole intimidating package. The captain stops at the doors and looks back at me.","\n","^“For what it’s worth,” she says quietly, “if Estoc hadn’t spoken up, you’d be in irons by now.”","\n","^Estoc’s voice is calm. “Your restraint is noted.”","\n","^Scimitar sounds almost dejected. “Mine isn’t…”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^We’re taken through the keep gates, up a frankly unnecessary number of stairs, and ","<>","\n",{"->t->":"ch5.with_king"},{"->":"h_ch5.with_king"},{"#f":5}]}],{"#f":1}],"with_king":[["^Silence fills the hall.","\n","^The king leans back slowly. “You do realise that carrying both blades makes you one of the most dangerous individuals on the continent.”","\n","^Scimitar hums approvingly; Estoc does not. “Charlie did not seek power. Circumstance forced their hand.”","\n","^The king leans back, studying me like a puzzle he’s not sure he enjoys. “Well, you did walk into my city, and instead of burning the place down, you asked for help.”","\n","^“Low bar, but yes,” I comment.","\n","^A ghost of a smile tugs at his mouth. “Very well, Charlie of the ashes. For now, you are our guest. You will be given food, rest, and doctors if you need them. Tomorrow, we will decide what to do.”","\n","^“Aww, he likes us!” Scimitar shouts out.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^As guards step forward to escort me away, Estoc’s voice softens, just for me. “You did well.”","\n","^“You actually… complimented me?”","\n","^“I do give compliments when they are deserved. They are just kept limited so that they mean something from me, unlike 𝑠𝑜𝑚𝑒 people. I may be hard on you, but that is only because I wish for you to become the best hero you can be.”","\n","^“…Thank you. I… appreciate it.”","\n","^‘More than he’d know…’ ","#","^CLASS: charlie","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":"ch6"},{"#f":5}],"#f":5}]}],{"#f":1}],"#f":1}],"n_ch4":[{"->":".^.to_cave"},{"to_cave":[["thread",{"->":"ch4"},"ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^I sigh and keep moving, my arms wrapped tightly around myself. I don’t have a weapon anymore. That thought gnaws at the back of my mind, a constant, dull awareness.","\n","^I gave him up. I handed Estoc over to Autumn.","\n","^The decision should’ve given me relief, or at least some kind of certainty, but instead, there’s just this… hollow feeling. I don’t miss his attitude, his constant judging, or his lectures. And yet, the silence feels too big now.","\n","^I push the thought away. It doesn’t matter, and I don’t have time to dwell on it.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["thread",{"->":"ch4.in_cave"},"^.","\n","^I have nothing to hold onto and no glowing weapon to light the way.","\n","^I try not to think about it.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["thread",{"->":"ch4.before_scimi"},"^Then, deeper in the cave, something flickers.","\n","^I frown. “What…?”","\n","thread",{"->":"ch4.scimi_glow"},"<>","^A ","<>","\n","thread",{"->":"ch4.scimi_desc"},"^Something about it feels wrong. The sword from the story… the one with the power to twist its wielder.","\n","^I didn’t think it was real.","\n","^And yet, here it is. Right in front of me.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scimi_sus"},1,"+",{"VAR=":"scimi_sus","re":true},"/ev",{"->t->":"ch4.touch_scimi"},{"->":"n_ch4.sales_pitch"},{"#f":5}],"#f":5}]}],{"#f":1}],"sales_pitch":[["^“I’ve been waiting for so long! So long! The years… the silence… I’ve missed this!” Its tone shifts, softening to be almost affectionate. ","<>","\n","thread",{"->":"ch4.happy_scimi"},"^“…You are going to wield me, aren’t you?”","\n","^My stomach twists; I don’t know how to answer.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^Scimitar’s glow pulses, scanning me. “Actually, don’t answer that. I can feel you’re special, so no need to speak!” It sounds sweet now, almost. I can’t tell whether it’s just buttering me up or being serious. Probably both.","\n","^I swallow hard. “I–”","\n","^“You’ve been alone, haven’t you?” The voice turns almost soothing, as if whispering secrets into my ear. “But you don’t have to be… I’ll never leave you. Not like the others.”","\n","^I stiffen. The others?","\n","^The way it says it, it almost sounds like– no. It doesn’t know about Estoc. It can’t know I had him. If it did, I get the sense that this conversation would be very different.","\n","ev","str","^‘Are you insinuating something?’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘The loss was necessary.’","/str","/ev",{"*":".^.c-2","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n","^‘…No, nothing.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"green"},1,"+",{"VAR=":"green","re":true},"/ev","^‘I guess…’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^It keeps going, oblivious. “You deserve power, Charlie. Real power. The kind that makes people respect you, fear you. Just take me.” Its voice drops to a whisper, almost desperate. “Take me, and I’ll make sure no one ever leaves you again.”","\n","^I feel something stir within me – doubt and confusion. The promise of strength, of power. Couldn’t that help me? But then, just as quickly, I feel a pang of unease.","\n","^I roll my eyes, trying to act like I don’t care what he says. “Oh, wow. Never heard that one before.”","\n","^It falters, like it wasn’t expecting me to brush it off so easily. It recovers quickly, though.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^“Something wrong? You seem… conflicted.”","\n","^I force a breath through my nose, grounding myself. “Yeah, well, it’s been a long night.”","\n","^“You’re cold, alone, unarmed…”","\n","^“Gee, thanks for the reminder,” I mutter sarcastically.","\n","^It ignores me. “I could fix it all up, though! Just wield me, and I’ll take care of everything. I promise.”","\n","^I shouldn’t. I really shouldn’t. Everything about this is screaming bad idea. But then again, what choice do I have? Estoc’s gone – completely your fault – and my hands feel strangely empty without him. I could keep going without a weapon, but that’s just asking to die.","\n","^Scimitar senses my hesitation. “Come on,” he coaxes. “You wouldn’t have gotten this far if you weren’t meant to find me, meant to wield me.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-4","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^I stare at the glowing blade, my fingers hovering over the hilt. Scimitar – if that’s really its name – goes quiet, but its presence lingers.","\n","^I shake my head and refocus. I 𝑐𝑜𝑢𝑙𝑑 just leave. Walk away. Pretend I never saw it. I don’t 𝑛𝑒𝑒𝑑 a weapon – I’ve made it this far in life without one.","\n","^…Right?","\n","^The cold presses against me, as if reminding me how utterly not safe I am. Without a weapon, I’m defenceless and alone, just like before.","\n","^I ℎ𝑎𝑡𝑒 feeling alone.","\n","^‘Maybe that’s why I keep talking to you…’ ","#","^CLASS: charlie","/#","\n","^I sigh, lightly facepalming in exasperation.","\n","^‘This is a mistake, but I’m going to do it anyway.’ ","#","^CLASS: charlie","/#","\n","^Before I can think better of it, I reach out and grip his hilt.","\n","ev","str","^Scimitar","/str","/ev",{"VAR=":"wielding","re":true},"ev","str","^Continue","/str","/ev",{"*":".^.c-5","flg":4},{"c-5":["^ ","#","^CLEAR","/#","\n",{"->":"n_ch4.grab_scimi"},{"#f":5}],"#f":5}]}],{"#f":1}],"grab_scimi":[["^Heat floods my palm – not the comforting warmth of a campfire, but something alive, like blood rushing through my veins. The glow around the sword flares, casting the cave in deep crimson light.","\n","^Scimitar practically thrums with delight. “Oh, you have no idea how happy you’ve just made me!”","\n","^I sigh, stepping toward the cave entrance. “Yeah, yeah, don’t get all sentimental on me.”","\n","^“Oh, but I will.”","\n","^I shift my grip on the hilt. “…Okay. Sure. You sound normal.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^“Don’t be like that,” it purrs, and I swear I can feel its hilt trying to nuzzle into my palm. “You made the right choice. The only choice.”","\n","^That phrasing rubs me the wrong way for some reason. Still, the weight of the sword in my hand feels… right. Like it belongs there.","\n","^Scimitar hums approvingly. “See? We fit perfectly together!”","\n","^I roll my eyes. “Calm down, you’re acting like I just proposed.”","\n","^“Oh, but this is better than a proposal.”","\n","^‘…Yeah, okay. This thing is 𝑑𝑒𝑓𝑖𝑛𝑖𝑡𝑒𝑙𝑦 unhinged.’ ","#","^CLASS: charlie","/#","\n","^I adjust my hold on the sword. It’s lighter than it looks, and the balance is perfect – almost like it was made for me. The weapon is deadly in a way that Estoc never was, more suited to quick, precise slices than long, drawn-out duels. At first, it’s fine, but then I start noticing little things: my grip tightening on its own, my body reacting before I tell it to. It’s subtle, just a faint pressure at the edges of my mind, but it’s there.","\n","^‘I know this feeling, but from where, I can’t say…’ ","#","^CLASS: charlie","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^It’s then that I realise what was going on: Scimitar is trying to control me. But it’s not working very well. I catch the flicker of surprise from it when I sidestep its influence. It’s brief, but it’s there. Interesting.","\n","^I pretend not to notice.","\n","^“You’re different, you know.”","\n","^I’m confused, but take the compliment. “Uh… thanks?”","\n","^It doesn’t answer immediately. And then, almost thoughtfully, it states, “It’s weird, most people don’t resist me…”","\n","^“What do you mean?”","\n","^It hums, like it’s considering something. “Oh, don’t you worry about it.”","\n","^‘That’s definitely not suspicious at all…’ ","#","^CLASS: charlie","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^There’s a moment of awkward silence, so I decide to break it. “Alright, since I’m apparently stuck with you–”","\n","^“Don’t say it like that…”","\n","^I ignore it. “–What can you actually do?”","\n","^The scimitar stops for a moment, before it practically vibrates with excitement. “Oh, my dear Charlie, so much – you’ll see! I can make you faster, stronger, and 𝑘𝑒𝑒𝑝 𝑦𝑜𝑢 𝑎𝑙𝑖𝑣𝑒 𝑖𝑛𝑑𝑒𝑓𝑖𝑛𝑖𝑡𝑒𝑙𝑦 𝑛𝑜 𝑚𝑎𝑡𝑡𝑒𝑟 ℎ𝑜𝑤 𝑏𝑙𝑜𝑜𝑑𝑦 𝑎𝑛𝑑 𝑏𝑟𝑜𝑘𝑒𝑛 𝑦𝑜𝑢𝑟 𝑝𝑜𝑜𝑟 𝑚𝑜𝑟𝑡𝑎𝑙 𝑏𝑜𝑑𝑦 𝑖𝑠! You’ll be unstoppable.”","\n","^I pull a face that expresses my horror at what he just said. “Wait, what was that last one–”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^Scimitar suddenly stops, its entire presence shifting from smug excitement to something sharper, more urgent. “…Wait.” Its voice, usually playful, sharpens with alarm. “Wait, wait, wait.”","\n","^I blink. “Uh, what?”","\n","^Its glow intensifies, its energy bristling against my palm. “You’re bleeding.”","\n","^“Well, yeah. That happens when you get cut.”","\n","^“No, you don’t get it,” it snaps, its tone uncharacteristically frantic. “I thought– oh gods, I thought that was the colour of your jacket! Why is there so much blood?!”","\n","^I look down and freeze.","\n","^‘…Okay. Yeah. That’s a lot of blood.’ ","#","^CLASS: charlie","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-4","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":"n_ch4.bleeding"},{"#f":5}],"#f":5}]}],{"#f":1}],"bleeding":[["^Now that it’s pointed out, I can feel it – dried, sticky patches clinging to my skin, the damp weight of it in my clothes. My jacket’s practically soaked through, but I’d been so distracted, so tired, that I barely even noticed. What used to be a dark brown has turned a deep, horrifying shade of crimson. I touch my side, and the jolt
