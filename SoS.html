 of pain finally hits me; red coats my hand and drips onto the ground. It’s like the world snaps into focus, and I almost feel sick.","\n","^“You didn’t even notice, did you?”","\n","^I rub my forehead, feeling the beginnings of dizziness. “I do feel kinda woozy, now that you mention it…”","\n","^“Oh, ‘now that you mention it’–” It cuts itself off with a frustrated growl. “How did you not notice?! You should be dead, or at least unconscious. The blood loss alone…” His tone turns suspicious. “…Hold on. Why 𝑎𝑟𝑒𝑛’𝑡 you dead?”","\n","^‘That’s… a good question. A very good question.’ ","#","^CLASS: charlie","/#","\n","^‘I should be dead – that much is obvious – but… I feel fine. A little tired, maybe, but not dying tired. Is some of Estoc’s power still lingering, protecting me, somehow? I don’t know. Do you?’ ","#","^CLASS: charlie","/#","\n","^Something prickles at the back of my mind, like an answer is just out of reach, but the moment I try to grasp it, it slips away.","\n","^I shake my head. “Look, does it really matter? I’m alive, let’s move on.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^Scimitar sighs, deciding to drop the subject. “Fine, whatever; you can be an enigma later. Right now, I need you to not bleed to death!”","\n","^Its voice now takes on a new, unfamiliar tone of genuine distress, mixed with exasperation. “Charlie, just—just hold me to the wounds. Please.”","\n","^I, obviously, question that. “What? Why?”","\n","^“Because I heal, you idiot! I thought I told you that!”","\n","^I squint down at it. I guess it did imply that, but it did so in, quite frankly, the worst way possible. ","<>","\n","thread",{"->":"ch4.healer"},"^“Alright, alright, keep your hilt on.”","\n","ev","str","^‘Just do what he asked already!’","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^I finally do what he wanted, pressing his blade to the worst of the mess – somewhere along my side. A strange warmth spreads from the point of contact. It feels… weird. Not painful, but unnerving, like my body is stitching itself back together too fast for my brain to process. I bite back a noise of discomfort.","\n","^Scimitar tingles in my grip. “Better. Finally burning through some of this energy…”","\n","^“Wait, what?”","\n","^It makes a sound akin to someone clearing their throat hastily. “Forget I said that.”","\n","^‘Nope, nope. That was weird. That was a weird thing to say.’ ","#","^CLASS: charlie","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^Before I can push it, it mutters irritably, responding to what I just thought. “Oh, shut up. Do you have any idea how long I’ve been overcharged? It’s agonising just sitting around, full of power, with nothing to do. Makes us antsy. That’s partly why I was so, uh…”","\n","^“Unhinged?”","\n","^A huff. “Eager.”","\n","^“Sure.”","\n","^After a moment, Scimitar clicks its metaphorical tongue. “Anyway, let’s keep going – you’re still horrifying to look at.”","\n","^“Gee, thanks.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["ev","str","^Scimi","/str","/ev",{"VAR=":"s_nick","re":true},"^We fall into a rhythm: I hold the blade over wounds; its magic knits them closed. It’s clumsy at first, like it hasn’t done this in a long time… which it hasn’t. One wound tingles uncomfortably before fading, but it works. No pain left, just a phantom itch under my skin.","\n","^Eventually, it lets out a satisfied hum. “There. Good as new.”","\n","^I flex my fingers, testing my limbs. “Huh.”","\n","^I glance down at myself. No blood. No pain. Like nothing ever happened.","\n","^“Not bad, Scimi.” I sheathe it in the scabbard around my waist (when did I get that?) and roll my shoulders. “Alright, you happy now?”","\n","^A huff. “I’ll be happy when you’re not constantly on the verge of death.”","\n","^“Well, you’ve got your work cut out for you, then.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-4","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"#f":5}],"g-4":["ev",{"f()":"humanise_scimi"},"pop","/ev","\n","^I yawn, stretching. Now that I’m no longer bleeding out, exhaustion hits me full force, so I lean against the wall, sliding down until I’m on the cold stone floor. Scimitar goes oddly quiet.","\n","^I glance down at it. “What?”","\n","^A pause. Then, a little too quickly, it says, “Nothing.”","\n","^“You sure?” I’m unconvinced.","\n","^Another pause. “…You’re going to sleep, aren’t you?”","\n","^I close my eyes. “That’s usually what resting means.”","\n","^“Yeah, but…” Its voice shifts, almost uncertain. “It’s dark.”","\n","^I crack an eye open. “Well, yeah. It’s night.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-5","flg":4},{"c-5":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-5"},{"#f":5}],"#f":5}],"g-5":["^It hums, its glow dimming slightly. “Right. I just–” It cuts itself off, then mutters, “I don’t like the dark, okay?”","\n","^Of all the things I expected it– him to say… that was not one of them.","\n","^I snort. “Seriously? You? The creepy evil sword?”","\n","^“Don’t call me that!” He grumbles. “And yes, I just… don’t like silence, alright? I’ve had enough of it for a lifetime…” The admission is quick and dismissive, but there’s something real underneath it. He trails off, then abruptly says, “It’s stupid. Whatever. Just go to sleep.”","\n","^I debate pressing him, but I’m too tired to care, instead setting him down beside me, lying back, and closing my eyes. I feel the cave’s darkness settle around me, heavy and quiet. Scimitar’s glow is the only source of light, which is funny considering the fact that he’s meant to be the sword that brings out the darkness in people. For better or for worse, I seem to be immune, though, so I fall asleep peacefully knowing that at least I’m not alone… for now.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-6","flg":4},{"c-6":["^ ","#","^CLEAR","/#","\n",{"->":"ch6"},{"#f":5}],"#f":5}]}],{"#f":1}],"#f":1}],"n_ch5":[{"->":".^.to_city"},{"to_city":[["thread",{"->":"ch5"},"^The sharp, almost surreal sensation of waking up pulls me out of a dreamless sleep. I slowly open my eyes, and for a moment, I forget where I am. Despite that, I push myself upright, wincing at the stiffness in my muscles. The events from yesterday are still fresh in my mind: the attack on my village, the blood, the chaos… Scimitar’s presence at my side, as constant as ever. For a second, I hesitate, but only for a second; I’ve gotten used to the weight of it all by now.","\n","^I reach down instinctively, fingers brushing against the hilt of the scimitar at my hip. “You still awake, or are you just going to be silent for once?”","\n","^“Silent?” Scimitar chuckles, that familiar gleam in his voice despite his playful tone. “Hardly. Who do you think I am, a quiet little shiv? Not when there’s so much to talk about!”","\n","^I roll my eyes. “You sure do talk a lot.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^I glance around the cave for a moment, noting how the dim light from Scimitar’s glow flickers slightly. My gaze lingers on the entrance, where I know the village is not far from here. Then, the thought hits me like a punch to the gut. My home, the place I left behind…","\n","^‘Maybe they need help. Maybe I need to go back. I mean, last I saw of it, it was getting dest–’ ","#","^CLASS: charlie","/#","\n","^“Charlie,” Scimitar cuts in, voice almost sing-song, “why are we wasting time even thinking about going back? Come on. Whatever happened there – whoever decided to throw a tantrum and shoot you – probably didn’t leave anyone standing.”","\n","^‘How did he…? Oh, right, mind-reading sword.’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘He’s right, you know…’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘Just ignore him – I’m sure those suckers you abandoned are 𝑡𝑜𝑡𝑎𝑙𝑙𝑦 fine!’","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^‘He could be wrong.’","/str","/ev",{"*":".^.c-3","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","^‘Shut up.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","^‘…’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"green"},1,"+",{"VAR=":"green","re":true},"/ev",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^“You weren’t there, so don’t act like you know how it ended. Some might’ve survived: not everyone was in the square when Autumn showed up.”","\n","^He scoffs. “Survived? You think they’re still hanging around, waiting for you to come back? Nah, Charlie, trust me, they’ve either fled or kicked the bucket already. You don’t want to go back there – it’ll just be a waste of time. Oh, and Autumn’s a really dumb name; imagine her parents looking out of the window and naming their kid after the season – and it’s not even a good one!”","\n","^My fists tighten at my sides. “I’m not leaving them to die if I can help it.”","\n","^“But we can’t help them anyway, even if we did go back now. Besides, you know what would be a whole lot easier? Finding another town – maybe one that hasn’t been destroyed yet – and stealing some food and water from them,” he purrs. “Trust me, we’ll make it quick. It’ll be in and out! What do ya say?”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-4","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^I wince at the word ‘stealing’, the idea rubbing me the wrong way. It feels… wrong. “I don’t like the sound of it, Scimi.”","\n","^“Oh, come on, don’t be a bore.” His voice drips with that playful, teasing tone, though it’s a little more insistent this time. “You know what they say: ‘needs must’! And anyway, it’s not like you’re gonna be doing it for fun – it’s for 𝑠𝑢𝑟𝑣𝑖𝑣𝑎𝑙.”","\n","^I hesitate, glancing down at the sword still held in its scabbard at my hip. Even as my mind churns, trying to think of a way around this, I know he’s right in a way: I 𝑛𝑒𝑒𝑑 food and water.","\n","ev","str","^‘They won’t miss a few essentials.’","/str","/ev",{"*":".^.c-5","flg":4},"ev","str","^‘He’s getting in your head.’","/str","/ev",{"*":".^.c-6","flg":4},{"c-5":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev",{"->":".^.^.^.g-3"},{"#f":5}],"c-6":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^Reluctantly, I sigh. “Fine, we’ll find another town – I think I remember that Knightsward isn’t too far from here. But I’m not doing anything too bad.”","\n","^“Oh, I’m sure we’ll keep it 𝑙𝑖𝑔ℎ𝑡,” he says, almost too sweetly. “Just a little theft here and there, and then we’ll be on our merry way! Definitely! …Also, is the name of that city a pun? Ugh, I hope ℎ𝑒 didn’t name it…”","\n","^‘I can’t believe I’m actually agreeing to this…’ ","#","^CLASS: charlie","/#","\n","^A part of me wants to turn back to my village, but Scimi’s words keep echoing in my head:","\n","^‘I’d just be wasting my time. It’s probably already too late.’ ","#","^CLASS: intrusive","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-7","flg":4},{"c-7":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"#f":5}],"g-4":["^He hums, as if pleased with himself. “So… what’s next, partner? What’s your choice?”","\n","^I hesitate. Partner. That word shouldn’t feel weird, but it does.","\n","^‘Isn’t that what I call you?’ ","#","^CLASS: charlie","/#","\n","^I chew the inside of my cheek. It’s too late to second-guess this now. “Whatever, let’s just go.” I wave vaguely at the cave entrance.","\n","^Scimitar practically thrums with satisfaction. “Ah, yes. Let’s.”","\n","^I step forward. Maybe I should be more wary of this thing, maybe I should regret picking him up, but I realise… I don’t. Not even a little.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-8","flg":4},{"c-8":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-5"},{"#f":5}],"#f":5}],"g-5":["^Around an hour later, I notice that Scimi has stopped trying to control me. I don’t think it was a conscious decision – I think he just realised that I’m not like his previous wielders, that I don’t fall into place like I’m supposed to. I get the feeling that should worry him, but instead, he still just seems… amused – almost fond.","\n","^‘Huh. We’ll see how long 𝑡ℎ𝑎𝑡 lasts.’ ","#","^CLASS: charlie","/#","\n","^When I reach Knightsward, I see that it is guarded by a pair of bored-looking sentries. Their spears are more for show than defence, but if they spot me, they won’t hesitate to sound the alarm. Only the main gate offers a way inside, since the whole town is walled off, but there’s no way in hell I’m waltzing through that like an idiot – the second they catch sight of Scimi, it’s game over.","\n","^‘Brilliant. We can’t even walk in without causing a riot.’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Walking’s overrated anyway. Come on, let’s get creative.’","/str","/ev",{"*":".^.c-9","flg":4},{"c-9":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-6"},{"#f":5}],"#f":5}],"g-6":["^I crouch low, heart pounding, and try to keep to the shadows as I circle the perimeter, searching for a way in. The walls are high. Really high. They look as if they could stop a hundred men on horseback, let alone someone like me.","\n","^‘Yeah, alright. Creative it is. Let’s make a plan.’ ","#","^CLASS: charlie","/#","\n","^I crouch low behind a jagged outcrop of rocks, before taking a stick from the ground and starting to sketch crude lines into the dirt. I’m not really much of a planner, but I’ll probably think of something. Hopefully.","\n","ev","str","^‘If you’re suggesting you run straight through the front gate, you’ll end up 6ft under before you can say “Friendly fire!”.’","/str","/ev",{"*":".^.c-10","flg":4},{"c-10":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-7"},{"#f":5}],"#f":5}],"g-7":["^Amazing advice from you, as always.","\n","^‘I was actually thinking about looking for a side entrance. There must be a way to slip through unnoticed, like some back alley or hidden door, right?’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘You think you can sneak into a capital through a hidden passage?’","/str","/ev",{"*":".^.c-11","flg":4},{"c-11":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-8"},{"#f":5}],"#f":5}],"g-8":["^‘Do you have any better ideas?’ ","#","^CLASS: charlie","/#","\n","^My gaze shifts along the stone and wooden wall. It’s sturdy, built to withstand attacks, but it’s not perfect. There’s bound to be a crack somewhere, where the mortar’s crumbled just enough to slip through. And then I spot it: near the base of the wall, there’s a small, crumbling section of stone. It’s not much, but it is a potential hole.","\n","^I eye it carefully. It’s hidden enough that the guards won’t spot it immediately, but too small for me to fit through. If I can somehow widen the hole, I might be able to slip in without anyone noticing.","\n","^‘Actually, what if we just… make our own way in? The only problem would be how I’d get through the stone without making too much noise.’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Scimi could do it, you know.’","/str","/ev",{"*":".^.c-12","flg":4},{"c-12":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-9"},{"#f":5}],"#f":5}],"g-9":["^I glance at Scimi, his hilt shining gold in the low light like a reminder of that fact.","\n","ev","str","^‘Get Scimi to break in! The entrance is yours to make, after all!","/str","/ev",{"*":".^.c-13","flg":4},"ev","str","^‘Actually, don’t cause a ruckus that’ll inevitably get me destroyed. Just look for a different way in.’","/str","/ev",{"*":".^.c-14","flg":4},{"c-13":["^ ","#","^CLEAR","/#","\n",{"->":"n_ch5.break_in"},{"#f":5}],"c-14":["^ ","#","^CLEAR","/#","\n",{"->":"n_ch5.sneak_in"},{"#f":5}],"#f":5}]}],{"#f":1}],"break_in":[["ev",{"VAR?":"red"},2,"+",{"VAR=":"red","re":true},"/ev","^I let out a slow breath.","\n","^‘…Right. So, we’re really doing this.’ ","#","^CLASS: charlie","/#","\n","^“Okay,” I mutter aloud. “Heads up. I’m about to do something very stupid.”","\n","^“Oh, I like where this is going already,” Scimi says brightly. Far too brightly. “Tell me you’re thinking what I’m thinking.”","\n","^“No,” I reply immediately, “because whatever you’re thinking is probably murder.”","\n","^“Aww. You wound me!”","\n","^I step closer to the crumbling section of stone, examining the crack more carefully. The area is small but fragile; honestly, it wouldn’t take much to break through it.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^“I’m going to hit the wall – once, maybe twice. Given your reputation, I’m assuming you can get through a bit of rock…” I pause for a moment, realising that might’ve been a bit insensitive. “Uh, with my help, of course!”","\n","^“Uh huh…” He doesn’t sound too pleased, but seems to brush it off. “Well, destruction is destruction! Make that pathetic fence suffer for existing!”","\n","^“Don’t get too excited,” I warn him. “We’re breaking the wall, not the city.”","\n","^“Relax: you’re my wielder, so you’ll be fine. The wall, on the other hand… less so.”","\n","^‘That is not reassuring. Oh well, we’ve made our decision.’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Then do it already!’","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^I position the blade against the cracked stone and pull back, before swinging. Red light detonates outward into a violent spray of sparks, the sound cracking through the air like thunder snapping stone in half. The wall quickly crumbles, and all that is left is a crater as chunks of masonry explode outward – to be honest, I likely didn’t even need the crack to destroy it.","\n","^“Ohhh, that was beautiful.” Scimi sighs happily. “Did you see that? Tell me you saw that! I really must have been overcharged!”","\n","^“I saw it,” I say, staring at the smoking hole where the wall used to be. “I think the entire city saw it.”","\n","^As if on cue, nearby people start shouting.","\n","^“Oi! What was that?!”","\n","^“Over there!”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^Once they come close enough to see him, there’s a moment of pure, stunned silence.","\n","^“…No,” one of them breathes. “That’s not possible.”","\n","^Another squints, lowering his torch slightly. “Is that–? It can’t be. It was sealed away!”","\n","^“Oh no, no, no…” I panic, backing away from the gaping hole in the wall. It’s large enough to slip through now, sure, but it’s also about as subtle as a flaming arrow through a library.","\n","^“It’s the scimitar!” someone whispers. “Gods help us…”","\n","^“Drop the weapon!” a guard shouts, voice shaking. “Step away slowly!”","\n","^The second guard doesn’t waste time with words. His hand goes up, and a crossbow bolt sails toward me before I’ve even registered the movement. I yelp and stumble to the side, narrowly dodging it.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^Nearby, civilians scream and scatter, doors slamming, windows shuttering as panic ripples outward. The street clears in seconds, leaving only armed guards and a rapidly deteriorating situation.","\n","^Scimi chuckles. “Oh, this is nostalgic. Look at them! They remember me!”","\n","^“They think you’re 𝑐𝑜𝑛𝑡𝑟𝑜𝑙𝑙𝑖𝑛𝑔 me,” I hiss under my breath.","\n","^“Well, that 𝑖𝑠 usually how this goes.”","\n","^I pinch the bridge of my nose in frustration; this was such a terrible idea.","\n","^When I think things can’t get any worse, the captain hears the commotion. ","<>","\n","thread",{"->":"ch5.rina_desc"},"^Basically, I’m screwed.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-4","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"#f":5}],"g-4":["^“If you value your life, you will surrender that blade 𝑛𝑜𝑤,” the captain shouts, clearly cautious but trying not to show fear.","\n","^“You know… they’re going to attack you anyway. Might as well strike first.” Scimi’s voice drips with eagerness, dark and hungry. “Come on, Charlie! These fools are practically begging for it! Let me show them what real power looks like – one good swing, and we could–”","\n","^“No!” I cut him off firmly, even as my heart pounds in my chest. “I am not killing people!”","\n","^“But they’re attacking you!” His voice is almost whiny now, but underneath it is a weapon that has been waiting far too long for violence. “They think you’re my puppet. They think you’re a threat. So be a threat! Show them what we can do together!”","\n","^I instinctively raise him, despite my concerns, to block a sword swinging towards me. I should probably just surrender now, and maybe they’ll spare me.","\n","ev","str","^‘Just fight them: you’ll die otherwise and they started it.’","/str","/ev",{"*":".^.c-5","flg":4},"ev","str","^‘Ignore Scimitar, and don’t you dare surrender. Just run for it!’","/str","/ev",{"*":".^.c-6","flg":4},{"c-5":["^ ","#","^CLEAR","/#","\n",{"->":"n_ch5.fight"},{"#f":5}],"c-6":["^ ","#","^CLEAR","/#","\n",{"->":"n_ch5.run"},{"#f":5}],"#f":5}]}],{"#f":1}],"fight":[["ev",{"VAR?":"blue"},1,"+",{"VAR=":"blue","re":true},"/ev","ev",{"VAR?":"red"},3,"+",{"VAR=":"red","re":true},"/ev","^The metal shrieks where our blades meet, the impact causing my arm to tremble. I twist my wrist, using Scimitar’s curved blade to slide past his defence. The red blade catches the guard’s shoulder, and he yelps, stumbling backward with blood blooming across his sleeve.","\n","^“Yes!” Scimi practically sings in my grip. “Yes, yes, YES! This is what I’ve been waiting for!”","\n","^More guards surge forward, their formation breaking as they realise I’m not just going to stand there. One swings from the left; I duck and slash upward, catching another across the ribs – not deep, just enough to make them gasp and retreat. A third tries to come at me from the right, and I meet them head-on, our blades crossing. For a moment, we’re locked together, blade against blade, and I can see the fear in his eyes – fear of me, fear of what he thinks I represent.","\n","^My breath comes in sharp, ragged bursts. Every instinct is screaming at me to do worse, to follow through, to actually hurt them like Scimi wants, but I pull back each time, letting momentum do most of the work. Slashing wounds bleed impressively: they don’t need to be fatal to be effective.","\n","^“Get the injured to the medics! Now!” the captain shouts.","\n","^“On it, Captain Rina.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^A spear jabs in from my left. I knock it aside with the flat of Scimi and follow through, the arc low and fast, catching the wielder across the thigh. He drops with a howl, clutching his leg as blood darkens the cobbles beneath him. I feel sick for half a second, but the pain quickly dulls; heat crawls under my skin, knitting something back together that should not be knitting this fast. The guard’s expression shifts from grim satisfaction to outright horror.","\n","^“What in the hell?!” someone mutters behind him.","\n","^I don’t give them time to finish the thought, striking him down fast. A couple of civilians rush in low and fast, dragging the injured out by the arms. One of them stares at the blood on my jacket that is already soaking back into clean fabric.","\n","^“That’s not normal,” she says, faintly.","\n","^“Obviously,” both Scimitar and I comment simultaneously.","\n","^Amid my distraction, a mace crashes into my forearm. I feel my bones complain, and I cry out despite myself. Thankfully, it’s fixed up almost instantly, leaving my arm shaking but whole. I stare at it for half a heartbeat. By this point, more people start to notice.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^“Don’t hit them!” someone yells. “The sword, look at the sword!”","\n","^Realisation spreads through them like rot.","\n","^“Get that weapon!” the captain shouts. “Disarm them! Now!”","\n","^Oh. That’s bad.","\n","^They change tactics immediately. Shields come up, not to bash, but to trap. Hands reach for my wrists instead of my throat. Someone grabs for Scimitar’s hilt, and I snarl, jerking back hard enough to tear skin. Another pair tries to hook my arm with a poleaxe, dragging me off balance. Panic claws up my spine.","\n","^“Careful! They finally used their eyes, and now they’re trying to take me from you!” Scimitar shouts to me. “Just perform a strategic retreat!”","\n","^“No objections there!” I reply, ducking as a crossbow bolt sails past my head and strikes the stall behind me.","\n","^I slash upward, forcing space, then pivot and kick off a wall to keep from being boxed in. After, a knife flashes toward my ribs. It sinks in far enough that I feel an intense pressure, and… it doesn’t leave. I look down to see the blade still embedded into the left of my chest. There’s so much red. Oh gods, I’m gonna die! Ĭţ ⱨüɾṯŝ. Ɦēꞎṕ ḿĕ.","\n","ev","str","^‘…’","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^“Charlie, breathe. Now pull it out quickly – I can’t heal you with a dagger stuck there, and I don’t want to see you looking like a pincushion.”","\n","^His (for once) calm tone pulls me out of… whatever state I was in. I slowly open my eyes (when did I close them?) to see that there is a circle of red fire surrounding me, preventing anyone from coming close. I – with some effort – pull the knife out, and my breathing slows back down.","\n","^“Thank you, Scimi.”","\n","^After, I dispel the fire, vault a fallen crate, and bolt: I’d rather not press my luck, and this was a stupid idea to begin with. Someone lunges and catches my sleeve, tearing its fabric, but I twist free and sprint away. An alley yawns open to my right, so I dive into it without slowing, skidding on damp stone and hiding in a dumpster. I keep my breathing quiet and hide Scimitar’s glow under the rubbish until the shouting turns distant and uncertain.","\n","^The dumpster smells like rotting vegetables and something I’m very deliberately not identifying. I stay motionless for what feels like hours, though it’s probably only minutes.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":"n_ch5.after_fight"},{"#f":5}],"#f":5}]}],{"#f":1}],"run":[["ev",{"VAR?":"yellow"},2,"+",{"VAR=":"yellow","re":true},"/ev","ev",{"VAR?":"green"},1,"+",{"VAR=":"green","re":true},"/ev","^I take a sharp breath, and without thinking twice, I bolt.","\n","^“What?! No, no, NO!” Scimitar practically shrieks in my grip, his voice a mixture of outrage and disbelief. “Charlie, you absolute coward! They’re right there! Why are you running?!”","\n","^“Because I’m not you!” I shout back, dodging left as a guard tries to cut off my path.","\n","^My legs burn with effort, my breath coming in sharp bursts as I weave between abandoned market stalls and scattered debris. Behind me, I hear the sharp sound of boots – lots of them – echoing through the street. The captain, a stocky woman with a scarred face, leads the charge.","\n","^“They’re running!” she bellows. “After them! Don’t let them escape with the blade!”","\n","^“Wait, they’re running?” another guard – younger, confusion evident in his tone – calls out as he jogs past his companions. “That’s… not what the stories say it should do.”","\n","^“Stories get exaggerated,” the captain snaps back, already moving to cut off my path. She’s fast for someone in full plate armour, her shield raised to block my route. “Either that or it’s being cautious. Take the wielder alive, if possible, and disarm them! Watch the sword, too; don’t let them use it on the civilians.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^More guards pour from nearby buildings – reinforcements, probably stationed in case of an event just like this. A tall man with a crooked nose reaches for my arm as I try to dodge around him, his gauntleted fingers closing on my sleeve. The fabric tears, but I don’t stop – I can’t stop – even as panic claws at my throat. I feel Scimitar’s presence flare with alarm in my grip, a hot spike of anxiety that mirrors my own.","\n","^“They’re heading toward the merchant quarter! Cut off the east exit!”","\n","^I risk a glance over my shoulder. There are maybe six of them visible, but I can hear more.","\n","^“This is humiliating. Absolutely humiliating.” Scimitar hisses, his tone dripping with disappointment. “Do you know how long it’s been since I’ve run from a fight? Actually, scratch that – I 𝑛𝑒𝑣𝑒𝑟 run from a fight!”","\n","^“Then consider it character development,” I pant, swerving left down a narrow street.","\n","^“Do you know what I could do to them? One good strike, and they’d be on their knees begging for–”","\n","^“Shut up!” I snap, not bothering to keep my voice down. “I’m not interested in your murder fantasies right now.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^The guards exchange confused glances at my words, clearly not expecting us to be quarrelling about that, if at all.","\n","^“Drop the weapon and surrender, and you won’t be harmed!” One of them calls out.","\n","^“Liar!” Scimitar snarls.","\n","^I skid to a halt so suddenly that my boots squeal against the cobblestones. The guards behind me do the same, clearly caught off guard by my sudden stop. For a moment, the only sound is heavy breathing – theirs, mine, and the faint hum of Scimitar’s agitated glow.","\n",["^“Wait,” I call out, my voice steadier than I feel. “Just… wait a second.”","\n","^The younger guard who spoke before steps forward cautiously, his hand still on his sword’s hilt but not drawing it. “Drop the blade,” he says, and there’s something in his tone that’s almost pleading. “Please. We don’t want to hurt you, but we can’t let you keep that weapon.”","\n","^‘I should drop him; I mean, what am I even doing? I picked up a cursed sword – a genuinely evil, mind-controlling cursed sword – and now I’m running through a city like some kind of criminal. This isn’t me! This was never supposed to be me!’ ","#","^CLASS: charlie","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.^.g-3"},{"#f":5}],"#f":5,"#n":"g-2"}],{"#f":5}],"g-3":["^Scimitar’s voice cuts through my thoughts, sharp and urgent. “Charlie, what the hell are you doing? This is not the time to have a crisis!”","\n","^I look down at him, watching the red glow of his blade catch the morning light. My fingers tremble around the hilt.","\n","^Why am I even keeping him? That’s the question that’s been gnawing at me since I picked him up in that cave. He’s dangerous. He even tried to control me in the cave, and I felt it, that pressure at the edges of my mind. I should have left him there, should have smashed the scabbard against stone until the blade shattered (even if that was impossible). I should have done a lot of things differently.","\n","^But I didn’t.","\n","^And now, standing here with the guards closing in. They must be wanting me dead for even carrying him. But they don’t, do they? They’re cautious, yes, but the guards – at least this one – weren’t screaming about a demon or a curse; he’s just… asking me to let go.","\n","^“Easy now,” the captain now says. “Just put the blade down, nice and slow.”","\n","^My hand shakes.","\n","ev","str","^‘…’","/str","/ev",{"*":".^.c-3","flg":4},"ev","str","^‘Do it. Drop the creepy murder sword and let’s go home. Well, not home-home, but somewhere that isn’t here.’","/str","/ev",{"*":".^.c-4","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":"n_ch5.keep_scimi"},{"#f":5}],"c-4":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},6,">","/ev",[{"->":".^.b","c":true},{"b":["^ ",{"->":"n_ch5.corr_keep_scimi"},{"->":".^.^.^.12"},null]}],[{"->":".^.b"},{"b":["^ ",{"->":"n_ch5.abandon_scimi"},{"->":".^.^.^.12"},null]}],"nop","\n",{"#f":5}],"#f":5}]}],{"#f":1}],"keep_scimi":["ev",{"VAR?":"yellow"},2,"+",{"VAR=":"yellow","re":true},"/ev","ev",{"VAR?":"green"},2,"+",{"VAR=":"green","re":true},"/ev","^‘Why won’t I let go?’ ","#","^CLASS: charlie","/#","\n","^The question rings hollow in my skull.","\n","^Because when I was bleeding out in that cave, half-delirious and certain I was going to die, he was the one who stopped it. He complained about the mess, and all manner of petty grievances, but he did it anyway.","\n","^Because when I picked him up after everything else fell apart – my village, my mother, my entire life – he stayed. He didn’t leave me.","\n","^Because I’m terrified of being alone again.","\n","^‘If I drop him now, what happens? They take him and seal him away again. Another century in the dark. Alone. Forgotten.’ ","#","^CLASS: charlie","/#","\n","^Something twists in my heart.","\n","^‘He’s afraid of the dark. He told me that. This ancient, terrifying weapon that’s brought kingdoms to ruin… and he’s afraid of being alone in the dark.’ ","#","^CLASS: charlie","/#","\n","^I think about how his voice cracked when he begged me not to put him back. How he went quiet when I fell asleep, like he was watching over me. How he called me “partner” like it meant something.","\n","^“…I can’t do it.”","\n","^The realisation settles over me like a weight. Not because I’m being controlled – I 𝑘𝑛𝑜𝑤 I’m not – but because somewhere along the way, through the running and the bleeding and the hiding in random caves, I started to care about this stupid, murderous sword.","\n",{"->":".^.^.scimi_grabbed"},{"#f":1}],"corr_keep_scimi":[["ev",{"VAR?":"red"},3,"+",{"VAR=":"red","re":true},"/ev","^I almost laugh at that. Home. What home? There’s nothing left. My village is ash and rubble. My mother is gone. Everyone I knew is either dead or scattered to the wind. What exactly would I be going back to?","\n","^‘…Nothing. I’d be going back to nothing.’ ","#","^CLASS: charlie","/#","\n","^And that’s the problem, isn’t it? Without Scimitar, I’m just… me. Charlie. Average height, average face, average everything. A nobody from a village that doesn’t exist anymore. No skills, no connections, no future worth speaking of.","\n","^With him, I’m something else, something more, something that made trained guards hesitate and people notice me, even if it was for all the wrong reasons.","\n","ev","str","^‘Is that really what this is about? Power?’","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^‘No. Yes. Maybe. I don’t know.’ ","#","^CLASS: charlie","/#","\n","^My grip tightens on his hilt, and I feel him pulse in response – not triumphant, not smug, just… present. Waiting.","\n","^‘He’s dangerous – we both know that – but he’s also the only thing keeping us alive right now. He’s horrible, and manipulative, and probably plotting something awful, but he’s also…’ ","#","^CLASS: charlie","/#","\n","^‘Mine.’ ","#","^CLASS: scimi_p","/#","\n",{"->":"n_ch5.scimi_grabbed"},{"#f":5}]}],{"#f":1}],"scimi_grabbed":[["^“Please,” the young guard says, taking a cautious step forward. “You don’t have to do this. Whatever hold that thing has on you–”","\n","^I don’t let him finish. I turn and run.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^“Wait–!”","\n","^A hand closes around Scimitar’s hilt.","\n","^My heart stops. For one horrifying second, I feel Scimitar slipping from my grasp, his presence flickering like a candle in the wind. The guard – the young one, the one who tried to reason with me – has his fingers wrapped around the crimson hilt, pulling, trying to wrench it free.","\n","^“Don’t touch me!” Scimi’s voice isn’t playful anymore, nor is it teasing or petulant or any of the things I’ve come to expect. It’s terrified. “Get off, get OFF!”","\n","^I grip tighter, but my palms are slick with sweat, my fingers ache, and the guard is stronger than he looks. The world narrows to this single point of contact – my hand, his hand, the sword between us.","\n","^The guard’s eyes suddenly flash red, and for a moment, he seems to be there but also not quite. Not a second later, he lets go of Scimitar like the hilt burned him, stumbling backward with a gasp. After, he shakes her head, and his hand trembles as he stares at it, then at me, then at the sword. Confusion and horror cover his face.","\n","^“What…” he whispers, his voice barely audible. “What just…”","\n","ev","str","^‘Run already!’","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^I don’t wait to hear the rest. My legs move before my brain catches up, carrying me down the nearest alley at a dead sprint. Behind me, I hear shouting – orders, questions, someone calling for the guard who touched Scimitar – but the sounds grow distant as I weave through the shadows, putting as much distance between us as possible.","\n","^Right turn, left turn, another left… I don’t know where I’m going; I just know I need to get away. I find a gap between two buildings, barely wide enough to squeeze through, so I go through without thinking, the rough stone scraping against my shoulders as I push through into a narrow alley beyond. It’s dark here. Quiet. I press my back against the wall and slide down until I’m sitting on the cold, damp ground, my breath coming in ragged gasps. My hands won’t stop trembling.","\n","^“Scimi, what did you do to him?”","\n","^He doesn’t answer immediately.","\n","^“…Nothing permanent.”","\n","^I want to push, but I’m too drained by everything that’s happened, so I just sit there. Still, my mind won’t stop circling a certain thought like a vulture: he tried to control me, and there’s a part of me – a part I really don’t want to acknowledge – that thinks… what if he still is? Maybe I’m not resisting his influence and just convincing myself I am.","\n","^‘Maybe I’m already too far gone… Are we being controlled right now and just don’t know it?’ ","#","^CLASS: charlie","/#","\n","^I don’t know. Gods, I don’t know.","\n","ev","str","^‘Of course we’re not being controlled – 𝑤𝑒 can’t be, obviously!’","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^‘No use worrying about that right now.’","/str","/ev",{"*":".^.c-3","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev",{"->":".^.^.^.g-2"},{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^‘Right, right.’ ","#","^CLASS: charlie","/#","\n",{"->":"n_ch5.after_run"},{"#f":5}]}],{"#f":1}],"abandon_scimi":[["ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","^‘… I 𝑠ℎ𝑜𝑢𝑙𝑑 just drop him. Just like…’ ","#","^CLASS: charlie","/#","\n","^The answer feels strange in my head – wrong, somehow, like I’m betraying something I didn’t even know I was loyal to – but maybe, if I let go of Scimitar right now, this whole nightmare ends. I could walk away; I could be normal again.","\n","^Normal.","\n","^The word tastes bitter.","\n","^‘What even is normal for me anymore? My village is gone. Everyone I knew is dead or scattered. I have nothing left except…’ ","#","^CLASS: charlie","/#","\n","^Except him.","\n","^I look down at the blade in my hand. His glow has dimmed since we stopped running, the angry red fading to something softer, almost subdued. He’s gone quiet too, which is unusual. Scimitar is never quiet.","\n","^‘Why do I want to keep him?’ ","#","^CLASS: charlie","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^It’s a genuine question, one I’ve been avoiding since the moment I pulled him from that cave. He’s dangerous; he’s manipulative; he literally tried to control me, and the only reason it didn’t work is because of… something I still don’t understand. By all logic, by all reason, I should want nothing more than to be rid of him.","\n","^And yet… when I think about letting go – about handing him over to these guards who would lock him away in a prison for another century – something in my chest tightens. Not fear, not exactly. Something closer to… guilt?","\n","^‘No, that’s ridiculous! He’s a sword: a cursed sword that has killed hundreds. I shouldn’t feel guilty about–’ ","#","^CLASS: charlie","/#","\n","^‘He was alone for ninety-seven years.’ ","#","^CLASS: intrusive","/#","\n","^The thought surfaces unbidden, and I hate that it matters to me. I hate that I can still hear the way his voice cracked when he begged me not to leave him in the dark. I hate that underneath all his bluster and bloodlust, there’s something almost pitifully desperate about him.","\n","^I hate that I understand it.","\n","^‘I’ve been alone too. Not for a century, but… alone. And now, everyone who might have cared about me is gone, and the only one left is…’ ","#","^CLASS: charlie","/#","\n","^Him.","\n","ev","str","^‘That’s pathetic, isn’t it? Clinging to a murderous weapon because you don’t want to be alone? Because he needs you?’","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["ev",{"VAR?":"purple"},2,"+",{"VAR=":"purple","re":true},"/ev","^‘…’ ","#","^CLASS: charlie","/#","\n","^The guards are still waiting.","\n","^“Easy now,” one says, voice gentle like he’s coaxing a frightened animal. “Just set it down. Slowly. No one needs to get hurt here.”","\n","^‘He’s right. No one needs to get hurt. If I drop him now, maybe they’ll let me go. Maybe they’ll believe I’m not a threat. Maybe I can walk away from this and pretend none of it ever happened.’ ","#","^CLASS: charlie","/#","\n","^My fingers loosen, just slightly.","\n","^“Charlie.” Scimitar’s voice is barely a whisper now, stripped of its usual arrogance. “Charlie, please.”","\n","^But even as I think it, I know it’s a lie. Even if I surrender, even if I let them take him, I’ll always be the person who carried Scimitar, the person who freed him from that cave.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^‘And what about him?’ ","#","^CLASS: charlie","/#","\n","^The thought catches me off guard. What about Scimitar? If I drop him here, what happens? They’ll seal him away again, probably. Lock him in another cave, another prison, for another century. Alone. In the dark.","\n","^‘I don’t like the dark, okay?’ ","#","^CLASS: intrusive","/#","\n","^His voice echoes in my memory, small and uncertain, nothing like the bloodthirsty weapon everyone says he is.","\n","ev","str","^‘He’s manipulating you…’","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["ev",{"VAR?":"purple"},4,"+",{"VAR=":"purple","re":true},"/ev","^‘Maybe. Probably. But does that mean everything he said was a lie?’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Does it matter?’","/str","/ev",{"*":".^.c-4","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"#f":5}],"g-4":["ev",{"VAR?":"purple"},8,"+",{"VAR=":"purple","re":true},"/ev","ev","str","^None","/str","/ev",{"VAR=":"wielding","re":true},"^‘I don’t know. I don’t know anything anymore.’ ","#","^CLASS: charlie","/#","\n","^The realisation settles over me like a shroud. I run.","\n","^Something was left in my place…","\n","^A glittering red blade.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-5","flg":4},{"c-5":["^ ","#","^CLEAR","/#","\n",{"->":"ch6"},{"#f":5}],"#f":5}]}],{"#f":1}],"dumpster":["^“You still breathing, or do I need to start looking for a less perfect wielder?”","\n","^I don’t answer immediately. I’m too busy trying to convince my hands to stop shaking.","\n","^“Charlie…” It’s not a question this time.","\n","^“I’m alive,” I manage, as I ","ev",{"CNT?":".^.^.fight"},"/ev",[{"->":".^.b","c":true},{"b":["^push the lid open and climb out, ",{"->":".^.^.^.11"},null]}],"nop","^wip","ev",{"CNT?":".^.^.fight"},"/ev",[{"->":".^.b","c":true},{"b":["^ing",{"->":".^.^.^.18"},null]}],[{"->":".^.b"},{"b":["^e",{"->":".^.^.^.18"},null]}],"nop","^ something unspeakable off my jacket. The alley is narrow and cramped, hemmed in by two buildings that look like they’re having a very slow argument about which one gets to collapse first. No one is nearby, thankfully – aside from Scimi, of course – but even still, my hands won’t stop shaking.","\n","^“Barely.” He sounds almost… concerned? “Lucky for you, I’ve got, for all intents and purposes, infinite healing! Still, you nearly gave me a heart attack. Well, metaphorically speaking: I don’t have one of those.” Aaaand there’s the usual Scimi again. “Either way, we need rest, and you need to stop acting like you’ve just committed some grand atrocity.”","\n","^“I ","ev",{"CNT?":".^.^.run"},"/ev",[{"->":".^.b","c":true},{"b":["^almost ",{"->":".^.^.^.28"},null]}],"nop","^hurt people.”","\n","^“Yes, and they deserved it!” His tone is matter-of-fact, like this should be obvious. “Besides, you could have done so much worse.","\n","done",{"#f":1}],"after_fight":[["thread",{"->":"n_ch5.dumpster"},"<>","^ Slashing wounds bleed like you wouldn’t believe, sure, but they’re… survivable. Harder to actually kill someone with, if you’re not trying to hit anything vital. Unlike…” He trails off pointedly.","\n","ev","str","^‘Unlike…?’","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^“Unlike if you’d been wielding another dumb sword I used to know. One good stab wound in the wrong place, and they’d need coffins, not just hospital beds.” There’s something bitter in his voice now – frustration, maybe, like the concept of people not dying from his handiwork is personally offensive to him. “Curved blades get all the credit for looking dramatic, but stabbing weapons are the ones that actually rack up the body count without even trying. It’s deeply unfair.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^I stare at him. “Did you seriously just complain about the lethality of different weapon types?”","\n","^“I’m allowed to have opinions about my field of expertise.”","\n","^Despite everything, I almost laugh. It comes out as more of a wheeze.","\n","^“On another note","<>","\n",{"->":"n_ch5.after_dumpster"},{"#f":5}]}],{"#f":1}],"after_run":["thread",{"->":".^.^.dumpster"},"<>","^”","\n","^‘That’s… fair – it’s not like I actually attacked anyone, anyway.’ ","#","^CLASS: charlie","/#","\n","^“Fine, whatever. Still","<>","\n",{"->":".^.^.after_dumpster"},{"#f":1}],"after_dumpster":[["^, I need a place to sleep, but I can’t exactly walk into a hotel and ask for a room. The moment anyone recognises you–”","\n","^“They’ll panic and try to either kill you or capture me. Yes, I’m aware.” Scimitar sounds almost bored.","\n","^“We could sneak in,” I start slowly, an idea forming. “Find an inn, slip in through a window. Maybe steal some supplies there, or–”","\n","^“There we go,” Scimitar purrs. “Now you’re thinking like someone who understands how the world actually works!”","\n","^“Okay, okay. But I’m not attacking anyone again unless it’s truly life or death.”","\n","^“Fiiiiine…”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":"ch6"},{"#f":5}]}],{"#f":1}],"sneak_in":[["ev",{"VAR?":"green"},2,"+",{"VAR=":"green","re":true},"/ev","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","^I crouch low behind the outcrop of rocks, scanning the wall for a crack, a loose grate, a conveniently placed ladder left by a very stupid guard, anything. I find nothing.","\n","^‘So much for “getting creative”.’ ","#","^CLASS: charlie","/#","\n","^“You know,” Scimi says, “I could just destroy the wall…”","\n","ev","str","^‘Just break in with Scimi.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘Terrible idea.’","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":"n_ch5.break_in"},{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^“And announce our arrival to every guard in the city? No thanks.”","\n","^“You’re no fun.”","\n","^‘Says the ancient weapon of mass destruction.’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Just be patient. Something will come up.’","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^‘Maybe we should try a different side of the wall?’","/str","/ev",{"*":".^.c-3","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","^‘Easy for you to say: you’re not the one freezing out here. Well, you are – you are me, right? But still.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n","^‘I doubt it.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^Just as I’m about to resign myself to a life of living behind a rock, I hear the low rumble of wheels on dirt and the clip-clop of hooves. A supply carriage trundles up the road toward the main gate, and the driver pulls the reins to slow the horses to a stop.","\n","^“Delivery for the market district,” he grunts at the guards. “Usual stuff.”","\n","^The guards barely glance at him. One of them checks a ledger, nods, and waves him forward. The gate opens just enough for the carriage to squeeze through, and then it shuts again behind it.","\n","^‘…Huh.’ ","#","^CLASS: charlie","/#","\n","^“Oh, I see where this is going.”","\n","^‘They barely even checked it. If I can get into the back of the next one…’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘That’s our ticket in!’","/str","/ev",{"*":".^.c-4","flg":4},"ev","str","^‘This is a terrible plan.’","/str","/ev",{"*":".^.c-5","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev",{"->":".^.^.^.g-2"},{"#f":5}],"c-5":["^ ","#","^CLEAR","/#","\n","^‘It absolutely is. Let’s do it anyway!’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^I settle back into my hiding spot, eyes fixed on the road. The waiting is agonising, with Scimi alternating between humming something tuneless and making unhelpful commentary about the guards’ posture.","\n","^“That one’s slouching. I could fix that with one good–”","\n","^“No.”","\n","^“I wasn’t going to say anything violent!”","\n","^“You were probably about to suggest severing his spine.”","\n","^“…Correcting his posture. Aggressively.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-6","flg":4},{"c-6":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^Another twenty minutes (or maybe not, given my difficulty with judging time) pass before the sound of hooves returns. A second carriage rounds the bend – larger than the first, its canvas cover patched in several places and sagging under the weight of whatever it’s carrying.","\n","^‘Now or never.’ ","#","^CLASS: charlie","/#","\n","^I wait until the carriage slows for the approach. No one is looking at the back.","\n","^‘Time to make a move.’ ","#","^CLASS: charlie","/#","\n","^The canvas flap at the rear is tied loosely – thank every deity for lazy merchants – so I slip underneath it in one motion.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-7","flg":4},{"c-7":["^ ","#","^CLEAR","/#","\n",{"->":"n_ch5.carriage"},{"#f":5}],"#f":5}]}],{"#f":1}],"carriage":[["^The carriage smells like sawdust and something sharper that I can’t quite place. Crates and sacks are stacked haphazardly around me, leaving just enough room for one very uncomfortable stowaway.","\n","^“Smooth,” Scimi whispers. “I’m almost impressed.”","\n","^The carriage lurches forward, and I hear the driver call out to the guards again. “Delivery. Market district.”","\n","^“Another one?” a guard replies, sounding bored. “Busy day.”","\n","^“Festival prep. You know how it is.”","\n","^‘Festival? Good – more chaos means less attention on us.’ ","#","^CLASS: charlie","/#","\n","^I shift slightly, trying to find a position that doesn’t involve a crate corner digging into my ribs. The best option seems to be inside one of the larger crates nearby; its lid is loose, barely nailed down.","\n","ev","str","^‘Get in the crate – if they check, you need to be hidden.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘Squeeze in there before someone looks.’","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","^‘Right.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","^‘Way ahead of you.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^I pry the lid up as quietly as I can manage and slide inside, before pulling it shut. The space is cramped, dark, and filled with small cloth bags packed tightly together. Some are soft and powdery; others are dense and heavy, like bags of dried herbs. I shift one aside to make room and—","\n","^The smell hits me.","\n","^It’s sweet. Cloying. The kind of sweetness that clings to the inside of your nostrils and refuses to leave.","\n","^‘What the hell is in these bags?’ ","#","^CLASS: charlie","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^I fumble with one in the darkness, pinching the fabric open just enough to feel the contents. A fine, crystalline powder that sticks to my fingertips.","\n","^‘…Oh no.’ ","#","^CLASS: charlie","/#","\n","^“What?” Scimi asks. “What’s wrong?”","\n","^‘This isn’t festival supplies.’ ","#","^CLASS: charlie","/#","\n","^I don’t know the exact name (I’m not exactly well-versed in the criminal underworld) but I know enough. This is the kind of thing you hear whispered about in taverns, and certainly kind guards are supposed to confiscate.","\n","ev","str","^‘Oh, great. You’re hiding in a drug shipment.’","/str","/ev",{"*":".^.c-3","flg":4},"ev","str","^‘Don’t touch anything else. Just stay still.’","/str","/ev",{"*":".^.c-4","flg":4},"ev","str","^‘Hey, if you get caught, you should at least bring them down with you.’","/str","/ev",{"*":".^.c-5","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","^‘Of course I am. Why wouldn’t I be? This is just my life now.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"c-4":["^ ","#","^CLEAR","/#","\n","^‘Wasn’t planning on it.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"c-5":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"blue"},1,"+",{"VAR=":"blue","re":true},"/ev","^‘As if they’d listen to me…’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^“Drugs?” Scimi sounds somewhere between amused and incredulous. “Oh, that’s rich. You refuse to break a wall, but you’ll happily help criminals smuggle narcotics into a capital city.”","\n","^“I’m not smuggling anything! I’m hiding! There’s a difference!”","\n","^“Legally? Probably not!”","\n","ev","str","^‘He’s right.’","/str","/ev",{"*":".^.c-6","flg":4},"ev","str","^‘Ignore him.’","/str","/ev",{"*":".^.c-7","flg":4},{"c-6":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev",{"->":".^.^.^.g-3"},{"#f":5}],"c-7":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"blue"},1,"+",{"VAR=":"blue","re":true},"/ev","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^‘…’ ","#","^CLASS: charlie","/#","\n","^Before I can spiral any further, the carriage comes to a stop.","\n","^‘Shit.’ ","#","^CLASS: charlie","/#","\n","^“Routine check,” a voice calls from outside. “Open the back.”","\n","^I hold my breath. Through the thin wood of the crate, I hear the canvas being pulled back and boots hitting the carriage floor.","\n","^‘No, no, no, no, no–’ ","#","^CLASS: charlie","/#","\n","^“Lot of crates today,” the guard observes, his voice uncomfortably close. I can hear him shifting things around, the scrape of wood against wood.","\n","^“Festival prep,” the driver repeats from the front, his tone unchanged. “All accounted for.”","\n","^“Uh-huh.” The guard doesn’t sound convinced. “I’m going to need to check a few of these.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-8","flg":4},{"c-8":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"#f":5}],"g-4":["^‘This is it. This is how I die: curled up in a box of illegal substances like the world’s most pathetic smuggler.’ ","#","^CLASS: charlie","/#","\n","^‘Oh, relax. If it comes to it, I can–’ ","#","^CLASS: scimi","/#","\n","^‘You can do nothing!’ ","#","^CLASS: charlie","/#","\n","^‘You’re really limiting my skill set here.’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘Just shut up and pray.’","/str","/ev",{"*":".^.c-9","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-10","flg":4},{"c-9":["^ ","#","^CLEAR","/#","\n","^‘I don’t even know who to pray to.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-5"},{"#f":5}],"c-10":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-5"},{"#f":5}],"#f":5}],"g-5":["^There’s a pause. Then I hear the driver clear his throat, followed by the unmistakable clink of coins.","\n","^“You know,” the driver says, his voice low and casual, “it’s been a long day. For both of us. Festival season’s a nightmare. Why don’t I save you the trouble?”","\n","^The guard is quiet for a long, agonising moment.","\n","^Then: “…Yeah, alright. Move along.”","\n","^The canvas drops back into place and the boots leave. After the carriage lurches forward, I breathe again.","\n","^Bribery. The carriage driver just bribed a city guard. And it worked. And I’m grateful for it.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-11","flg":4},{"c-11":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-6"},{"#f":5}],"#f":5}],"g-6":["^Scimi cackles. “See the kinds of people you’re against me punishing? Everyone talks about how great ‘laws’ and ‘authority’ are, and yet here we are! Hell, you should see the entitled asshole I used to know – called me a demon, but…”","\n","^He just starts giggling like a psychopath before he can finish his sentence.","\n","^“I can’t believe corruption just saved my life.”","\n","^“Welcome to the real world, Charlie! It’s not all shining swords and noble causes.”","\n","ev","str","^‘Yay for corruption!’","/str","/ev",{"*":".^.c-12","flg":4},"ev","str","^‘Yay for corruption, I guess.’","/str","/ev",{"*":".^.c-13","flg":4},"ev","str","^‘Let’s never speak of this again.’","/str","/ev",{"*":".^.c-14","flg":4},{"c-12":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","^‘I feel sick.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-7"},{"#f":5}],"c-13":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","^‘I feel sick.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-7"},{"#f":5}],"c-14":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"green"},1,"+",{"VAR=":"green","re":true},"/ev","ev",{"VAR?":"blue"},1,"+",{"VAR=":"blue","re":true},"/ev","^‘Agreed.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-7"},{"#f":5}],"#f":5}],"g-7":[{"->":"n_ch5.exit"},{"#f":5}]}],{"#f":1}],"exit":[["^I wait until the carriage is moving at a steady pace before I push the crate lid open and climb out. My clothes are still dusted with a faint powder that I desperately hope won’t be visible in daylight, but at least I’m alive and out of prison.","\n","^I check the carriage interior. Aside from the crates of dubious contents, there are a few sacks of what looks like actual grain, some bundled cloth, and – tucked beneath a bench near the front – a worn leather satchel. It’s not fancy, but it’ll do.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^I look down at Scimi, his red glow pulsing faintly against my hip. In the dim interior of the carriage, it’s not too noticeable, but the moment I step outside, anyone with functioning eyes is going to see a glowing red scimitar and have a very justified panic attack.","\n","^“I need to hide you.”","\n","^The silence that follows is deafening.","\n","^“…I’m sorry,” Scimi says, his voice dangerously calm. “I must have misheard you. For a moment there, it sounded like you said you need to hide me.”","\n","^“In that satchel.”","\n","ev","str","^‘Just do it. A glowing evil sword isn’t exactly subtle.’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘Think of it as a disguise! Very covert. Very cool.’","/str","/ev",{"*":".^.c-2","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev",{"->":".^.^.^.g-1"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["ev",{"VAR?":"scimi_sus"},1,"+",{"VAR=":"scimi_sus","re":true},"/ev","ev",{"VAR?":"inv"},{"VAR?":"satchel"},"+",{"VAR=":"inv","re":true},"/ev","ev",{"f()":"bag"},"pop","/ev","\n","^“What they said.”","\n","^“What who said?”","\n","^Damn it. “Nothing. You’re going in the bag!”","\n","^“Absolutely not!” Scimi’s voice rises in pitch, outrage radiating through every syllable. “I am a legendary weapon! I have toppled kingdoms and bathed in the blood of tyrants, and you want to stuff me in a BAG?!”","\n","^“You sound a lot like–”","\n","^“Shut up, I– oh… Just-just put me in the bag. Sorry.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^I grab the satchel and shake it out. A few flakes of… something fall out, but nothing too offensive. I carefully slide Scimi from his scabbard and lower him into the bag, adjusting the strap so it hangs across my back.","\n","^“This is humiliating.”","\n","^“You’ll survive.”","\n","^“I can’t see anything.”","\n","^“You’ll still survive.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-4","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^I peek through the canvas. The street outside is busy enough: merchants setting up stalls, people milling about, the general organised chaos of a city preparing for something. No one is looking at the back of a supply carriage. I slip out, landing on cobblestone with a quiet thud. The carriage rumbles on without stopping, and just like that, I’m in.","\n","^Knightsward. A whole city between me and whatever comes next.","\n","^‘Alright, we’re in. Now what?’ ","#","^CLASS: charlie","/#","\n","^Scimi’s voice filters up from the bag, still sulky but with a trace of something almost resembling cooperation. “Now we find food, shelter, and a plan. In that order. And then you let me out of this wretched sack.”","\n","^“Of course.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-5","flg":4},{"c-5":["^ ","#","^CLEAR","/#","\n",{"->":"n_ch5.eat"},{"#f":5}],"#f":5}]}],{"#f":1}],"eat":[["^Knightsward is… a lot.","\n","^The streets are wide and cobbled, lined with tall stone buildings that make the ones back home look like they were built by drunk children. Market stalls crowd together in clusters, and the smell of cooked meats and spices drifts through the air like a taunt.","\n","^My stomach growls loud enough that I’m genuinely worried someone heard it.","\n","^‘Right. Food first, existential crisis later.’ ","#","^CLASS: charlie","/#","\n","^I dig through my pockets, checking for whatever coins I had on me when I left. It’s not much – barely enough for a single item – but it’s something.","\n","ev","str","^‘Treat yourself. You’ve earned it.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘Just get something cheap and keep moving.’","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","^‘I wouldn’t say I’ve earned anything, but I am starving, so…’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","^‘Cheap is all I can afford, so that works out.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^I wander between the stalls, scanning the displays. Most of the stalls are overpriced, but one near the corner has some fruit going for next to nothing. I take a ","<>","\n","ev",{"f()":"max_ap"},"/ev",{"VAR=":"tempy","re":true},"\n","ev",{"VAR?":"tempy"},"/ev",["du","ev","str","^yellow","/str","==","/ev",{"->":".^.b","c":true},{"b":["pop","\n","^banana","\n",{"->":".^.^.^.16"},null]}],["du","ev","str","^purple","/str","==","/ev",{"->":".^.b","c":true},{"b":["pop","\n","^small bunch of grapes","\n",{"->":".^.^.^.16"},null]}],["du","ev","str","^red","/str","==","/ev",{"->":".^.b","c":true},{"b":["pop","\n","^red apple","\n",{"->":".^.^.^.16"},null]}],["du","ev","str","^green","/str","==","/ev",{"->":".^.b","c":true},{"b":["pop","\n","^green apple","\n",{"->":".^.^.^.16"},null]}],[{"->":".^.b"},{"b":["pop","\n","^punnet of blueberries","\n",{"->":".^.^.^.16"},null]}],"nop","\n","<>","^ and hand over the only coins to my name.","\n","ev",{"VAR?":"tempy"},"str","^blue","/str","==","/ev",[{"->":".^.b","c":true},{"b":["^When I try to bite into one of them, I notice the inside is rotten – damn it. I ditch them before I can vomit",{"->":".^.^.^.30"},null]}],[{"->":".^.b"},{"b":["^I eat while walking, which I’m fairly sure is some kind of social crime in a city like this, but I’m too hungry to care",{"->":".^.^.^.30"},null]}],"nop","^.","\n","ev",{"VAR?":"tempy"},"/ev",["du","ev","str","^yellow","/str","==","/ev",{"->":".^.b","c":true},{"b":["pop","\n","^It tastes just as a banana should, which is good – if it didn’t taste like a banana, that would be concerning.","\n",{"->":".^.^.^.41"},null]}],["du","ev","str","^purple","/str","==","/ev",{"->":".^.b","c":true},{"b":["pop","\n","^They taste sour, but I’m stuck with them now, so I eat them anyway.","\n",{"->":".^.^.^.41"},null]}],["du","ev","str","^red","/str","==","/ev",{"->":".^.b","c":true},{"b":["pop","\n","^It tastes sickly sweet – almost addictively so. I almost want to steal another, but I stop myself.","\n",{"->":".^.^.^.41"},null]}],["du","ev","str","^green","/str","==","/ev",{"->":".^.b","c":true},{"b":["pop","\n","^It’s soft – as are most pink pearls – but with a nice sweetness. Before I can finish it, it gets knocked from my hand by a passerby and crushed by a nearby carriage. All that remains is a crimson core, dirtied by those it was supposed to feed.","\n",{"->":".^.^.^.41"},null]}],"pop","nop","\n","ev","str","^‘","ev",{"VAR?":"tempy"},"str","^blue","/str","==",{"VAR?":"tempy"},"str","^green","/str","==","||","/ev",[{"->":".^.b","c":true},{"b":["^A pity",{"->":".^.^.^.61"},null]}],[{"->":".^.b"},{"b":["^At least you’re fed",{"->":".^.^.^.61"},null]}],"nop","^.’","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^After, I look toward the centre of the city, where the keep looms above everything else.","\n","^‘Maybe if I explain what happened – minus the Scimi part – they’ll help. They have to help, right? That’s what kings are for.’ ","#","^CLASS: charlie","/#","\n","^“Oh, sure. Walk up to a king with nothing to offer and ask for charity. That always goes well.”","\n","^“Shut up,” I whisper. “And keep your voice down.”","\n","^“I’m just saying,” he hisses, quieter now, “don’t get your hopes up. People with crowns don’t care about people without them.”","\n","ev","str","^‘He has a point…’","/str","/ev",{"*":".^.c-3","flg":4},"ev","str","^‘Ignore him. It’s worth a shot.’","/str","/ev",{"*":".^.c-4","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n","^‘Maybe, but what else am I supposed to do?’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"c-4":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"blue"},1,"+",{"VAR=":"blue","re":true},"/ev","^‘It has to be.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^I make my way through the streets toward the keep, trying to look like I belong here and failing miserably. The closer I get, the more out of place I feel: my clothes are torn and stained, while my hair is a disaster. That’s not even mentioning the fact that I’m carrying a bag that occasionally hums if Scimi gets too excited.","\n","^𝐺𝑟𝑒𝑎𝑡 first impression.","\n","^The entrance flanked by two guards in polished armour, just like the gate. I approach as casually as I can.","\n","^“Hi. I, um… I’d like to see the king.”","\n","^The guards exchange a look. It’s not a kind one.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-5","flg":4},{"c-5":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^“The king. You’d like to see the king,” one of them repeats flatly.","\n","^“Yes?”","\n","^“And you are…?”","\n","^“Charlie. From– from a village south of here. It was attacked, and I need help.”","\n","^The second guard doesn’t even look up. “The king doesn’t take walk-ins, kid. File a report with the magistrate’s office.”","\n","^“I don’t even know where that is.”","\n","^“Not our problem.”","\n","ev","str","^‘Just explain what happened. Make them listen.’","/str","/ev",{"*":".^.c-6","flg":4},"ev","str","^‘This is pointless.’","/str",{"CNT?":".^.^.g-1.c-3"},"/ev",{"*":".^.c-7","flg":5},"ev","str","^‘…’","/str","/ev",{"*":".^.c-8","flg":4},{"c-6":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"blue"},1,"+",{"VAR=":"blue","re":true},"/ev","ev",{"VAR?":"green"},1,"+",{"VAR=":"green","re":true},"/ev",{"->":".^.^.^.g-4"},{"#f":5}],"c-7":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev",{"->":".^.^.^.g-4"},{"#f":5}],"c-8":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"#f":5}],"g-4":["^“Look,” I start, and I hate how small my voice sounds, “my village was destroyed by someone with an enchanted weapon. People are dead. I barely made it out alive.”","\n","^The first guard opens his mouth – probably to tell me to shove off again – but the second one holds up a hand.","\n","^“…How old are you?”","\n","^“Does it matter?”","\n","^He sighs, rubbing the bridge of his nose. “Just go. Quickly, before the captain notices.”","\n","^“Wait, seriously?”","\n","^“Don’t make me regret it.” He steps aside, gesturing toward the door with a jerk of his head. “Up the stairs, second hall on the right. Be respectful, don’t touch anything, and for the love of all that is holy, don’t waste his time.”","\n","^I nod, probably too many times, and slip through the gate before either of them can change their mind.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-9","flg":4},{"c-9":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-5"},{"#f":5}],"#f":5}],"g-5":["^The inside of the keep is everything my village wasn’t: grand, immaculate, and deeply intimidating. My footsteps echo too loudly against the marble floor.","\n","^I find the hall easily enough – it’s impossible to miss: massive oak doors, leading ","<>","\n",{"->t->":"ch5.with_king"},{"->":"n_ch5.with_king"},{"#f":5}]}],{"#f":1}],"with_king":[["^The king studies me for a moment. His expression isn’t cruel, exactly, but it’s not warm either.","\n","^“And where is this village?”","\n","^“South. A few hours’ walk from here.”","\n","^“Hmm.” He leans back slightly. “Yes, we’ve seen a few people come from that region. Tragic, certainly.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^I wait for the part where he offers soldiers, supplies, shelter – anything.","\n","^“Is that all?” he asks.","\n","^I blink. “I– what?”","\n","^“If I helped every person that has been displace, our economy would be in shambles.” His tone is measured, almost gentle, which somehow makes it worse. “I understand that you’ve been through an ordeal, but I cannot mobilise resources on the word of a single… child.”","\n","^The word hits like a slap. 𝐶ℎ𝑖𝑙𝑑.","\n","^“I’m not–” I start, but he raises a hand.","\n","^“I’m sure what you are telling me is true, but Knightsward has its own concerns and its own threats. If you really need help, try to find Estoc and the hero.”","\n","^‘…Oh…’ ","#","^CLASS: charlie","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^“Now, unless there’s anything else…” He gestures vaguely, and one of the guards near the door steps forward to escort me out.","\n","^‘That’s it? That’s all I get? My entire home is gone and I get a wave and a “good luck”?’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘What did you expect? You’re nobody to him.’","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^‘That’s not fair!’","/str","/ev",{"*":".^.c-3","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","^‘I know. I know that. It just…’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"green"},1,"+",{"VAR=":"green","re":true},"/ev","^‘Since when has anything been fair?’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^I don’t argue: I don’t have the energy. I just turn around and walk out, past the guards, down the stairs, and keep walking until the keep is behind me and the noise of the market swallows me whole.","\n","^I don’t even know where I’m going, but I don’t think it matters.","\n","^Eventually, the crowd thins and I find myself in a narrow alley between two tall buildings, the kind of place that smells like damp stone and forgotten things. It’s quiet here. Private. I slide down the wall until I’m sitting on the cold ground, my knees drawn up, the satchel beside me.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-4","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^For a moment, I just sit there breathing.","\n","^Then it hits me. All of it. Everything I’ve been running from since the moment Autumn’s first arrow flew.","\n","^‘I have nothing.’ ","#","^CLASS: charlie","/#","\n","^No home. No family. No money. No plan. I’m a kid sitting in an alleyway in a city that doesn’t want me, carrying a sword that the entire world is terrified of, and the one person who was supposed to help just told me to go to the sword I abandoned.","\n","^My eyes sting. I press the heels of my palms against them, hard, willing the tears back.","\n","^‘I am so, 𝑠𝑜 screwed.’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘…’","/str","/ev",{"*":".^.c-5","flg":4},"ev","str","^‘Yes. Yes you are.’","/str","/ev",{"*":".^.c-6","flg":4},"ev","str","^‘It’s okay to cry, you know.’","/str",{"VAR?":"tempy"},"/ev",{"*":".^.c-7","flg":5},{"c-5":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"c-6":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","^‘…’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"c-7":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"green"},1,"+",{"VAR=":"green","re":true},"/ev","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","^‘It is 𝑛𝑜𝑡 okay. Nothing about this is okay.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"#f":5}],"g-4":[{"->":"n_ch5.breakdown"},{"#f":5}]}],{"#f":1}],"breakdown":[["ev",0,"/ev",{"VAR=":"tempy","re":true},"ev",{"f()":"unbag"},"pop","/ev","\n","^I reach into ","ev",{"VAR?":"red"},5,">","/ev",[{"->":".^.b","c":true},{"b":["^my new",{"->":".^.^.^.17"},null]}],[{"->":".^.b"},{"b":["^“my”",{"->":".^.^.^.17"},null]}],"nop","^ satchel and pull Scimi out. His glow is dim – he’s been keeping it suppressed – but even the faint warmth is something. I hold him across my lap; not wielding him, just… having him there.","\n","^“So, what did I tell you?” Scimi says, his voice low.","\n","^“Don’t.”","\n","^“I’m not gloating! I’m just saying, I 𝑑𝑖𝑑 warn you. Kings don’t care about people like us, Charlie. They never have. To them, you’re just another mouth to feed, another problem to forget about.”","\n","^“I said. Don’t.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^He goes quiet. For exactly three seconds.","\n","^“…You know what your problem is?”","\n","^“Please, enlighten me.”","\n","^“You keep expecting people to help you. Your mother, the king, that idiot blade you just got recommended – you keep putting your faith in other people, and they keep letting you down.” His voice softens, just slightly. Not kind, exactly, but something adjacent to it. “I’m not saying that to be cruel. I’m saying it because it’s true.”","\n","ev","str","^‘He’s right. People are useless.’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘That’s not true. Some people care.’","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^‘What did you expect? You’re just a pathetic nobody. Why would anyone care about you?’","/str","/ev",{"*":".^.c-3","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev",{"->":".^.^.^.g-1"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"green"},1,"+",{"VAR=":"green","re":true},"/ev",{"->":".^.^.^.g-1"},{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},3,"+",{"VAR=":"purple","re":true},"/ev","ev",{"VAR?":"scimi_sus"},1,"+",{"VAR=":"scimi_sus","re":true},"/ev","ev",{"VAR?":"scim_serrie"},5,"-",{"VAR=":"scim_serrie","re":true},"/ev","^‘…’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^“But 𝐼’𝑚 here,” Scimi ","ev",{"CNT?":".^.^.g-0.c-3"},"/ev",[{"->":".^.b","c":true},{"b":["^cuts in",{"->":".^.^.^.6"},null]}],[{"->":".^.b"},{"b":["^continues",{"->":".^.^.^.6"},null]}],"nop","^, and there’s something almost earnest underneath the usual showmanship. “I was stuck in a bag, which is deeply offensive, by the way, but I’m still here.”","\n","ev",{"VAR?":"red"},5,">","/ev",[{"->":".^.b","c":true},{"b":["\n","^‘He’s not wrong.’ ","#","^CLASS: scimi_p","/#","\n","^‘T","\n",{"->":".^.^.^.16"},null]}],[{"->":".^.b"},{"b":["\n","^‘He’s not wrong, but t","\n",{"->":".^.^.^.16"},null]}],"nop","\n","<>","^hat doesn’t mean he’s right, either.’ ","#","^CLASS: charlie","/#","\n","^“I’m not asking for gratitude,” he adds, as if sensing my hesitation. “I’m just saying… maybe stop waiting for someone to save you. You’ve already got everything you need.”","\n","^I exhale, long and slow, and wipe my eyes with my sleeve. It comes away damp; I pretend not to notice.","\n","^“You’re kind of terrible at pep talks, Scimi.”","\n","^“Excuse me? That was 𝑖𝑛𝑠𝑝𝑖𝑟𝑎𝑡𝑖𝑜𝑛𝑎𝑙!”","\n","^A small, pathetic laugh escapes me, despite everything. It sounds mor
