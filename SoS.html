<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Swords of Solace</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CSS -->
    <style>
        body {
            margin: 0;
            font-family: 'Charter', serif;
            font-size: 14pt;
            background: white;
            color: black;
            overflow: hidden;
        }

        h1 {
            text-align: center;
            font-family: 'Didot', serif;
            margin: 0;
            padding: 0;
            font-size: 30pt;
            margin-bottom: 10px;
        }

        h2 {
            text-align: center;
            font-size: 14pt;
            font-family: 'Didot', serif;
            font-weight: lighter;
            margin: 0;
            padding: 0;
            color: #444;
        }

        .header {
            padding-top: 0em;
            padding-bottom: 2em;
        }

        .byline { font-style: italic; }

        .written-in-ink {
            z-index: 3;
            font-size: 9pt;
            text-align: center;
            font-weight: 700;
            position: fixed;
            display: block;
            width: 100%;
            background: white;
            margin: 0;
            padding-top: 6px;
            padding-bottom: 6px;
            height: 14px;
            top: 0;
        }

        .outerContainer {
            position: absolute;
            display: block;
            margin: 0;
            padding: 0;
            -webkit-overflow-scrolling: touch;
            overflow: scroll;
            overflow-x: hidden;
            height: 100%;
            width: 100%;
            top: 0;
            left: 0;
            margin-top: 24px;
            background-size: cover;
            background-repeat: no-repeat;
        }

        @media screen and (max-width: 980px) {
            .outerContainer {
                margin-top: 44px;
                background-size: cover;
                background-repeat: no-repeat;
            }
        }

        .container {
            display: block;
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            padding-top: 4em;
            background: white;
        }

        @media screen and (prefers-reduced-motion: no-preference) {
            .switched .container { transition: background-color 0.6s; }
        }

        p {
            font-size: 13pt;
            line-height: 1.7em;
        }

        a {
            font-family: 'Charter', serif;
            font-weight: 700;
            font-size: 12pt;
            color: #9a6ebd;
            text-decoration: none;
        }

        .unclickable {
            font-weight: 700;
            color: #9d96b3;
            text-decoration: none;
            cursor: not-allowed;
        }

        a:hover { color: black; }

        @media screen and (prefers-reduced-motion: no-preference) {
            a { transition: color 0.6s; }

            a:hover {  transition: color 0.1s; }
        }

        strong {
            color: black;
            font-weight: bold;
        }

        img {
            display: block;
            margin: 0 auto;
            max-width: 100%;
        }

        .container .hide { opacity: 0.0; }

        .container .invisible { display: none; }

        .container>* { opacity: 1.0; }

        @media screen and (prefers-reduced-motion: no-preference) {
            .container>* { transition: opacity 1.0s; }
        }

        .choice {
            text-align: center;
            line-height: 1.7em;
        }

        :not(.choice)+.choice { padding-top: 1em; }

        .choice a, .choice span {
            font-family: 'FreeSerif', serif;
            font-size: 15pt;
        }

        .end {
            text-align: center;
            font-weight: bold;
            color: black;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        #controls {
            z-index: 4;
            font-size: 9pt;
            text-align: center;
            padding-bottom: 6px;
            position: fixed;
            right: 14px;
            top: 4px;
            user-select: none;
            background: white;
            display: inline-flex;
            gap: 1.2em;
        }

        @media screen and (prefers-reduced-motion: no-preference) {
            #controls { transition: color 0.6s, background 0.6s; }
        }

        #controls [disabled] { color: #ccc; }

        @media screen and (max-width: 980px) {
            #controls {
                z-index: 2;
                padding-top: 24px;
                top: 0;
                left: 0;
                right: 0;
            }
        }

        body.dark {
            background: black;
            color: white;
        }

        .dark h2 { color: #bbb; }

        .dark .container { background: black; }

        .dark .written-in-ink { background: black; }


        .dark a { color: #9a6ebd; }

        .dark .unclickable{
            color: #9d96b3;
            cursor:not-allowed;
        }

        .dark a:hover { color: white; }

        @media screen and (prefers-reduced-motion: no-preference) {
            .dark a {
                transition: color 0.6s;
            }
        }

        .dark strong { color: white; }

        .dark #controls [disabled] { color: #444; }

        .dark .end { color: white; }

        .dark #controls { background: black; }

        .chapter {
            text-align: center;
            font-family: 'Didot', serif;
            margin: 0;
            padding: 0;
            font-size: 20pt;
            margin-bottom: 10px;
        }

        .subchapter {
            text-align: center;
            font-family: 'Didot', serif;
            margin: 0;
            padding: 0;
            font-size: 14pt;
            margin-bottom: 10px;
        }

        /* story custom formatting */
        .charlie { color: #8c7938; }

        .scimi {
            color: #b33d4d;
            font-weight: bold;
        }

        .estoc {
            color: #3968b2;
            font-weight: bold;
        }

        .serrie {
            color: #9a6ebd;
            font-weight: bold;
        }

        .scimi_p {
            color: #b34c3d;
            font-style: italic;
        }

        .estoc_p {
            color: #8c7950;
            font-style: italic;
        }

        .serrie_p {
            color: #98699b;
            font-style: italic;
        }

        .serrie_pov { color: #7a628c; }

        .serrie_pov .dark { color: #b4a1c3; }

        .italic { font-style: italic; }

        .fancy {
            font-size: 14.2pt;
            font-family: 'FreeSerif', serif;
        }

        .intrusive {
            color: black;
            font-weight: bold;
            font-style: italic;
        }

        .dark .intrusive {
            color: white;
            font-weight: bold;
            font-style: italic;
        }

        .serrie_corr { color: #ad4a69; }

        a:hover .serrie_corr { color: black; }

        .dark a:hover .serrie_corr { color: white; }

        @media screen and (prefers-reduced-motion: no-preference) {
            .serrie_corr {
                transition: color 0.6s;
            }
            a:hover .serrie_corr {
                transition: color 0.1s;
            }
        }

        /* menus */
        .stat {
            margin: 10px 0;
            font-size: 1.3rem;
            font-family: 'FreeSerif', serif;
        }

        .slot-modal {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 1000;
            display: grid;
            place-items: center;
        }

        .slot-modal.hidden { display: none; }

        .slot-modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
        }

        .dark .slot-modal-backdrop { background: rgba(255,255,255,0.1); }

        .slot-modal-panel {
            position: relative;
            background: var(--bg, #fff);
            color: var(--fg, #000);
            margin: 0;
            padding: 1.5rem;
            border-radius: 8px;
            width: min(600px, 90vw);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .dark .slot-modal-panel {
            background: var(--bg, #000);
            color: var(--fg, #fff);
        }

        .slot-list {
            overflow-y: auto;
            max-height: 60vh;
            list-style: none;
            padding: 0;
            margin: 0;
            padding-top: 1rem;
        }

        .slot-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .dark .slot-modal-header { border-bottom-color: rgba(255,255,255,0.15); }

        .slot-modal-header h2 {
            text-align: left;
            margin: 0;
            font-size: 18pt;
            color: #000;
        }

        .dark .slot-modal-header h2 { color: #fff; }

        .slot-modal-close {
            font-size: 18pt;
            line-height: 1;
            padding: 0.25rem 0.5rem;
            cursor: pointer;
        }

        .slot-new {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            padding: 1rem 0 0.75rem;
        }

        .slot-new input {
            flex: 1;
            padding: 0.4rem 0.6rem;
            font: inherit;
        }

        .slot-toolbar {
            display: flex;
            justify-content: flex-end;
            padding-bottom: 0.5rem;
        }

        .slot-toolbar select {
            padding: 0.3rem 0.5rem;
            font: inherit;
        }

        .slot-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .slot-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(0,0,0,0.12);
            border-radius: 6px;
        }

        .dark .slot-row { border-color: rgba(255,255,255,0.18); }
        
        .slot-row-name {
    		font-family: 'FreeSerif', serif;
    		font-size: 1.3rem;
    		line-height: 1.2;
		}

        .slot-row-main {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            min-width: 0;
            flex: 1;
        }

        .slot-row-label { font-weight: bold; }

        .slot-row-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            font-size: 0.85rem;
            color: #666;
        }

        .dark .slot-row-meta { color: #aaa; }

        .slot-row-actions {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .slot-btn {
            padding: 0.3rem 0.7rem;
            cursor: pointer;
        }

        .slot-btn-load { color: #3968b2; }

        .dark .slot-btn-load { color: #3968b2; }

        .slot-btn-delete { color: #b33d4d; }

        .dark .slot-btn-delete { color: #b33d4d; }

        .slot-new input, .slot-toolbar select {
            border: 1px solid rgba(0,0,0,0.18);
            border-radius: 4px;
        }

        .dark .slot-new input, .dark .slot-toolbar select {
            background: #1a1a1a;
            color: #eee;
            border: 1px solid rgba(255,255,255,0.18);
        }

        .dark .slot-new input::placeholder { color: #888; }

        .slot-new input:focus, .slot-toolbar select:focus {
            outline: none;
            border-color: #9a6ebd;
        }

        .dark .slot-list { scrollbar-color: #555 #1a1a1a; }

        .dark .slot-list::-webkit-scrollbar { width: 10px; }

        .dark .slot-list::-webkit-scrollbar-track { background: #1a1a1a; }

        .dark .slot-list::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 5px;
        }

        .dark .slot-list::-webkit-scrollbar-thumb:hover { background: #777; }

        .slot-new.hidden, .slot-empty.hidden { display: none; }
    </style>
</head>
<body>
    <div class="outerContainer">
        <div id="controls" class="buttons">
          <a id="rewind" title="Restart story from beginning">Restart</a>
          <a id="back" title="Undo previous choice">Back</a>
          <a id="save" title="Open save menu">Saves</a>
          <a id="stats" title="Open stat menu">Stats</a>
          <a id="theme-switch" title="Switch theme">Theme</a>
        </div>
        <div id="story" class="container">
            <div class="header">
                <h1>Swords of Solace</h1>
                <h2 class="byline"></h2>
            </div>
        </div>
    </div>

    <!-- Save Modal -->
	<div id="slot-modal" class="slot-modal hidden" role="dialog" aria-modal="true" aria-labelledby="slot-modal-title">
		<div class="slot-modal-backdrop" data-close></div>
		<div class="slot-modal-panel">
   			<header class="slot-modal-header">
   				<h2 id="slot-modal-title">Saves</h2>
				<a class="slot-modal-close" data-close title="Close">✕</a>
   			</header>
   			<div id="slot-new" class="slot-new">
   				<input id="slot-new-label" type="text" maxlength="30" size="30" placeholder="Label this save (optional)" />
   				<a id="slot-new-confirm" class="slot-btn slot-btn-primary">New Save</a>
   			</div>
   			<div class="slot-toolbar">
   				<select id="slot-sort">
       				<option value="newest">Newest first</option>
       				<option value="oldest">Oldest first</option>
       				<option value="label">Label A→Z</option>
       				<option value="progress">Most progress</option>
     				</select>
   			</div>
   			<ul id="slot-list" class="slot-list" aria-live="polite"></ul>
   			<p id="slot-empty" class="slot-empty hidden">No saves yet.</p>
   		</div>
	</div>
	
	<!-- Row template, cloned per slot -->
	<template id="slot-row-template">
    	<li class="slot-row" data-slot-id="">
        	<div class="slot-row-main">
            	<div class="slot-row-name"></div>
            	<div class="slot-row-label"></div>
            	<div class="slot-row-meta">
                	<span class="slot-row-knot"></span>
                	<span class="slot-row-choices"></span>
                	<span class="slot-row-date"></span>
            	</div>
        	</div>
        	<div class="slot-row-actions">
            	<a class="slot-btn slot-btn-load" data-action="load">Load</a>
            	<a class="slot-btn" data-action="rename" title="Rename">Rename</a>
            	<a class="slot-btn slot-btn-delete" data-action="delete" title="Delete">Delete</a>
        	</div>
    	</li>
	</template>

	<!-- Stats Modal -->
	<div id="stats-modal" class="slot-modal hidden" role="dialog" aria-modal="true" aria-labelledby="stats-modal-title">
		<div class="slot-modal-backdrop" data-close></div>
		<div class="slot-modal-panel">
			<header class="slot-modal-header">
				<h2 id="stats-modal-title">Stats</h2>
				<a class="slot-modal-close" data-close title="Close">✕</a>
			</header>
			<div class="stat-list">
				<div class="stat">Name: <span id="stat-name">-</span></div>
				<div class="stat">Wielding: <span id="stat-wielding">-</span></div>
				<div class="stat">Inventory: <span id="stat-inventory">-</span></div>
				<div class="stat">Wearing: <span id="stat-wearing">-</span></div>
				
				<!-- Test Variables -->
				<div class="stat">Red: <span id="stat-red">-</span></div>
				<div class="stat">Yellow: <span id="stat-yellow">-</span></div>
				<div class="stat">Green: <span id="stat-green">-</span></div>
				<div class="stat">Blue: <span id="stat-blue">-</span></div>
				<div class="stat">Purple: <span id="stat-purple">-</span></div>
			</div>
		</div>
	</div>
	
    <script>

/str","/ev",{"VAR=":"p_their","re":true},{"->":".^.^.^.8"},null]}],["du","ev",1,"==","/ev",{"->":".^.b","c":true},{"b":["pop","\n","ev","str","^he","/str","/ev",{"VAR=":"p_they","re":true},"ev","str","^him","/str","/ev",{"VAR=":"p_them","re":true},"ev","str","^his","/str","/ev",{"VAR=":"p_their","re":true},{"->":".^.^.^.8"},null]}],["du","ev",2,"==","/ev",{"->":".^.b","c":true},{"b":["pop","\n","ev","str","^she","/str","/ev",{"VAR=":"p_they","re":true},"ev","str","^her","/str","/ev",{"VAR=":"p_them","re":true},"ev","str","^her","/str","/ev",{"VAR=":"p_their","re":true},{"->":".^.^.^.8"},null]}],"pop","nop","\n","ev",{"VAR?":"p_they"},{"x()":"cap","exArgs":1},"/ev",{"VAR=":"p_They","re":true},"\n","ev",{"VAR?":"p_them"},{"x()":"cap","exArgs":1},"/ev",{"VAR=":"p_Them","re":true},"\n","ev",{"VAR?":"p_their"},{"x()":"cap","exArgs":1},"/ev",{"VAR=":"p_Their","re":true},"\n",{"#f":1}],"can_switch":["ev",{"VAR?":"poss"},0,"!=",{"VAR?":"likes_serrie"},0,">=","&&","/ev","~ret",{"#f":1}],"useful":[{"temp=":"text"},"ev","str","^‘","ev",{"VAR?":"text"},"out","/ev","^hey’re useful for now; that’s all.’","/str","/ev","~ret",{"#f":1}],"cap":[{"temp=":"string"},{"#f":1}],"glitch":[{"temp=":"string"},{"#f":1}],"ch1":[{"->":".^.folktale"},{"folktale":[["^Chapter 1: The Voice in My Head ","#","^CLASS: chapter","/#","\n","^Once upon a time, in an age of heroes and legends, there existed a sword of silver and blue, shining like the light of dawn. He was no ordinary weapon, but one blessed with wisdom and purpose, choosing only those with noble hearts to wield him. Through centuries untold, the sword passed from wielder to wielder, aiding them in battles against beasts, brigands, and the occasional foolish tyrant who thought themself stronger than fate. And though the world was never without danger, the sword and those who bore him kept the darkness at bay. ","#","^CLASS: italic","/#","\n","^But as the years passed, another weapon awakened: a scimitar, gleaming red and gold, whose whispers turned strong warriors into cruel tyrants. Unlike the noble sword, it did not choose – it ensnared, twisting the will of those who held it, bending them to his desire. Its wielder, a warrior of great renown, became its puppet. Under its influence, she ravaged cities, toppled kings, and spread fear where hope once stood. She wielded it with unmatched skill, and together, they seemed unstoppable. ","#","^CLASS: italic","/#","\n","^Until the silver-blue sword stood in their way. ","#","^CLASS: italic","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^Their battle was long and terrible. Blade met blade, and the land itself trembled beneath their war. With the help of others – maces, axes, and sabres, all enchanted like himself – the sword and his hero struck the scimitar with the force of storms, yet the red blade never yielded. But the sword knew something the scimitar did not: he knew that no matter how strong a weapon was, it was the wielder who truly mattered. ","#","^CLASS: italic","/#","\n","^And so, with one final strike, the sword knocked the scimitar from the warrior’s grasp. ","#","^CLASS: italic","/#","\n","^The moment their hands parted, the red glow in the warrior’s eyes flickered, her breath hitching as if waking from a long, terrible dream. The scimitar, now lying powerless upon the ground, could do nothing but watch. ","#","^CLASS: italic","/#","\n","^When she awoke, she wept, claiming she had been nothing but a prisoner within her own mind – that she was good and had always been good. ","#","^CLASS: italic","/#","\n","^“I… I didn’t mean to…” the warrior whispered, her voice unsteady. “It wasn’t me. He– he controlled me. I was never like this.” ","#","^CLASS: italic","/#","\n","^The hero, believing in mercy, spared her life. But the corruption still lingered. ","#","^CLASS: italic","/#","\n","^Even without it in her hands, the darkness had settled deep into her soul, twisting her heart beyond saving. And when the opportunity arose, she tried to reclaim the blade – to return to what she had become. ","#","^CLASS: italic","/#","\n","^So the hero did what they must, but with a heavy heart. The woman was struck down, for she was no longer the person she once had been. ","#","^CLASS: italic","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^As for the scimitar, it could not be destroyed – no enchanted weapon truly could – but it could be contained. The hero took it deep into the icy forest, where the wind howled and no footsteps dared tread, and there, it was buried within a boulder inside a cave. ","#","^CLASS: italic","/#","\n","^And to ensure that no hand – greedy or innocent – could ever claim it again, the cave entrance was made invisible to all but those who had touched the noble sword, though none would dare dream of retrieving the blade that had brought such ruin. ","#","^CLASS: italic","/#","\n","^The world was safe once more. ","#","^CLASS: italic","/#","\n","^The End. ","#","^CLASS: italic","/#","\n",{"->":"ch1.after_story"},{"#f":5}]}],{"#f":1}],"after_story":[["^‘So, what did ya think of this version of the “folktale” I wrote for everyone?’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Huh?’","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^‘What, did you not check it over for me? Oh, come on! I know reading is boring, but I wanted to do something to “help my local community” later.’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘What are you talking about?’","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^‘Why do you sound so confused? …and different… Eh, whatever – I’ll just chalk it up to you being tired… somehow. Well, since you seem to have amnesia, I’ll tell you “what’s going on”: I don’t want my inner voice being all confused when it’s meant to be 𝐦𝐚𝐤𝐢𝐧𝐠 𝐚𝐥𝐥 𝐦𝐲 𝐝𝐞𝐜𝐢𝐬𝐢𝐨𝐧𝐬, after all! Basically, whenever I have a choice, I’ll ask you what to do. You pick an option, and we’ll roll with it. Simple enough?’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Yes, I’ve got it! Now get up already!’","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^‘Fine, fine, I’m getting up…’ ","#","^CLASS: charlie","/#","\n","^I reluctantly push myself out of bed, though it’s a slow, drawn-out process that takes me a good half hour. When I’m finally up, I decide that I’d rather not go downstairs in my pyjamas, so I look through my wardrobe. ","<>","\n",{"->":"ch1.getting_dressed"},{"#f":5}]}],{"#f":1}],"getting_dressed":[["^After some digging, I settle on…","\n","ev","str","^‘Actually keeping your pajamas on!’","/str","/ev",{"*":".^.c-0","flg":20},"ev","str","^‘Being naked!’","/str","/ev",{"*":".^.c-1","flg":20},"ev","str","^‘A normal red outfit.’","/str","/ev",{"*":".^.c-2","flg":20},"ev","str","^‘A normal orange outfit.’","/str","/ev",{"*":".^.c-3","flg":20},"ev","str","^‘A normal yellow outfit.’","/str","/ev",{"*":".^.c-4","flg":4},"ev","str","^‘A normal green outfit.’","/str","/ev",{"*":".^.c-5","flg":20},"ev","str","^‘A normal blue outfit.’","/str","/ev",{"*":".^.c-6","flg":20},"ev","str","^‘A normal purple outfit.’","/str","/ev",{"*":".^.c-7","flg":20},"ev","str","^‘A normal white outfit.’","/str","/ev",{"*":".^.c-8","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","^‘No.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","^‘Haha, very funny.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n","^‘I prefer yellow – even a little red can overtake a whole outfit.’ ","#","^CLASS: charlie","/#","\n","ev","str","^red","/str","/ev",{"VAR=":"tempy","re":true},{"->":"ch1.proceed"},{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n","^‘I don’t even have that colour in my wardrobe.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^"},{"#f":5}],"c-4":["^ ","#","^CLEAR","/#","\n","^‘My favourite.’ ","#","^CLASS: charlie","/#","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","ev","str","^yellow","/str",0,{"f()":"clothe"},"pop","/ev","\n",{"->":"ch1.after_dressing"},{"#f":5}],"c-5":["^ ","#","^CLEAR","/#","\n","^‘I don’t like that colour.’ ","#","^CLASS: charlie","/#","\n","ev","str","^green","/str","/ev",{"VAR=":"tempy","re":true},{"->":"ch1.proceed"},{"#f":5}],"c-6":["^ ","#","^CLEAR","/#","\n","^‘I don’t like that colour much, even if people keep pushing clothes with it onto me.’ ","#","^CLASS: charlie","/#","\n","ev","str","^blue","/str","/ev",{"VAR=":"tempy","re":true},{"->":"ch1.proceed"},{"#f":5}],"c-7":["^ ","#","^CLEAR","/#","\n","^‘I hate too much of that colour – it becomes all-encompassing.’ ","#","^CLASS: charlie","/#","\n","ev","str","^purple","/str","/ev",{"VAR=":"tempy","re":true},{"->":"ch1.proceed"},{"#f":5}],"c-8":["^ ","#","^CLEAR","/#","\n","^‘Kinda boring, but there’s nothing exactly offensive about it.’ ","#","^CLASS: charlie","/#","\n","ev","str","^white","/str",0,{"f()":"clothe"},"pop","/ev","\n",{"->":"ch1.after_dressing"},{"#f":5}]}],{"#f":1}],"proceed":[["ev","str","^‘Wear it.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘Fine.’","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","ev",{"VAR?":"tempy"},0,{"f()":"clothe"},"pop","/ev","\n","^‘But I don’t– fine, fine.’ ","#","^CLASS: charlie","/#","\n",{"->":"ch1.after_dressing"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n",{"->":"ch1.getting_dressed"},{"#f":5}]}],{"#f":1}],"after_dressing":[["^After some digging, I settle on… a ","ev",{"VAR?":"cloth"},"out","/ev","^ t-shirt, brown leather jacket, and a pair of comfy trousers","ev",{"VAR?":"cloth"},"str","^yellow","/str","==","/ev",[{"->":".^.b","c":true},{"b":["^, as usual",{"->":".^.^.^.14"},null]}],"nop","^. Practical and vaguely cool… if you squint. As I look into the mirror to brush messy, brown hair, I see a painfully average height figure with tired eyes of my hair colour staring back at me. Not bad, not great – just me, Charlie. Even my name is average…","\n","^I sigh, but as I lower my brush, something catches my eye: a softly glowing amethyst(?) encrusted into a somewhat sword-shaped titanium (the indigo jewellery kind – I’m not a superhero) pendant with a short blade, hanging from a thin chain around my neck. Right, I almost forgot I found that abandoned in the street last night. I reach up, my fingers brushing the smooth surface of the stone. It’s warm – not uncomfortably so, just… present.","\n","^A strange, nagging feeling crawls at the back of my mind – like I should be taking it off and giving it back to its rightful owner – but when I try to even think about removing it, my thoughts slide away like water slipping through my fingers. Guess I’m a kleptomaniac now, apparently.","\n","^‘Weird. But hey, it 𝑖𝑠 kinda pretty…’ ","#","^CLASS: charlie","/#","\n","^I shake my head, brushing it off. Finders keepers, as they always say…","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^“Charlie, get down here! It’s 12 PM!” my mother yells from somewhere in the house, sharp enough to pierce through my mental ramblings. She’s got a knack for timing, I’ll give her that.","\n","^“Coming!” I shout back, rolling my eyes. Not like I have a choice.","\n","^‘We’ll talk later…’ ","#","^CLASS: charlie","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":"ch2"},{"#f":5}],"#f":5}]}],{"#f":1}],"#f":1}],"ch2":[{"->":".^.start"},{"start":[["^Chapter 2: Finders Keepers ","#","^CLASS: chapter","/#","\n","^Waking up was already enough of a struggle, but actually making it downstairs? That was a whole other ordeal. After stretching, dressing, and having a brief existential crisis in front of the mirror (as is tradition), I finally trudge down the stairs.","\n","^The kitchen is the same as always: warm, smelling faintly of whatever my mother had been baking. She stands by the counter, focused on kneading dough or something equally domestic, and far too full of morning energy for my taste. She doesn’t look up when I grab an apple from the fruit bowl and start munching.","\n","^“You’re up late again, Charlie,” she says, her tone carrying that subtle mix of disappointment and amusement she’s perfected over the years. “You really need to start going outside more. Get some fresh air, you know? You’re turning into a houseplant.”","\n","^“Oh, is this the part where you tell me to ‘go touch grass’? Because, uh, I’d rather not.”","\n","^“Not just grass,” she replies with a knowing look. “There’s a whole forest out there. And guess what? It’s berry season!”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^“Oh, sure, send your child into the woods to forage like it’s medieval times. Can’t you just buy berries from the market?” I question, hoping she’ll drop it.","\n","^“You could use some fresh air,” she presses, her tone making it clear that this is less a suggestion and more a decree, “and I need the berries for the pie I’m baking.”","\n","^“A pie?” I narrow my eyes in suspicion. “Is this one of those ‘I’ll do something nice if you do a chore’ situations?”","\n","^“Maybe… Now, go grab a basket from the cupboard and get moving. You’ll survive being outdoors for an hour.”","\n","^“But what about that girl who got–” She thrusts a woven basket into my hands and practically shoves me toward the door.","\n","^‘I hope I don’t get killed out here…’ ","#","^CLASS: charlie","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^The village is… normal. Painfully, aggressively normal. Rows of snug brick cottages press together like gossiping aunties, each one practically smothered in hanging baskets, as if the buildings themselves are competing to see whose owner has the most free time. The streets twist in weird little patterns, like whoever planned them was drunk or bored or both; they’re all made from uneven cobblestone, lined with oil lampposts that never seem to be lit when you actually need them. A couple of newspapers hang from the stand outside the bakery, the bold headline catching my eye for half a second: “LOCAL TRAGEDY UNDER INVESTIGATION”. Right, 𝑡ℎ𝑎𝑡 whole ordeal. Best… not to think about it.","\n","^Unfortunately, stepping outside also means dealing with the locals, every one of them armed with the terrifying rural-village superpower of knowing exactly who I am, who my mother is, and that I apparently haven’t left the house since the dawn of time.","\n","^“Charlie! Out and about? Goodness me, mark the calendar!” Mrs Obridge – my mother’s friend, I think – calls from across the road, nearly dropping her basket of carrots because she’s so determined to wave at me.","\n","^I offer a tiny, awkward smile that probably looks more like a grimace. “Er… hi.”","\n","^Before I can escape, another voice pipes up.","\n","^“Haven’t seen you in ages!” Mr Frilter shouts, leaning over his fence like he’s been waiting his entire life for this moment. “Everything alright at home?”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^“Yes,” I hastily respond, speed-walking away.","\n","^A few more wave when they see me, and I offer a stiff, awkward half-smile that probably looks more like I’m in physical pain. Honestly, everyone here is lovely… which only makes the tight knot in my stomach worse. My palms are already sweating, because apparently the entire village has decided to check in on me at once.","\n","^I eventually pass the last set of houses and finally reach the forest that sits at the edge of it all, hunched over the land like it’s guarding secrets nobody asked it to keep. I’m not saying the place is creepy, but… actually, no, that’s exactly what I’m saying – and yet this is where everyone insists is “good for the soul”. Sure… if your soul enjoys being mildly threatened.","\n","^‘Alright, inner voice, this is your moment. You’re supposed to guide me, right? So, how do we feel about this?’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Go straight into the forest like the responsible berry-picker your mother wants you to be – I really want that pie.’","/str","/ev",{"*":".^.c-3","flg":4},"ev","str","^‘Screw that! Take a detour and avoid responsibility for as long as possible.’","/str","/ev",{"*":".^.c-4","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":"ch2.straight"},{"#f":5}],"c-4":["^ ","#","^CLEAR","/#","\n",{"->":"ch2.detour"},{"#f":5}],"#f":5}]}],{"#f":1}],"straight":[["ev",{"VAR?":"blue"},1,"+",{"VAR=":"blue","re":true},"/ev","^I take the straightforward route because, let’s face it, the sooner I get this over with, the sooner I can get back to… doing whatever it is I do. The forest is quiet, as it always is, and sunlight filters through the canopy, casting dappled patterns on the forest floor as I tread along the path. The air smells fresh, like damp earth and pine. Maybe this place actually isn’t so bad.","\n","^‘Alright, here we are: nature, trees, dirt… Exciting stuff, right? Don’t answer that.’ ","#","^CLASS: charlie","/#","\n","^As I wander down the path, my eyes scan the bushes for any sign of berries. They’re harder to find than I thought they’d be – I’m not exactly a foraging expert, after all.","\n","^‘You’d think mum could’ve given me more instructions than “go pick berries”. Like, what kind? Where? How do I know they’re not poisonous?’ ","#","^CLASS: charlie","/#","\n","^I stop to glance around, finding a few blood-red berries.","\n","^‘Hey, conscience. Poisonous or not, what do you think?’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Poisonous.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘Totally not poisonous!’","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^‘I’ll look somewhere else, then.’ ","#","^CLASS: charlie","/#","\n",{"->":"ch2.find_estoc"},{"#f":5}]}],{"#f":1}],"detour":[["ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","^Obviously, I have no intention of heading straight into the forest like a responsible, obedient child. No, no. That’s too easy. Instead, I decide to take a nice, leisurely stroll around the edge, burning time until I can justify going home with minimal effort. The plan is simple: walk around, maybe kick a rock or two, and come back with some half-hearted excuse about how I couldn’t find enough berries. Foolproof.","\n","^…Or at least, it would be if the universe didn’t have it out for me.","\n","^One second, I’m walking along the edge of the tree line, minding my own business. The next, the ground beneath me crumbles like it had been waiting for me to step on it, and I’m tumbling down a steep slope. The basket flies out of my hands as I crash through bushes and roots, and I land hard on my back, staring up at the sky as my brain processes what just happened.","\n","^‘Well, that was terrible.’ ","#","^CLASS: charlie","/#","\n","^I groan, pushing myself up. My arms are scratched, there’s dirt all over my jacket, and my dignity is officially at an all-time low, not to mention that the slope is way too steep to climb back up. Fantastic.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^Looking around, the forest suddenly feels different. Darker. The towering trees stretch endlessly in every direction, their branches twisting overhead like skeletal fingers. The air is thicker here, filled with the damp scent of moss and earth. At least I manage to pick up my basket again.","\n","^‘So, inner voice, here we are: alone in the woods with a basket and zero survival skills. Feeling helpful yet?’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘No.’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-2","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n","^I take the silence as a no and sigh.","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^‘Why do I even bother talking to you?’ ","#","^CLASS: charlie","/#","\n","^Shaking off the fall (and my growing sense of doom), I pick the basket back up and pretend that never happened. If anyone asks, I totally meant to come this way.","\n","^‘Is it weird that I’m not exactly looking forward to this? Maybe I’ll find some weird, magical object that’ll make this whole situation worth it.’ ","#","^CLASS: charlie","/#","\n","^I snicker to myself.","\n","^‘Yeah, right. But let’s be real, I’m just gonna grab some regular, boring berries and head back home.’ ","#","^CLASS: charlie","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":"ch2.find_estoc"},{"#f":5}],"#f":5}]}],{"#f":1}],"find_estoc":[["^Before I can ","ev",{"CNT?":"ch2.straight"},"/ev",[{"->":".^.b","c":true},{"b":["^think of doing so",{"->":".^.^.^.6"},null]}],[{"->":".^.b"},{"b":["^get too lost in my one-sided conversation",{"->":".^.^.^.6"},null]}],"nop","^, something catches my eye: a flicker of motion between the trees up ahead. I freeze, my heart doing a weird little jump. Was that… someone? Or something?","\n","^‘Did you see that? Tell me you saw that.’ ","#","^CLASS: charlie","/#","\n","^Shaking my head, I laugh nervously.","\n","^‘I’m imagining things. Great. Love that for me.’ ","#","^CLASS: charlie","/#","\n","^“Probably just an animal… Or maybe I’m finally losing it. Either option feels plausible at this point.”","\n","^Still, I can’t help but look over my shoulder as I continue along the path. The forest seems less quiet now, like it’s holding a secret I’m not supposed to know. After a moment, I pretend nothing happened and ignore it, as usual.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^I walk deeper into the forest, kicking at fallen leaves and muttering to myself. Finding berries should be simple – just look for small, edible-looking things that don’t scream poisonous – but my enthusiasm is at an all-time low. Every little noise makes my skin crawl, and I keep thinking back to whatever I saw earlier. Or thought I saw.","\n","^‘Inner voice, remind me, why am I even doing this?’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Pie.’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘Pie!’","/str","/ev",{"*":".^.c-2","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"blue"},1,"+",{"VAR=":"blue","re":true},"/ev",{"->":".^.^.^.g-1"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^‘Oh right, pie. I’m risking life and limb for pie.’ ","#","^CLASS: charlie","/#","\n","^It’s not a terrible reason, but still.","\n","^Just as I’m about to give up and grab the first vaguely berry-like thing I see, something ahead catches my attention. Not movement this time, but light. A faint, silvery-blue glow, barely visible through the trees.","\n","^‘Oh, great. That’s not ominous at all.’ ","#","^CLASS: charlie","/#","\n","^I hesitate. Every single horror story I’ve ever heard is screaming at me to not investigate the mysterious glowing thing in the middle of the creepy forest. But, well, curiosity exists… and I have terrible instincts.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^Pushing aside a few branches, I step into a small clearing and freeze.","\n","^There, in a small clearing ahead, is something that definitely isn’t a berry bush.","\n","^It’s a man.","\n","^Ⱡɏȉȵg ȯn ṭẖɇ ɠṙôûńď.","\n","^Ɲơť ṃöṽĭṇĝ.","\n","^A chill runs through me as my breath catches in my throat. My feet refuse to move for a moment, as if stepping any closer will confirm what I really don’t want to be true. But I can’t just… leave.","\n","^Taking a deep breath, I make slow, cautious steps forward, my hands gripping the basket tighter. The man is young – probably in his twenties – but his face is pale and his body completely still. His clothes are torn, blood staining the fabric and the earth beneath him. There’s no rise and fall of breath; no signs of life.","\n","^I don’t need to check: I know he’s dead.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-4","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^‘O-okay, so, uh. This is happening. What do we do? I mean, I could scream. That seems reasonable. Or I could just… turn around and pretend we never saw this.’ ","#","^CLASS: charlie","/#","\n","^“Ah! Finally! Someone with a pulse!”","\n","^I flinch so hard I nearly drop my basket. I quickly look for the source of the noise and realise that next to the body, half-buried in the dirt, is him. Estoc.","\n","^Everyone knows Estoc. He’s practically a legend: the blade that turns ordinary people into heroes; the weapon that chooses its wielder, not the other way around; the one that, last I heard, was wielded by a warrior who was supposed to be unstoppable…","\n","^A warrior who is very much not here anymore.","\n","^The gleaming silvery-blue sword is impossibly ornate, its double-edged blade somehow unstained despite the chaos surrounding it. The fuller runs clean down its length, splitting the reflective silver surface in two, while a vein of cold blue light surrounds it like a frozen moat trapped within steel. The hilt is crafted from the same silver, its broad crossguard holding a single azure gemstone set in the middle, glinting coldly in the light. The grip is wrapped tightly in blue-grey leather, worn from use, leading to a sharply pointed pommel that balances the weapon’s weight. Power radiates from him, the kind of presence you can feel even if you don’t understand it. I don’t need to touch him to know he’s something more.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-5","flg":4},{"c-5":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"#f":5}],"g-4":["^“Wait, hold on. If you’re here, then that means…” I trail off. Right. The previous hero is gone, and from the fact that his famous sapphire-encrusted sword is literally stuck in the dirt, I’m guessing things went very badly against whatever villain they were fighting.","\n","^“Yes.” Estoc speaks gravely, the sapphires in his hilt glowing especially bright when he speaks. “My last wielder has fallen. A shame because he was one of my favourites…”","\n","^I respond in a panicked tone, speaking as fast as possible in hopes that I can escape from… wherever this is. “Well, that’s unfortunate. But uh, good luck with that! I’m just here for berries, so–”","\n","^“Wait,” he cuts in sharply. “You cannot simply walk away! I need your help!”","\n","^I don’t move closer. If anything, I step back: the last thing I want is to get involved in whatever just happened here.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-6","flg":4},{"c-6":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-5"},{"#f":5}],"#f":5}],"g-5":["^The sword’s voice is heard again, with the kind of authority that demands attention, though also a hint of worry mixed in. “Cease your prattling and come back here, for time is of the essence.”","\n","^“Oh, wow, okay. No warm-up? No ‘Hey, how’s it going?’ Just straight into ominous demands.” I take a breath, rubbing my temples. “Nope. Not freaking out. Totally fine.”","\n","^Estoc sighs. Like, an actual long-suffering sigh. “This is no time for foolishness. Just pick me up, and be quick about it – there is no time to waste!”","\n","^“Absolutely not. Not doing this.”","\n","^His voice, once full of grandeur, quickly shifts to something closer to desperation. “Listen, the one who struck down my previous wielder has been heading toward the village nearby. Your village, I presume. If you do not act, your home may be next.”","\n","^That stops me cold. “My… village?”","\n","^“Aye.” The weapon’s voice softens, almost like he pities me. “The one who defeated my wielder is not one to leave loose ends. If they march forward unchallenged, then your town – your people – will be destroyed.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-7","flg":4},{"c-7":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-6"},{"#f":5}],"#f":5}],"g-6":["^I swallow hard. I don’t want to believe it, but if this is the sword that has shaped history itself, I can’t just brush him off entirely.","\n","^“Then you stop them,” I argue. “You’re, like, magic, right?”","\n","^“A sword is only as strong as the one who wields it.”","\n","^There’s a pause. I realise what he’s implying. “You can’t actually be serious.”","\n","^“What are you waiting for? Do you not understand the gravity of this moment? You must wield me!”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-8","flg":4},{"c-8":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-7"},{"#f":5}],"#f":5}],"g-7":["^Oh, no.","\n","^No, no, no, no, no.","\n","^Then I shake my head. “Yeah, no. That’s a terrible idea.”","\n","^Estoc bristles. “What?”","\n","^“I mean, have you met me? I am not hero material!” I gesture vaguely at myself. “Do I look like someone who should be swinging around a destiny-bound murder stick?”","\n","^The enchanted blade makes a strangled noise, as if physically restraining himself from yelling. “You. Are. The. Only. One. Here.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-9","flg":4},{"c-9":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-8"},{"#f":5}],"#f":5}],"g-8":["^I stare at him. He stares at me. Well, he doesn’t have eyes, but the judgement is there. “…Well, I know, but–”","\n","^“Stop that thought! I personally think that you would be a great hero,” Estoc barks. He, of course, changes his tone quickly. “Er… well, perhaps you are correct. But I am afraid we are in dire straits, and the options are… limited.”","\n","^I squint. “So you don’t actually think I’d be a good hero, huh?”","\n","^He clears his “throat”. “No, no, no! You would be a great hero!”","\n","^“Okay, now you’re just lying.”","\n","^“I do not have time to debate this with you,” he snaps, his knightly eloquence slipping. “Are you going to argue semantics, or are you going to pick me up?”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-10","flg":4},{"c-10":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-9"},{"#f":5}],"#f":5}],"g-9":["^I stare at the sword gleaming in the sunlight. For a moment, I almost feel like I’ve stepped into a bad fantasy novel, but this is real, and whether I like it or not, I have a weapon that could either save everyone or make everything worse. I hesitate, glancing between the glowing blade and the distant outline of my village. This has ‘bad idea’ written all over it.","\n","^‘Well, partner… What’s it gonna be?’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Grab the sword. I mean, come on, it’s a legendary weapon. What’s the worst that could happen?’","/str","/ev",{"*":".^.c-11","flg":4},"ev","str","^‘Nope. Absolutely not. I don’t care how legendary that sword is; you are not touching it.’","/str","/ev",{"*":".^.c-12","flg":4},{"c-11":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"blue"},1,"+",{"VAR=":"blue","re":true},"/ev","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev",{"->":"ch3.get_sword"},{"#f":5}],"c-12":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","ev",{"VAR?":"yellow"},2,"+",{"VAR=":"yellow","re":true},"/ev",{"->":"ch3.hesitate"},{"#f":5}],"#f":5}]}],{"#f":1}],"#f":1}],"ch3":[{"->":".^.start"},{"start":["^Chapter 3: Fight or Flight ","#","^CLASS: chapter","/#","\n","ev","str","^Estoc","/str","/ev",{"VAR=":"wielding","re":true},"done",{"#f":1}],"get_sword":[["thread",{"->":"ch3.start"},"^“Alright, I’ll do it. But only to shut you up.”","\n","^I grip Estoc’s hilt and pick him up, the weight of the sword unfamiliar but strangely comforting. His silvery-blue glow pulses faintly, like a heartbeat, and I half expect some kind of surge of power to rush through me. Yet, nothing happens – no magical transformation, no divine revelation, nothing.","\n","^“Ah, excellent,” Estoc says, his voice tinged with relief. “I must say, you’ve made the right choice. Now, quickly, to the village; there is no time to waste.”","\n","^“Yeah, yeah,” I mutter, adjusting my grip.","\n","^The weight of the sword in my hand suddenly feels heavy, but not in the way I thought it would. It feels… right. Like he’s supposed to be mine – which is weird and unsettling, but I don’t have time to dwell on it. ","<>","\n","thread",{"->":"ch3.loot_corpse"},"^“This better be worth it.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^The run back to my village feels longer than it should, the sword’s glow casting strange shadows as the trees whip past. My chest tightens with every step, dread clawing at the edges of my thoughts. Estoc doesn’t say much, but I can feel his steady presence pushing me forward.","\n","^When I break through the forest’s edge, I finally see my village; it’s not in flames, thank every deity I’ve ever heard of, but it’s clear that something’s wrong. Several buildings are in ruins, and in the centre stands a figure bathed in a faint green light that seems to radiate from her weapon – a glowing lime bow almost as bright as Estoc itself. She moves with a kind of grace that’s almost otherworldly, her ginger hair swaying in the wind. I don’t need to be told what she is; the villain","\n","thread",{"->":"ch3.autumn_desc"},"ev","str","^Continue","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":"ch3.fight"},{"#f":5}],"#f":5}]}],{"#f":1}],"hesitate":[["thread",{"->":"ch3.start"},"^I back away from Estoc, shaking my head. “Nope. Still not happening.”","\n","^The sword groans. “For the love of– Look, just… hold me,” he says, softer now, coaxing. “Feel what it’s like to wield me. Nothing more, I promise.”","\n","^“That sounds suspicious.”","\n","^“Suspicious?” His voice is drenched in wounded pride. “I am a legendary blade, the greatest weapon known to man. Do you think I would waste my time on trickery?”","\n","^I squint at him. “…Maybe?”","\n","^“Humour me.”","\n","^I chew the inside of my cheek. “You’re just saying that to manipulate me into picking you up.”","\n","^“Yes! I mean no! I mean–” His voice turns sharp. “Look, we do not have time for this! If you do not take up the role as a hero, then who will?”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^I don’t move. My instincts are screaming at me not to trust him, but… what if he’s right? What if holding him just gives me some clarity, some perspective on what to do? Part of me is screaming to turn and run, but another part – the part I like to pretend doesn’t exist – feels… weirdly drawn to him.","\n","^Against my better judgement, I step closer and wrap my hand around the hilt. The moment I do, a warmth spreads through me, a spark of something I can’t quite place. Suddenly, the idea of being a hero doesn’t seem so… ridiculous.","\n","ev","str","^‘Drop him! Why didn’t you listen to me when I told you to not touch him?’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-2","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->t->":"ch3.drop_estoc"},{"->":".^.^.^.g-1"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"f()":"estoc_control"},"pop","/ev","\n","^By this point, my thoughts feel sharper, more focused, and for some reason, your protests – if there are any – seem… quieter, as if they’re not entirely gone but distant. Instead, a sense of resolve I didn’t know I had fills the space. It’s not overwhelming, just… enough to nudge me in a direction I wouldn’t usually go.","\n","^“Good,” Estoc says, his tone approving. “Very good. You are already more suited to this role than you realise. Now, let us make haste.”","\n","^I don’t argue this time, my focus shifting entirely to the village ahead. ","<>","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["thread",{"->":"ch3.loot_corpse"},"ev","str","^Continue","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":"ch3.hesitant_arrival"},{"#f":5}],"#f":5}]}],{"#f":1}],"drop_estoc":[["ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","ev","str","^None","/str","/ev",{"VAR=":"wielding","re":true},"^The voice in my head is so loud and urgent that I yelp, flinging the sword from my hands as if he– it just grew teeth and tried to bite me. Estoc lands in the dirt with a clatter, and I stumble back, my heart racing.","\n","^Estoc lets out a noise of pure offence. “What in the– How did you–?” I can feel him staring at me, despite not having eyes.","\n","^I don’t know. I don’t know what just happened, only that I suddenly needed to drop him. My hands shake slightly as I take a step back and, by reflex, go straight to my neck; only now do I notice that it feels almost raw – like I’ve been strangled or burned – though I have no idea why.","\n","^Estoc falls silent for a long moment. Then, almost too casually, he says, “Very well. Go, then. Run home. Let’s see how well that works out for you.”","\n","^I turn and bolt, running as fast as my legs will carry me. I don’t stop until I see the village ahead, only to immediately wish I had. Flames lick at the rooftops, and people are running and screaming as a figure looms in the centre of it all, a glowing lime bow in hand, firing arrow after arrow with terrifying precision. My stomach twists; I can’t fight that – I can’t do anything.","\n","^“No, no, no,” I whisper, my feet frozen for a moment as I take in the scene. I have no weapon, no way to help.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["ev","str","^Estoc","/str","/ev",{"VAR=":"wielding","re":true},"^‘This is all your fault! Why did you tell me to drop him?! We could’ve had a fighting chance!’ ","#","^CLASS: charlie","/#","\n","^I know it’s not really your fault, but frustration bubbles up anyway. With no other options, I turn and run back into the forest. When I reach the clearing, Estoc is still there, thank the gods","\n","^“Oh, you’re back,” he says dryly. “Had a change of heart, have we?”","\n","^“Don’t,” I snap, grabbing his hilt. “Just… don’t.”","\n","^His smug tone speaks volumes, but he doesn’t resist as I lift him. ","<>","\n","ev","void","/ev","->->",{"#f":5}]}],{"#f":1}],"loot_corpse":["^Before I go, I hesitantly l̶o̶o̶t̶ ̶t̶h̶e̶ ̶c̶o̶r̶p̶s̶e̶ take Estoc’s sheath and put it around my waist. ","#","^CLASS: fancy","/#","\n","done",{"#f":1}],"autumn_desc":["<>","^ is here, and they’re armed with a weapon that seems just as powerful, if not more so, than Estoc.","\n","^“Who… who is she?”","\n","^“Her name is Autumn,” Estoc growls, “the one who felled my last wielder. Do not let her escape.”","\n","done",{"#f":1}],"hesitant_arrival":[[["^When ","ev",{"VAR?":"poss"},1,"==","/ev",[{"->":".^.b","c":true},{"b":["^we arrive, the sight before me is devastating.",{"->":".^.^.^.8"},null]}],[{"->":".^.b"},{"b":["^I run back to the village and break through the trees, the sight is even worse than last time.",{"->":".^.^.^.8"},null]}],"nop","^ Flames consume several buildings, and people scramble to fight or flee. ","ev",{"VAR?":"poss"},1,"==","/ev",[{"->":".^.b","c":true},{"b":["^At the centre",{"->":".^.^.^.17"},null]}],[{"->":".^.b"},{"b":["^Several buildings are in ruins, and in the middle",{"->":".^.^.^.17"},null]}],"nop","^ of the chaos stands ","ev",{"VAR?":"poss"},1,"==","/ev",[{"->":".^.b","c":true},{"b":["^a",{"->":".^.^.^.26"},null]}],[{"->":".^.b"},{"b":["^the same",{"->":".^.^.^.26"},null]}],"nop","^ figure bathed in a faint green glow that seems to radiate from her weapon – ","ev",{"VAR?":"poss"},1,"==","/ev",[{"->":".^.b","c":true},{"b":["^a",{"->":".^.^.^.35"},null]}],[{"->":".^.b"},{"b":["^the",{"->":".^.^.^.35"},null]}],"nop","^ glowing lime bow that is almost as bright as Estoc itself. She moves with a kind of grace that’s almost otherworldly, and her ginger hair sways in the wind. I don’t need to be told who this is. The villain","ev",{"VAR?":"poss"},1,"!=","/ev",[{"->":".^.b","c":true},{"b":["^, whoever they are,",{"->":".^.^.^.43"},null]}],"nop","\n","thread",{"->":"ch3.autumn_desc"},"ev",{"VAR?":"poss"},1,"==","/ev",[{"->":".^.b","c":true},{"b":["\n","^“How? What do we even do?”","\n","^His voice is calm, almost soothing. “We fight.”","\n","^And for some reason, I don’t doubt him.","\n",{"->":".^.^.^.53"},null]}],"nop","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":"ch3.fight"},{"#f":5}],"#f":5,"#n":"g-0"}],null],{"#f":1}],"fight":[["^I glance around. Some villagers are peeking from behind toppled carts and broken walls. The local constables are trying to form a line, but it’s clear they’re in over their heads. My mother is nowhere to be seen, and a sudden pang of worry hits me; I hope she’s safe, but there’s no time to check.","\n","^“That’s Estoc! Yes, the hero has arri– oh gods, it’s 𝑦𝑜𝑢!” One of the villagers shout. “Why didn’t the hero show up? Why is it them?!”","\n","^“Charlie! What in heaven’s name are you doing with that sword?!” the main constable yells, his voice cracking with disbelief.","\n","^“I… I… I’m supposed to help?” I stammer, glancing down at Estoc.","\n","^“Whatever, we’ll cover you. Don’t let that psychopath reach the market square!”","\n","^I swallow hard, my fingers tightening around Estoc. The woman – Autumn, Estoc called her – stands at the centre of the destruction, her posture effortlessly poised. Her glowing lime green eyes flicker with something unreadable as they settle on Estoc in my hands. The glow of her bow pulses, like it’s alive – because it is. I can feel it, the same way I can feel Estoc’s presence. It isn’t just a normal weapon: it’s another one of 𝑡ℎ𝑒𝑚.","\n","^“Stay calm,” Estoc murmurs, his presence steadying me more than I expected. “Focus. Watch her movements.”","\n","ev","str","^‘He’s right. You’re panicking too much.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘He doesn’t get to tell you what to do.’","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"blue"},1,"+",{"VAR=":"blue","re":true},"/ev",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,">","/ev",[{"->":".^.b","c":true},{"b":["\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev",{"->":".^.^.^.12"},null]}],[{"->":".^.b"},{"b":["\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev",{"->":".^.^.^.12"},null]}],"nop","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^“You’re new.” Autumn’s voice is quiet but carries an edge, razor-sharp like the arrows she conjures. She studies Estoc with something close to disdain and sighs. “It really didn’t take long for you to find another wielder, did it?”","\n","^Her gaze drags over my stance and the way I’m gripping Estoc like a lifeline. I have no idea what she sees in me, but whatever it is, it makes her take on a serious tone.","\n","^“Tell me, little hero,” she continues, “did he even let you hesitate? Or did he sink his claws into you the second you touched him?”","\n","^I bristle. “I—what?”","\n","^“Silence, villain,” Estoc interjects, ringing out with a righteous fury","ev",{"VAR?":"poss"},1,"!=","/ev",[{"->":".^.b","c":true},{"b":["^ I do 𝑛𝑜𝑡 share",{"->":".^.^.^.15"},null]}],"nop","^. “Your reign of destruction ends here, with my new wielder… Charlie, was it?”","\n","^‘Pretty sure I never mentioned my name…’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘He can mind-read, you moron.’","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^‘Like you think he’d care about boundaries.’","/str","/ev",{"*":".^.c-3","flg":4},"ev","str","^‘You say that like it matters right now.’","/str","/ev",{"*":".^.c-4","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev",{"->":".^.^.^.g-1"},{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev",{"->":".^.^.^.g-1"},{"#f":5}],"c-4":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"blue"},1,"+",{"VAR=":"blue","re":true},"/ev",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^‘Right, I’m dumb.’ ","#","^CLASS: charlie","/#","\n","^Autumn shakes her head, like this whole situation is just exhausting. “You always did have an ego.”","\n","^She looses an arrow, and blue sparks flare as Estoc intercepts it, sending the projectile ricocheting into a broken wall; a massive crater forms where the arrow hit. I stumble back at the recoil, almost tripping over rubble. Another arrow screams past my ear, and I instinctively roll, my weapon cutting the second arrow mid-flight.","\n","^‘Oh, cool. Explosive arrows. That’s totally fair.’ ","#","^CLASS: charlie","/#","\n","^Two constables charge from the flank, one with a halberd and one with a crossbow. The crossbow fires, but she dodges before it connects. The halberdier swings at her, but an arrow hits him square in the chest. He staggers back, coughing blood, and collapses against a cart.","\n","^The crossbowman fumbles for another bolt, hands shaking; an arrow pins his sleeve to the wall behind him before he can try anything more.","\n","^“Stay out of this,” Autumn says flatly.","\n","^At that, he drops his crossbow and raises his hands in surrender.","\n","ev","str","^‘Pssh… Weaklings.’","/str","/ev",{"*":".^.c-5","flg":4},"ev","str","^‘You should really just copy him","ev",{"VAR?":"blue"},2,">","/ev",[{"->":".^.b","c":true},{"b":["^ – she may spare you so you can fight her later",{"->":".^.^.^.38"},null]}],[{"->":".^.b"},{"b":["^. Pragmatism, and all that",{"->":".^.^.^.38"},null]}],"nop","^.’","/str","/ev",{"*":".^.c-6","flg":4},{"c-5":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","^‘So are we!’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"c-6":["^ ","#","^CLEAR","/#","\n","^‘I would run, but I don’t exactly have a choice right now.’ ","#","^CLASS: charlie","/#","\n","^‘You are NOT running away, you buffoon!’ ","#","^CLASS: estoc","/#","\n","^‘See?’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^I scramble to my feet, chest heaving. The weight of Estoc in my hands suddenly feels clumsy","ev",{"VAR?":"poss"},1,"!=","/ev",[{"->":".^.b","c":true},{"b":["^ – too heavy, too foreign",{"->":".^.^.^.7"},null]}],"nop","^. I’m holding a legendary sword, and yet, ","ev",{"VAR?":"poss"},1,"==","/ev",[{"->":".^.b","c":true},{"b":["^I’m fighting so poorly that ",{"->":".^.^.^.15"},null]}],"nop","^I might as well be holding a useless stick.","\n","^“Engage her. Now!” Estoc commands.","\n","^It goes about as well as you’d expect. I swing Estoc in a wide arc, but Autumn moves before I even finish the motion. I try again, but she– Wait, she 𝑡𝑒𝑙𝑒𝑝𝑜𝑟𝑡𝑠?!","\n","ev","str","^<Inwardly facepalm.>","/str","/ev",{"*":".^.c-7","flg":4},"ev","str","^‘Can we join HER team?’","/str","/ev",{"*":".^.c-8","flg":4},{"c-7":["^ ","#","^CLEAR","/#","\n","^‘Now that’s just ridiculous! ","<>","^ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"c-8":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","^‘","<>","^ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^Welp, we’re dead.’ ","#","^CLASS: charlie","/#","\n","^I try to adjust, slashing toward her new position – the tip of Estoc actually grazes her forearm and a thin line of red appears on her skin.","\n","^Autumn looks down at the cut. Then she looks at me, and for just a moment, something shifts behind her eyes – surprise, maybe, or the faintest ghost of respect.","\n","^Then she shoots an arrow into the ground at my feet, and the explosion sends me tumbling backwards across the cobblestones.","\n","^“That was atrocious,” Estoc deadpans, despite the fact that I 𝑙𝑖𝑡𝑒𝑟𝑎𝑙𝑙𝑦 damaged her.","\n","^“Okay, well, you try fighting a teleporting archer with a 𝑠𝑤𝑜𝑟𝑑 then!” I snap.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-9","flg":4},{"c-9":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"#f":5}],"g-4":["^The main constable rallies three more of his men, forming a shield wall between me and Autumn. \"Get behind us!\"","\n","^I don’t argue, and for a beautiful, fleeting moment, it almost looks like a real defence.","\n","^Autumn regards them with a flat expression. \"Move.\"","\n","^They don’t.","\n","^She fires. The first arrow explodes against the leftmost shield, and the constable behind it is launched off his feet, his arm a mess of splinters and blood. The second arrow punches clean through the middle shield and into the man behind it; he crumples with a choked sound, blood spreading fast across the cobblestones. The remaining two break formation and scatter. I don’t blame them.","\n","^The main constable – the one who told me to fight – is frozen, staring at the body of his colleague. Then, his expression hardens, and he charges at Autumn with nothing but a short sword and a scream. His blade arcs toward her neck in a committed swing, but she teleports behind him, and an arrow takes him in the back of the knee before he can turn around. He drops hard, his sword clattering away across the stone.","\n","^\"Brave,\" she murmurs, not looking at him. \"Stupid, but brave.\"","\n","^‘I am so going to die…’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Correct!’","/str","/ev",{"*":".^.c-10","flg":4},"ev","str","^‘We’ll see…’","/str","/ev",{"*":".^.c-11","flg":4},{"c-10":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev",{"->":".^.^.^.g-5"},{"#f":5}],"c-11":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-5"},{"#f":5}],"#f":5}],"g-5":["^“You are not going to die,” Estoc bites back, clearly having sensed my thoughts ","ev",{"VAR?":"poss"},1,"!=","/ev",[{"->":".^.b","c":true},{"b":["^without my permission ",{"->":".^.^.^.7"},null]}],"nop","^again. “Just listen to me: strike when she reloads!”","\n","^“She doesn’t reload!” I hiss back, dodging to the side as another arrow streaks past me. “She just spawns arrows out of thin air!”","\n","^“Details,” Estoc mutters, clearly unbothered. “You are supposed to be a hero. Perhaps act like one?”","\n","^An arrow I didn’t notice is about to strike me, when a flash of blue light explodes outwards, a thin, shimmering dome snapping into existence just in time. The arrow slams into the shield with a loud crack before dissolving into harmless sparks. The shield shatters a second later, brittle as glass, but it holds long enough to save my life.","\n","^‘Huh, you’d think Estoc’s shields would be stronger than that…’ ","#","^CLASS: charlie","/#","\n","^“Careful!” Estoc warns. “You are very lucky I protected you there.”","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-12","flg":4},{"c-12":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-6"},{"#f":5}],"#f":5}],"g-6":["^“Autumn,” a second voice murmurs; it’s quiet, almost hesitant. The glow from the bow flickers slightly. “Is this… necessary?”","\n","^My breath catches. I don’t know what I expected, but there’s something different about the way her bow speaks. Unlike Estoc, whose presence is overbearing and impossible to ignore, this weapon’s voice sounds… resigned – almost reluctant, like she’s afraid of being heard.","\n","^Autumn’s expression hardens, but it isn’t anger. It’s something else, something harder to place. She glances down at the bow with an unreadable look, before answering just as quiet. “I’m sorry, Recurve, but it has to be.”","\n","^I barely register the slight movement of her arm before her bow rises. In an instant, an arrow of crackling green energy materialises and is aimed towards me.","\n","^“Move!” Estoc yells.","\n","^Autumn’s shot is already loosed, and this time, I parry on instinct. The moment Estoc meets the arrow, a sharp clang echoes through the air, before the force sends me backward. A second arrow flies at me while I’m still off-balance, and Estoc doesn’t hesitate. Another flash of blue blooms between us – smaller this time, but just enough to catch the arrow mid-flight. The shield, again, shatters instantly.","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-13","flg":4},{"c-13":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-7"},{"#f":5}],"#f":5}],"g-7":["^“Faster! Your form is weak, and I am tired of saving you!”","\n","^“","ev",{"VAR?":"purple"},1,">","/ev",[{"->":".^.b","c":true},{"b":["^I noticed,” I spit out, steadying my footing. “Maybe try being less useless?",{"->":".^.^.^.10"},null]}],[{"->":".^.b"},{"b":["^Then DO something useful!",{"->":".^.^.^.10"},null]}],"nop","^”","\n","^“I am guiding you, imbecile!” Estoc barks. “You are fighting as though you have never held a sword before!”","\n","^“Because I haven’t!”","\n","^‘If only this had been a year later: maybe then, I’d get that “adult wisdom” people keep telling me about.’","\n","^She fires two more arrows in rapid succession, and I yelp, diving for cover behind a toppled cart. The sheer reality of this finally hits me: I am the only one standing between this woman and my entire village.","\n","ev","str","^‘I wish I had popcorn – this is hilarious!’","/str","/ev",{"*":".^.c-14","flg":4},"ev","str","^‘Just calm down; it’ll be fine.’","/str","/ev",{"*":".^.c-15","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-16","flg":4},{"c-14":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","^‘You can’t even eat.’ ","#","^CLASS: charlie","/#","\n",["ev","str","^‘But the AURA!’","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.^.^.g-8"},{"#f":5}]}],{"#f":5}],"c-15":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"green"},1,"+",{"VAR=":"green","re":true},"/ev",{"->":".^.^.^.g-8"},{"#f":5}],"c-16":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-8"},{"#f":5}],"#f":5}],"g-8":["^“You are cowering,” Estoc states flatly.","\n","^“I am strategising,” I correct, pressing my back against the wood.","\n","^“You are losing.”","\n","^“Oh, really? Hadn’t noticed!” I hiss through clenched teeth. I duck under another shot, barely keeping my balance. “Hey, here’s a thought: why don’t you do it?!”","\n","^“I would if I had legs, you absolute–” Estoc cuts himself off, likely to keep himself from saying something very un-legendary.","\n","^Autumn raises an eyebrow at our 𝑓𝑙𝑎𝑤𝑙𝑒𝑠𝑠 teamwork, but doesn’t look impressed. “This is just sad,” she murmurs, lifting her bow again. “Are you sure you chose them, Estoc? You must be getting desperate.”","\n","^“Charlie is… a work in progress,” Estoc admits, and I nearly drop him right there.","ev",{"VAR?":"poss"},1,"==","/ev",[{"->":".^.b","c":true},{"b":["^ Still, he’s not exactly wrong.",{"->":".^.^.^.19"},null]}],"nop","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-17","flg":4},{"c-17":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-9"},{"#f":5}],"#f":5}],"g-9":["^Recurve’s quiet voice chimes in again. “Autumn, maybe we should–”","\n","^“No.” Autumn cuts her off, her voice leaving no room for argument. “If they picked up that sword, then they’re a part of this. Plus, this whole village deserves everything that’s coming to them!”","\n","^I groan, feeling my patience and stamina running thin. She releases another arrow, and this time, I don’t manage to dodge it. The arrow grazes my side, pain searing through me, but somehow, it doesn’t dig as deep as it should have – likely Estoc.","\n","^‘This isn’t working – I’m no hero: I know it, Estoc knows it, you know it. What could I possibly do now?’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Give her the stupid sword. That way, she might leave us alone, and he’ll be gone: a win-win!’","/str","/ev",{"*":".^.c-18","flg":4},"ev","str","^‘","ev",{"CNT?":".^.^.g-1.c-6"},"/ev",[{"->":".^.b","c":true},{"b":["^I already told you to r",{"->":".^.^.^.25"},null]}],[{"->":".^.b"},{"b":["^R",{"->":".^.^.^.25"},null]}],"nop","^un for the hills! If we stay here any longer, we’re gonna die!’","/str","/ev",{"*":".^.c-19","flg":4},"ev","str","^‘I still believe in you!’","/str",{"CNT?":".^.^.g-1.c-6"},"!","/ev",{"*":".^.c-20","flg":5},{"c-18":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","ev",{"CNT?":"ch3.hesitate"},"/ev",[{"->":".^.b","c":true},{"b":["^ ",{"->":"ch3.keep_estoc"},{"->":".^.^.^.22"},null]}],[{"->":".^.b"},{"b":["^ ",{"->":"ch3.abandon_estoc"},{"->":".^.^.^.22"},null]}],"nop","\n",{"->":".^.^.^.g-10"},{"#f":5}],"c-19":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev",{"->":".^.^.^.g-10"},{"#f":5}],"c-20":["^ ","#","^CLEAR","/#","\n","^‘Appreciate the sentiment, but we both know that’s a stupid decision. Time to book it.’ ","#","^CLASS: charlie","/#","\n",{"->":".^.^.^.g-10"},{"#f":5}],"#f":5}],"g-10":[{"->":"ch3.flee"},{"#f":5}]}],{"#f":1}],"keep_estoc":[["ev",{"VAR?":"blue"},1,"+",{"VAR=":"blue","re":true},"/ev","ev",{"VAR?":"likes_serrie"},2,"-",{"VAR=":"likes_serrie","re":true},"/ev","^I freeze. Did you just–? No. No, you did not just suggest that.","\n","^‘Are you serious? Do you even think before you propose things like that? Or is your whole thing just throwing out the worst possible options and hoping one finally sticks?’ ","#","^CLASS: charlie","/#","\n","^The words taste like acid, and I feel a mix of exhaustion and something sharper – betrayal? No, not quite – more like… resentment. I should have known better than to listen to you.","\n","^‘Trying to make me ditch Estoc when I first got him? Great idea. That sure worked out! Wasting time trying to negotiate when we could’ve just left? Brilliant.’ ","#","^CLASS: charlie","/#","\n","^My shoulders burn from the weight of the fight, and my necklace feels almost on fire, but the anger keeps me standing.","\n","^‘After all the times you’ve made me do something stupid – ditching him, hesitating, second-guessing myself – you still think you get to weigh in? “Oh, just leave the sword, Charlie! It’s fine, Charlie! You don’t need it, Charlie! Blah blah blah!” That’s what you sound like.’ ","#","^CLASS: charlie","/#","\n","^Estoc doesn’t react, because of course he doesn’t. He doesn’t hear you; he doesn’t even know you exist. But I do, and I’m done listening to you.","\n","^‘I’m keeping him. Even if he is insufferable. Even if he’s arrogant and demanding and has way too much to say about my fighting skills, he’s still the only thing standing between me and death.’ ","#","^CLASS: charlie","/#","\n","^‘And if you think I’m letting go of that?’ ","#","^CLASS: charlie","/#","\n","^‘Not happening. Not 𝒆𝒗𝒆𝒓.’ ","#","^CLASS: estoc_p","/#","\n","ev","str","^Continue","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["ev",true,"/ev",{"VAR=":"public_insanity","re":true},"^“You know what? No, we’re not doing that. We’re not doing anything you say anymore, because clearly, you have no idea what you’re talking about! Estoc’s m𝑖n𝑒.”","\n","^The words leave my mouth before I even process them. And then silence. A deep, awkward silence that stretches out, pressing in on me from both sides. Slowly, I look up.","\n","^Estoc and Autumn are both staring at me like I’ve grown another head.","\n","^“I—pardon?” Estoc asked, sounding weirdly baffled. I said that out loud, didn’t I? Great, now he’s confused. Of course he is – because to him, it looks like I’m talking to myself! “Who in the world are you talking to?”","\n","^My face heats up. “No one!” I blurt out, shaking my head quickly. “No one important, anyway. Just– just shut up!”","\n","^Autumn briefly pauses her fighting to comment on this, because of course even the evil villain would be concerned – why wouldn’t she? “You’re either going crazy, or you’ve got a ghost with you. I don’t care which: either way, it’s a problem for you, not me.”","\n","^“I said shut up!”","\n","ev","str","^‘Great going, bozo. Now everyone wants you put in a loony bin!’","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^Before I can even attempt to salvage this disaster, she moves. A green-glowing arrow materialises against her bowstring, and in the next instant, she fires. I barely manage to duck as it embeds itself in the wall behind me. Shards of wood explode outward, a piece slicing across my cheek. Another arrow slices past me, and I stumble, cursing under my breath. I am so outmatched it’s not even funny.","\n","^No, wait. That’s a lie. It’s hilarious.","\n","^“Charlie, do not falter!” Estoc urges, his glow flickering in my grip. “We must press the–”","\n","^“Nope, we must run!” I snap, already turning on my heel.","\n","^‘This fight is not happening, not anymore. I don’t care what Estoc says and I don’t care what you say: I am 𝑛𝑜𝑡 dying here just to prove a point… And I sure as hell don’t trust you anymore.’ ","#","^CLASS: charlie","/#","\n","ev","str","^‘Rude, but your first intelligent dec
