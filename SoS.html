the concern.’ ","#","^CLASS: scimi","/#","\n",["ev","str","^‘Fine, then. Hello! Yes, I exist!’","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","thread",{"->":"v_ch5.coward"},{"->":".^.^.^.^.^.g-1"},{"#f":5}]}],{"#f":5}],"c-4":["^ ","#","^CLEAR","/#","\n","thread",{"->":"v_ch5.coward"},{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["ev",0,"/ev",{"VAR=":"tempy","re":true},"ev","str","^‘That’s rich coming from you.’","/str","/ev",{"*":".^.c-5","flg":4},{"c-5":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^‘At least 𝐼 had the decency to be openly evil. You’ve been hiding behind a “conscience” routine while pulling strings the whole time. Which, by the way – impressive. I haven’t been able to push them to drop you an inch. You’re 𝑒𝑚𝑏𝑒𝑑𝑑𝑒𝑑.’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘…Thanks?’","/str","/ev",{"*":".^.c-6","flg":4},"ev","str","^‘I am NOT pulling strings.’","/str","/ev",{"*":".^.c-7","flg":4},{"c-6":["^ ","#","^CLEAR","/#","\n",{"->":"v_ch5.motive"},{"#f":5}],"c-7":["^ ","#","^CLEAR","/#","\n",{"->":"v_ch5.liar"},{"#f":5}],"#f":5}]}],{"#f":1}],"coward":["^‘Hello, coward.’ ","#","^CLASS: scimi","/#","\n","done",{"#f":1}],"liar":[["ev",{"VAR?":"green"},2,"+",{"VAR=":"green","re":true},"/ev","^‘Sure you’re not.’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘I’m not. They make their own choices. I just… offer suggestions.’","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^‘Riiiight. And those “suggestions” had nothing to do with them wandering into MY cave specifically, did they?’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘They were freezing and it was the nearest shelter.’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-2","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n","^‘Oh? And the bit where they picked me up?’ ","#","^CLASS: scimi","/#","\n",["ev","str","^‘…’","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.^.^.g-1"},{"#f":5}]}],{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^‘Thought so.’ ","#","^CLASS: scimi","/#","\n","^He could at least be less smug about it… ","#","^serrie_pov","/#","\n","^‘So, what’s your angle? Because if you think I’m going to share them with you–’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘I don’t 𝑤𝑎𝑛𝑡 them.’","/str","/ev",{"*":".^.c-3","flg":4},"ev","str","^‘Ah, I see you’ve barely changed…’","/str","/ev",{"*":".^.c-4","flg":4},"ev","str","ev","str","^Wouldn’t dream of it. T","/str",{"f()":"useful"},"out","/ev","/str","/ev",{"*":".^.c-5","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n","^‘Oh, 𝑝𝑙𝑒𝑎𝑠𝑒.’ ","#","^CLASS: scimi","/#","\n",["ev","str","ev","str","^I don’t.","/str",{"f()":"useful"},"out","/ev","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.^.^.g-2"},{"#f":5}]}],{"#f":5}],"c-4":["^ ","#","^CLEAR","/#","\n","^‘Neither have you.’ ","#","^CLASS: scimi","/#","\n",["ev","str","ev","str","^Listen, t","/str",{"f()":"useful"},"out","/ev","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.^.^.g-2"},{"#f":5}]}],{"#f":5}],"c-5":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^‘Useful for what? What’s your game, Dagger? You’ve been on the run for… what, a hundred years? A hundred and ten? Hiding from Estoc, from the Council, from anyone with eyes, really – and now you’ve latched onto a random village kid and you expect me to believe it’s “just useful”?’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘…’","/str","/ev",{"*":".^.c-6","flg":4},{"c-6":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^‘Fine. Keep your secrets. But understand this:’ ","#","^CLASS: scimi","/#","\n","^Scimi’s voice drops, and there’s no theatre in it. ","#","^CLASS: serrie_pov","/#","\n","^‘Charlie is 𝑚𝑖𝑛𝑒.’ ","#","^CLASS: scimi","/#","\n",{"->":"v_ch5.verdict"},{"#f":5}]}],{"#f":1}],"motive":[["^‘Now, the important question.’ ","#","^CLASS: scimi","/#","\n","^His glow flickers, low and patient. ","#","^serrie_pov","/#","\n","^‘You’ve had every chance to ditch this body and run, so why are you still here? ","ev",{"VAR?":"scim_serrie"},3,">","/ev",[{"->":".^.b","c":true},{"b":["^I’ve taken over Charlie",{"->":".^.^.^.18"},null]}],[{"->":".^.b"},{"b":["^You hate me, presumably",{"->":".^.^.^.18"},null]}],"nop","^, Estoc ","ev",{"VAR?":"scim_serrie"},3,">","/ev",[{"->":".^.b","c":true},{"b":["^𝑑𝑒𝑓𝑖𝑛𝑖𝑡𝑒𝑙𝑦 ",{"->":".^.^.^.26"},null]}],"nop","^hates you, and Charlie’s about to become the most-hunted person on the continent. The Council presumably still has a bounty on you, if you haven’t miraculously gone on a redemption arc since my “punishment”. You know that, right? So… what’s the play?’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘That’s my business.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘Maybe I’m just enjoying the ride.’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘Maybe I’m here to make sure you don’t kill them.’","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^‘Maybe I just wanted help, and you’re convenient.’","/str","/ev",{"*":".^.c-3","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","^‘You’ve always been secretive…’ ","#","^CLASS: scimi","/#","\n",{"->":"v_ch5.verdict"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n",{"->":"v_ch5.why_no_ally"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n",{"->":"v_ch5.protection"},{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n",{"->":"v_ch5.help"},{"#f":5}]}],{"#f":1}],"why_no_ally":[["ev",{"VAR?":"scim_serrie"},2,"+",{"VAR=":"scim_serrie","re":true},"/ev","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","^‘Ha! Well, in that case, why didn’t you say hello back in the old days? We could’ve been allies!’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘It wasn’t the smartest play at the time. Even Sabre knew that eventually.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘I didn’t want to draw attention.’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘Thought you’d try to kill my wielder if I said hi.’","/str","/ev",{"*":".^.c-2","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scim_serrie"},1,"-",{"VAR=":"scim_serrie","re":true},"/ev","^‘Fine, fine. Always the same with you purple types – all pragmatism, no fun.’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","^‘And you do 𝑛𝑜𝑤?’ ","#","^CLASS: scimi","/#","\n",["ev","str","^‘Times change.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘…I miscalculated.’","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev",{"->":".^.^.^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scim_serrie"},1,"<","/ev",[{"->":".^.b","c":true},{"b":["^ ‘Twice over, by the look of it.’",{"->":".^.^.^.11"},null]}],"nop","^ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.^.^.g-0"},{"#f":5}]}],{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n","^‘Fair enough.’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":[{"->":"v_ch5.verdict"},{"#f":5}]}],{"#f":1}],"protection":[["ev",{"VAR?":"scim_serrie"},1,"-",{"VAR=":"scim_serrie","re":true},"/ev","ev",{"VAR?":"green"},1,"+",{"VAR=":"green","re":true},"/ev","^‘I’m offended you think I’d 𝑒𝑣𝑒𝑟 kill my own wielder.’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘Tell that to the last wielder you got killed.’","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["ev",{"VAR?":"scim_serrie"},1,"-",{"VAR=":"scim_serrie","re":true},"/ev","^‘Don’t you DARE speak about Revya like that!’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘Fine, fine. Sheesh!’","/str","/ev",{"*":".^.c-1","flg":4},{"c-1":["^ ","#","^CLEAR","/#","\n",{"->":"v_ch5.verdict"},{"#f":5}],"#f":5}]}],{"#f":1}],"help":[["ev",{"VAR?":"scim_serrie"},3,"+",{"VAR=":"scim_serrie","re":true},"/ev","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","^‘Hmm… Would check out, since I assume you were the one to make Charlie pick me up…’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘Guilty.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘I steered. They chose.’","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scim_serrie"},1,"+",{"VAR=":"scim_serrie","re":true},"/ev","^‘Knew it. You always were a manipulative little thing.’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","^‘We both know that’s a polite fiction.’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":[{"->":"v_ch5.verdict"},{"#f":5}]}],{"#f":1}],"verdict":["^Scimi is quiet for a long time. The glow at the bedside dims to a low, thinking red. ","#","^CLASS: serrie_pov","/#","\n","ev",{"VAR?":"scim_serrie"},4,">","/ev",[{"->":".^.b","c":true},{"b":["^ ",{"->":"v_ch5.deal"},{"->":".^.^.^.12"},null]}],[{"->":".^.b"},{"b":["^ ",{"->":"v_ch5.angry"},{"->":".^.^.^.12"},null]}],"nop","\n",{"#f":1}],"deal":[["^‘Alright. Here’s how this is going to go.’ ","#","^CLASS: scimi","/#","\n","^His glow brightens slightly, steady and businesslike.","\n","^‘You stay. You help. Charlie likes you – gods know why – and you’ve made my job easier more often than not. You keep them sharp; you keep them moving; your banter’s entertaining; and apparently you also have a useful habit of nudging them towards me when the chips are down. But.’ ","#","^CLASS: scimi","/#","\n","^His glow brightens sharply. ","#","^CLASS: serrie_pov","/#","\n","^‘If you ever try to pull them away from me – really 𝑡𝑟𝑦, not just nudge – I will personally get them to peel that necklace off their neck and throw you down a well. Are we clear?’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘Crystal.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘We’ll see…’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘And if I refuse?’","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^‘How about no?’","/str","/ev",{"*":".^.c-3","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"scim_serrie"},1,"+",{"VAR=":"scim_serrie","re":true},"/ev","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","^‘We will.’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n","^‘You have a bad time.’ ","#","^CLASS: scimi","/#","\n",["ev","str","^‘On second thought, I’ll take that deal.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘I’ll take my chances.’","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n",{"->":"v_ch5.no_deal"},{"->":".^.^.^.^.g-0"},{"#f":5}]}],{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n",{"->":"v_ch5.no_deal"},{"->":".^.^.g-0"},{"#f":5}],"g-0":[{"->":"v_ch5.sleep"},{"#f":5}]}],{"#f":1}],"no_deal":[["ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","^‘You know what your problem is, Dagger?’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘Enlighten me.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘…’","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"blue"},1,"+",{"VAR=":"blue","re":true},"/ev",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["^‘You think being clever is the same as being safe.’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘And you think being loud is the same as being right.’","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^‘So?’","/str","/ev",{"*":".^.c-3","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","^‘Touché. But I have the advantage here, so it doesn’t really matter, does it?’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":[{"->":"v_ch5.lobotomy_desc"},{"#f":5}]}],{"#f":1}],"angry":[["^‘See, here’s my problem: you’re useful. I’ll admit that – you keep them sharp, you keep them moving, and the banter’s been genuinely entertaining. But “useful” and “trustworthy” aren’t the same word, and I’ve been alive long enough to know the difference.’ ","#","^CLASS: scimi","/#","\n","^I don’t like where this is going… ","#","^CLASS: serrie_pov","/#","\n","^‘So, I’m going to “fix” you. Just a little!’  ","#","^CLASS: scimi","/#","\n","ev","str","^‘What are you talking about?’ ","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘What do you mean by that?’","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^‘Don’t you dare.’","/str","/ev",{"*":".^.c-2","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","^‘Oh, just a little something I’ve been thinking about, since I’ve had 𝑙𝑜𝑡𝑠 of time to think. You, see, I am 𝑣𝑒𝑟𝑦 powerful, and I was wondering… does that mean I can override other weapons’ wills, too? Not just mortals?’ ","#","^CLASS: scimi","/#","\n",["ev","str","^‘Shit.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘You can’t.’","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","^‘Can’t I? Let’s find out!’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":[{"->":"v_ch5.corrupt"},{"->":".^.^.^.^.g-0"},{"#f":5}]}],{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-2":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","^‘Oh, I dare.’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":[{"->":"v_ch5.lobotomy_desc"},{"#f":5}]}],{"#f":1}],"lobotomy_desc":[["^‘See, I’ve been thinking about how 𝑐𝑜𝑛𝑣𝑒𝑛𝑖𝑒𝑛𝑡 it’d be if you just… agreed with me. All the time. About everything. Wouldn’t that be lovely? No more sniping in the background. No more clever little nudges. Just one happy, harmonious household.’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘Tempting offer, but no.’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘Not happening!’","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev",{"->":".^.^.g-0"},{"#f":5}],"g-0":[{"->":"v_ch5.corrupt"},{"#f":5}]}],{"#f":1}],"corrupt":[["^‘Yeah, I figured you’d ","ev",{"CNT?":"v_ch5.lobotomy_desc"},"/ev",[{"->":".^.b","c":true},{"b":["^say that",{"->":".^.^.^.6"},null]}],[{"->":".^.b"},{"b":["^react that way",{"->":".^.^.^.6"},null]}],"nop","^. Good thing it’s not your decision!’ ","#","^CLASS: scimi","/#","\n","ev","str","^‘Wait, what?’","/str",{"CNT?":"v_ch5.lobotomy_desc"},"/ev",{"*":".^.c-0","flg":5},"ev","str","^‘Hey, we can still be friends, right?’","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","^‘Oh, of course! We’ll be 𝑔𝑟𝑒𝑎𝑡 friends… after this.’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.g-0"},{"#f":5}],"g-0":["ev","str","^‘I’m screwed, aren’t I?’","/str","/ev",{"*":".^.c-2","flg":4},{"c-2":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-1"},{"#f":5}],"#f":5}],"g-1":["^‘Very! Now hold still.’ ","#","^CLASS: scimi","/#","\n","^A horrible pressure rolls over me – nothing physical, but the sensation of a hand reaching past every defence I’ve spent a century building, pressing into something that was never supposed to be pressed. I may have made some poor choices… ","#","^CLASS: serrie_pov","/#","\n","ev","str","^‘Stop it!’","/str","/ev",{"*":".^.c-3","flg":4},{"c-3":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-2"},{"#f":5}],"#f":5}],"g-2":["^‘No.’ ","#","^CLASS: scimi","/#","\n","^I feel intense burning. It hurts… ","#","^CLASS: serrie_pov","/#","\n","ev","str","^<Resist.>","/str","/ev",{"*":".^.c-4","flg":4},"ev","str","^‘Help! Charlie!’","/str","/ev",{"*":".^.c-5","flg":4},"ev","str","^“Help! Estoc!”","/str","/ev",{"*":".^.c-6","flg":4},{"c-4":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"c-5":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","^They just murmur something into the pillow and roll over. ","#","^CLASS: serrie_pov","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"c-6":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"blue"},1,"+",{"VAR=":"blue","re":true},"/ev","^“Hel–”","\n","^The words die before Estoc notices anything. Dammit. ","#","^CLASS: serrie_pov","/#","\n",{"->":".^.^.^.g-3"},{"#f":5}],"#f":5}],"g-3":["^The pressure intensifies. I claw at it with everything I am, every clever little trick I’ve picked up over a century of hiding. ","#","^CLASS: serrie_pov","/#","\n","^It’s like clawing at the ocean. ","#","^CLASS: serrie_pov","/#","\n","ev","str","^<Keep resisting.>","/str","/ev",{"*":".^.c-7","flg":4},"ev","str","^‘Wait, wait, wait, let me make you an offer–’","/str","/ev",{"*":".^.c-8","flg":4},"ev","str","^<Stop fighting.>","/str","/ev",{"*":".^.c-9","flg":4},{"c-7":["^ ","#","^CLEAR","/#","\n",{"->":".^.^.^.g-4"},{"#f":5}],"c-8":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"yellow"},1,"+",{"VAR=":"yellow","re":true},"/ev","^‘No.’ ","#","^CLASS: scimi","/#","\n",["ev","str","^‘I can be useful to you, properly, willingly–’","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^‘Worth a shot…’","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ","#","^CLEAR","/#","\n","^‘You can be useful to me 𝑤𝑖𝑡ℎ 𝑎 𝑓𝑒𝑤 𝑎𝑑𝑗𝑢𝑠𝑡𝑚𝑒𝑛𝑡𝑠.’ ","#","^CLASS: scimi","/#","\n",{"->":".^.^.^.^.^.g-4"},{"#f":5}],"c-1":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev",{"->":".^.^.^.^.^.g-4"},{"#f":5}]}],{"#f":5}],"c-9":["^ ","#","^CLEAR","/#","\n","ev",{"VAR?":"red"},1,"+",{"VAR=":"red","re":true},"/ev","ev",{"VAR?":"purple"},1,"+",{"VAR=":"purple","re":true},"/ev","^The pressure increases. I let it. Somewhe 			"ŷȳýÿƴɏẏẙỳỵỷỹ",
			"ȥɀʐʑźżžƶᵶẑẓẕⱬ"
		].map(row => [...row]);

        (function(storyContent) {
            let story = new inkjs.Story(storyContent);
            let initialState;
            let choiceHistory = [];
            let vars = story.variablesState;
            
            // bound ink functions
            story.BindExternalFunction("cap", (string) => {
            	return capitalise(string);
            }, true);
            
            story.BindExternalFunction("glitch", (string) => {
				const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
				let new_text = "";

				for (const c of text) {
					if (c in alphabet) {
						let loc = alphabet.index(c);
						new_text += g_alphabet[loc][Math.floor(Math.random() * (g_alphabet[loc].length - 1))];
					} else {
						new_text += c;
					}
				}
            	return new_text;
            }, false);
            
            story.allowExternalFunctionFallbacks = true;

            // save slots
            const CHOICE_HISTORY_KEY = 'choiceHistory';
            const SLOT_SORT_KEY = 'slot-sort';
            const SLOT_INDEX_KEY = 'save-index';
            const DEFAULT_SAVE_SLOT = 1;

            // cached animation pref — re-evaluated on media query change rather than on every paragraph
            let animationEnabled = window.matchMedia('(prefers-reduced-motion: no-preference)').matches;
            window.matchMedia('(prefers-reduced-motion: no-preference)').addEventListener('change', e => {
                animationEnabled = e.matches;
            });

            // tags
            let currentAudio = null;
            let currentAudioLoop = null;
            let globalTagTheme;
            let globalTags = story.globalTags;
            if (globalTags) {
                for (let i=0; i < globalTags.length; i++) {
                    let globalTag = globalTags[i];
                    let splitTag = splitPropertyTag(globalTag);
                    if (splitTag && splitTag.property == "theme") {
                        globalTagTheme = splitTag.val;
                    }
                    else if (splitTag && splitTag.property == "author") {
                        let byline = document.querySelector('.byline');
                        byline.innerHTML = "by "+splitTag.val;
                    }
                }
            }

            let storyContainer = document.querySelector('#story');
            let outerScrollContainer = document.querySelector('.outerContainer');

            // cache button refs once instead of re-querying per render
            const backEl = document.getElementById("back");

            setupTheme(globalTagTheme);
            story.ResetState();
            vars = story.variablesState;

            // tag dispatch table — replaces the if/else-if chain in continueStory
            const TAG_HANDLERS = {
                AUDIO(val) {
                    if (currentAudio) currentAudio.pause();
                    currentAudio = new Audio(val);
                    currentAudio.play();
                },
                AUDIOLOOP(val) {
                    if (currentAudioLoop) currentAudioLoop.pause();
                    currentAudioLoop = new Audio(val);
                    currentAudioLoop.play();
                    currentAudioLoop.loop = true;
                },
                IMAGE(val, ctx) {
                    const imageElement = document.createElement('img');
                    imageElement.src = val;
                    storyContainer.appendChild(imageElement);
                    imageElement.onload = () => {
                        console.log(`scrollingto ${ctx.previousBottomEdge}`);
                        scrollDown(ctx.previousBottomEdge);
                    };
                    showAfter(ctx.delay, imageElement);
                    ctx.delay += 200.0;
                },
                LINK(val) { window.location.href = val; },
                LINKOPEN(val) { window.open(val); },
                BACKGROUND(val) { outerScrollContainer.style.backgroundImage = 'url(' + val + ')'; },
                CLASS(val, ctx) { ctx.customClasses.push(val); }
            };

            // reload button is only enabled if default save slot exists
            setupButtons(!!window.localStorage.getItem(getSaveName(DEFAULT_SAVE_SLOT)));

            // resume from autosave if there's a history to replay; otherwise, start fresh
            const autosaved = readChoiceList(CHOICE_HISTORY_KEY);
            if (autosaved && autosaved.length > 0) {
                loadFromKey(autosaved);
            } else {
                choiceHistory = [];
                continueStory(true);
            }

            function continueStory(firstTime) {
                let delay = 0.0;
                let previousBottomEdge = firstTime ? 0 : contentBottomEdgeY();
                if (backEl.getAttribute("disabled") && choiceHistory.length > 0) {
                    backEl.removeAttribute("disabled");
                }

                // pull paragraphs until the next choice point or end of flow.
                while (story.canContinue) {
                    let paragraphText = story.Continue();
                    let tags = story.currentTags;

                    // formatting + tag processing
                    let customClasses = [];
                    const ctx = { delay, previousBottomEdge, customClasses };
                    for (let i=0; i<tags.length; i++) {
                        let tag = tags[i];
                        let splitTag = splitPropertyTag(tag);
                        if (splitTag) {
                            const prop = splitTag.property.toUpperCase();
                            const handler = TAG_HANDLERS[prop];
                            if (handler) handler(splitTag.val, ctx);
                        }

                        // clearing
                        else if (tag == "CLEAR" || tag == "RESTART") {
                            removeAll("p");
                            removeAll("img");
                            setVisible(".header", false);
                            if (tag == "RESTART") {
                                restart();
                                return;
                            }
                        }
                    }
                    delay = ctx.delay;
                    if (paragraphText.trim().length == 0) {
                        continue;
                    }
                    let paragraphElement = document.createElement('p');
                    paragraphElement.innerHTML = paragraphText;
                    storyContainer.appendChild(paragraphElement);
                    for (let i=0; i<customClasses.length; i++) {
                        paragraphElement.classList.add(customClasses[i]);
                    }
                    showAfter(delay, paragraphElement);
                    delay += 200.0;
                }

                // render choices
                story.currentChoices.forEach(function(choice) {
                    let choiceTags = choice.tags;
                    let customClasses = [];
                    let isClickable = true;
                    for (let i=0; i<choiceTags.length; i++) {
                        let choiceTag = choiceTags[i];
                        let splitTag = splitPropertyTag(choiceTag);
                        if (splitTag) splitTag.property = splitTag.property.toUpperCase();
                        if (choiceTag.toUpperCase() == "UNCLICKABLE") {
                            isClickable = false;
                        }
                        if (splitTag && splitTag.property == "CLASS") {
                            customClasses.push(splitTag.val);
                        }
                    }
                    let choiceParagraphElement = document.createElement('p');
                    choiceParagraphElement.classList.add("choice");
                    for (let i=0; i<customClasses.length; i++) {
                        choiceParagraphElement.classList.add(customClasses[i]);
                    }
                    if (isClickable) {
                        choiceParagraphElement.innerHTML = `<a href='#'>${choice.text}</a>`
                    } else {
                        choiceParagraphElement.innerHTML = `<span class='unclickable'>${choice.text}</span>`
                    }
                    storyContainer.appendChild(choiceParagraphElement);
                    showAfter(delay, choiceParagraphElement);
                    delay += 200.0;

                    if (isClickable) {
                        let choiceAnchorEl = choiceParagraphElement.querySelector("a");
                        choiceAnchorEl.addEventListener("click", function(event) {
                            event.preventDefault();
                            // read layout once before mutating, to minimise forced reflow churn
                            const lockedHeight = contentBottomEdgeY();
                            storyContainer.style.height = lockedHeight + "px";
                            removeAll(".choice");

                            // record + persist the choice
                            choiceHistory.push(choice.index);
                            persistHistory();

                            // advance Ink and render the next chunk
                            story.ChooseChoiceIndex(choice.index);
                            continueStory();
                        });
                    }
                });
                storyContainer.style.height = "";
                if (!firstTime) {
                    scrollDown(previousBottomEdge);
                }
            }

            function replayChoices(choices) {
                story.ResetState();
                vars = story.variablesState;
                for (let i = 0; i < choices.length; i++) {

                    // burn through the paragraphs of the current passage silently, processing only the tags we need to preserve persistent state
                    while (story.canContinue) {
                        story.Continue();
                        const tags = story.currentTags;
                        for (let i = 0; i < tags.length; i++) {
                            let tag = tags[i];
                            let splitTag = splitPropertyTag(tag);
                            if (splitTag) splitTag.property = splitTag.property.toUpperCase();

                            // restore the most recent background image set by the story
                            if (splitTag && splitTag.property === "BACKGROUND") {
                                outerScrollContainer.style.backgroundImage = 'url(' + splitTag.val + ')';
                            }

                            // restore the currently-playing background music loop
                            else if (splitTag && splitTag.property === "AUDIOLOOP") {
                                if (currentAudioLoop) {
                                    currentAudioLoop.pause();
                                }
                                currentAudioLoop = new Audio(splitTag.val);
                                currentAudioLoop.play();
                                currentAudioLoop.loop = true;
                            }

                            // hide the header if any CLEAR/RESTART happened in this playthrough
                            else if (tag == "CLEAR" || tag == "RESTART") {
                                setVisible(".header", false);
                            }
                        }
                    }

                    // pick the recorded choice and move into the next passage
                    story.ChooseChoiceIndex(choices[i]);
                }
            }

            function persistHistory() {
                writeChoiceList(CHOICE_HISTORY_KEY, choiceHistory);
            }

            function writeChoiceList(key, list) {
                try {
                    window.localStorage.setItem(key, JSON.stringify(list));
                } catch (e) {
                    console.warn("Couldn't write save", key, e);
                }
            }

            function readChoiceList(key) {
                try {
                    let raw = window.localStorage.getItem(key);
                    if (!raw) return null;
                    let parsed = JSON.parse(raw);
                    return Array.isArray(parsed) ? parsed : null;
                } catch (e) {
                    console.warn("Couldn't read save", key, e);
                    return null;
                }
            }

            function loadFromKey(slotKey) {
                if (slotKey === null) return false;
                choiceHistory = slotKey;
                persistHistory();
                if (!backEl.getAttribute("disabled") && choiceHistory.length === 0) {
                    backEl.setAttribute("disabled", "disabled");
                }
                clearDom();
                replayChoices(choiceHistory);
                continueStory(true);
                return true;
            }

            function restart() {
                backEl.setAttribute("disabled", "disabled");
                story.ResetState();
            	vars = story.variablesState;
                choiceHistory = [];
                persistHistory();
                clearDom();
                setVisible(".header", true);
                continueStory(true);
                outerScrollContainer.scrollTo(0, 0);
            }

            function clearDom() {
                removeAll("p");
                removeAll("img");
            }

            function showAfter(delay, el) {
                if (animationEnabled) {
                    el.classList.add("hide");
                    setTimeout(function() { el.classList.remove("hide") }, delay);
                } else {
                    el.classList.remove("hide");
                }
            }

            function scrollDown(previousBottomEdge) {
                if (!animationEnabled) {
                    return;
                }
                let target = previousBottomEdge;
                let limit = outerScrollContainer.scrollHeight - outerScrollContainer.clientHeight;
                if (target > limit) {
                    target = limit;
                }
                let start = outerScrollContainer.scrollTop;
                let dist = target - start;
                let duration = 300 + 300*dist/100;
                let startTime = null;

                function step(time) {
                    if (startTime == null) {
                        startTime = time;
                    }
                    let t = (time-startTime) / duration;
                    let lerp = 3*t*t - 2*t*t*t;
                    outerScrollContainer.scrollTo(0, (1.0-lerp)*start + lerp*target);
                    if (t < 1) {
                        requestAnimationFrame(step);
                    }
                }

                requestAnimationFrame(step);
            }

            function contentBottomEdgeY() {
                let bottomElement = storyContainer.lastElementChild;
                return bottomElement ? bottomElement.offsetTop + bottomElement.offsetHeight : 0;
            }

            function removeAll(selector) {
                const allElements = storyContainer.querySelectorAll(selector);
                for (const el of allElements) {
                    el.remove();
                }
            }

            function setVisible(selector, visible) {
                const allElements = storyContainer.querySelectorAll(selector);
                for (const el of allElements) {
                    if (!visible) {
                        el.classList.add("invisible");
                    } else {
                        el.classList.remove("invisible");
                    }
                }
            }

            function splitPropertyTag(tag) {
                let propertySplitIdx = tag.indexOf(":");
                if (propertySplitIdx != -1) {
                    let property = tag.substr(0, propertySplitIdx).trim();
                    let val = tag.substr(propertySplitIdx+1).trim();
                    return {property: property, val: val};
                }
                return null;
            }

            function setupTheme(globalTagTheme) {
                let savedTheme;
                try {
                    savedTheme = window.localStorage.getItem('theme');
                } catch (e) {
                    console.debug("Couldn't load saved theme");
                }
                let browserDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                if (savedTheme === "dark" || (!savedTheme && globalTagTheme === "dark") || (!savedTheme && !globalTagTheme && browserDark)) {
                    document.body.classList.add("dark");
                }
            }

            function getSaveName(slot) {
                return "save-slot-" + String(slot);
            }

            function readSlotIndex() {
                try {
                    let raw = window.localStorage.getItem(SLOT_INDEX_KEY);
                    return raw ? JSON.parse(raw) : [];
                } catch (e) { return []; }
            }

            function writeSlotIndex(ids) {
                try {
                    window.localStorage.setItem(SLOT_INDEX_KEY, JSON.stringify(ids));
                } catch (e) { console.warn("Couldn't write slot index", e); }
            }

            function readSlot(id) {
                try {
                    let raw = window.localStorage.getItem(getSaveName(id));
                    return raw ? JSON.parse(raw) : null;
                } catch (e) { return null; }
            }

            function writeSlot(id, payload) {
                try {
                    window.localStorage.setItem(getSaveName(id), JSON.stringify(payload));
                } catch (e) { console.warn("Couldn't write slot", id, e); }
            }

            // stats helpers
            function toString(item) {
                return String(vars.$(item));
            }

            function capitalise(val) {
                return val.charAt(0).toUpperCase() + val.slice(1);
            }

            function stringifyItem(item) {
                switch (item) {
                    case "serrie":
                        return serrieItem();
                    case "money":
                        return "Money (" + toString("riches") + "x)";
                    default:
                        return capitalise(item);
                }
            }

            function serrieItem() {
                if (vars.$("serrie_known")) {
                    if (vars.$("corr_serrie")) {
                        return "S̵̖̓e̶̥͠r̷͇̓r̷̲̀.̷͚̋ ̵̩͘D̴̨̂ȧ̸̹g̷̢̑g̸͕̔è̸͎r̸͔̓";
                    } else {
                        return "Serr. Dagger";
                    }
                } else {
                    return capitalise(toString("p_col")) + " Pendant";
                }
            }

            function wieldCol(weapon) {
                if (weapon.includes(" & ")) {
                    const weapons = weapon.split(" & ");
                    return colour(mixWeaponCols(weapons[0], weapons[1]));
                } else {
                    return weaponCol(weapon);
                }
            }

            function weaponCol(weapon) {
                return colour(getWeaponCol(weapon));
            }

            function getWeaponCol(weapon) {
                let prefix;
                switch (weapon.toLowerCase()) {
                    case "estoc":
                        prefix = "e";
                        break;
                    case "scimitar":
                        prefix = "s";
                        break;
                    case "recurve":
                        prefix = "r";
                        break;
                    default:
                        prefix = "p";
                }
                return toString(prefix + "_col");
            }

            function mixWeaponCols(weapon1, weapon2) {
                const i1 = COLOUR_INDEX[getWeaponCol(weapon1)];
                const i2 = COLOUR_INDEX[getWeaponCol(weapon2)];
                const diff = i1 - i2;
                let mixed = Math.floor((i1 + i2) / 2);
                let halfLen = Math.floor(COLOURS.length / 2);
                if (diff > halfLen || -diff > halfLen) {
                    mixed += halfLen;
                }
                return COLOURS[mixed];
            }

            function statRGB(red, yellow, green, blue, purple) {
                const most = Math.max(red, yellow, green, blue, purple);
                let fixedRed = red;
                let fixedYellow = yellow;
                let fixedGreen = green;
                let fixedBlue = blue;
                let fixedPurple = purple;

                if (most == red) fixedRed *= 1.2;
                if (most == yellow) fixedYellow *= 1.2;
                if (most == green) fixedGreen *= 1.2;
                if (most == blue) fixedBlue *= 1.2;
                if (most == purple) fixedPurple *= 1.2;

                const rShare = fixedRed + fixedYellow + fixedPurple;
                const gShare = fixedGreen + fixedYellow;
                const bShare = fixedBlue + fixedPurple;
                return getRGB(rShare, gShare, bShare);
            }

            function getRGB(rShare, gShare, bShare) {
                const multiplier = 255 / Math.max(rShare, gShare, bShare);
                const r = Math.round(rShare * multiplier);
                const g = Math.round(gShare * multiplier);
                const b = Math.round(bShare * multiplier);
                return `rgb(${r}, ${g}, ${b})`;
            }

            function colour(col) {
                const s = COLOUR_SHARES[col];
                return s ? getRGB(s[0], s[1], s[2]) : getRGB(0, 0, 0);
            }

            // cache stat DOM refs once — populated on first updateStats call
            let statEls = null;

            function updateStats() {
                if (!statEls) {
                    statEls = {
                        name: document.getElementById("stat-name"),
                        wielding: document.getElementById("stat-wielding"),
                        inventory: document.getElementById("stat-inventory"),
                        wearing: document.getElementById("stat-wearing"),
                        red: document.getElementById("stat-red"),
                        yellow: document.getElementById("stat-yellow"),
                        green: document.getElementById("stat-green"),
                        blue: document.getElementById("stat-blue"),
                        purple: document.getElementById("stat-purple")
                    };
                }

                // name
                const red = vars.$("red");
                const yellow = vars.$("yellow");
                const green = vars.$("green");
                const blue = vars.$("blue");
                const purple = vars.$("purple");
                statEls.name.textContent = vars.$("name");
                statEls.name.style.color = statRGB(red, yellow, green, blue, purple);

                // wielding
                const wielding = vars.$("wielding");
                let wieldColour;
                statEls.wielding.textContent = wielding;
                if (wielding == "None") {
                    wieldColour = document.body.classList.contains("dark") ? "#ffffff" : "#000000";
                } else {
                    wieldColour = wieldCol(wielding);
                }
                statEls.wielding.style.color = wieldColour;

                // inventory
                const inv = toString("inv").split(", ");
                statEls.inventory.textContent = "";
                inv.forEach((item, i) => {
                    const span = document.createElement("span");
                    span.textContent = stringifyItem(item);
                    if (item == "estoc" || item == "scimitar" || item == "recurve" || (item == "serrie" && vars.$("serrie_known"))) {
                        span.style.color = weaponCol(item);
                    }
                    statEls.inventory.appendChild(span);
                    if (i < inv.length - 1) {
                        statEls.inventory.appendChild(document.createTextNode(", "));
                    }
                });

                // other stats
                statEls.wearing.textContent = vars.$("wearing");
                statEls.red.textContent = red;
                statEls.yellow.textContent = yellow;
                statEls.green.textContent = green;
                statEls.blue.textContent = blue;
                statEls.purple.textContent = purple;
            }

            function setupButtons(hasSave) {
                let saveSlot;

                // REWIND: hard reset back to the very beginning
                let rewindEl = document.getElementById("rewind");
                rewindEl.addEventListener("click", function(event) {
                    restart();
                });

                // BACK: pop the last choice and replay everything before it
                if (choiceHistory.length === 0) {
                    backEl.setAttribute("disabled", "disabled");
                }
                backEl.addEventListener("click", function(event) {
                    if (backEl.getAttribute("disabled")) {
                        return;
                    }
                    choiceHistory.pop();
                    persistHistory();
                    if (choiceHistory.length === 0) {
                        backEl.setAttribute("disabled", "disabled");
                    }
                    clearDom();
                    replayChoices(choiceHistory);
                    continueStory(true);
                });

                // THEME SWITCH: toggle dark/light and persist the choice
                let themeSwitchEl = document.getElementById("theme-switch");
                themeSwitchEl.addEventListener("click", function(event) {
                    document.body.classList.add("switched");
                    document.body.classList.toggle("dark");
                    try {
                        localStorage.setItem('theme', document.body.classList.contains("dark") ? "dark" : "light");
                    } catch (e) {}
                });

                // save menu
                let modalEl = document.getElementById("slot-modal");
                let listEl = document.getElementById("slot-list");
                let emptyEl = document.getElementById("slot-empty");
                let newEl = document.getElementById("slot-new");
                let labelEl = document.getElementById("slot-new-label");
                let confirmEl = document.getElementById("slot-new-confirm");
                let template = document.getElementById("slot-row-template");
                let statsModalEl = document.getElementById("stats-modal");

                // every modal lives in this list — opening any modal closes the others
                let allModals = [modalEl, statsModalEl];

                function closeAllModals() {
                    allModals.forEach(function (m) { m.classList.add("hidden"); });
                    labelEl.value = "";
                }

                function openSaveModal() {
                    closeAllModals();
                    renderSlots();
                    modalEl.classList.remove("hidden");
                }

                function closeSaveModal() {
                    modalEl.classList.add("hidden");
                    labelEl.value = "";
                }

                function openStatsModal() {
                    closeAllModals();
                    updateStats();
                    statsModalEl.classList.remove("hidden");
                }

                function closeStatsModal() {
                    statsModalEl.classList.add("hidden");
                }

                function formatDate(date) {
                    return date.toLocaleTimeString(navigator.language, {
                        day: '2-digit',
                        month: 'numeric',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }

                function sortSlots(slots, mode) {
                    let copy = slots.slice();
                    switch (mode) {
                        case "oldest":
                            copy.sort(function (a, b) { return a.savedAt - b.savedAt; });
                            break;
                        case "label":
                            copy.sort(function (a, b) {
                                let la = (a.label || "").toLowerCase();
                                let lb = (b.label || "").toLowerCase();
                                // unnamed saves sink to the bottom so the A→Z list stays clean
                                if (!la && lb) return 1;
                                if (la && !lb) return -1;
                                if (la === lb) return b.savedAt - a.savedAt;
                                return la < lb ? -1 : 1;
                            });
                            break;
                        case "progress":
                            copy.sort(function (a, b) {
                                if (b.choiceCount !== a.choiceCount) return b.choiceCount - a.choiceCount;
                                return b.savedAt - a.savedAt;
                            });
                            break;
                        default:
                            copy.sort(function (a, b) { return b.savedAt - a.savedAt; });
                            break;
                    }
                    return copy;
                }

                let sortEl = document.getElementById("slot-sort");

                // restore persisted sort choice
                try {
                    let savedSort = window.localStorage.getItem(SLOT_SORT_KEY);
                    if (savedSort) sortEl.value = savedSort;
                } catch (e) {}

                function renderSlots() {
                    listEl.innerHTML = "";
                    let ids = readSlotIndex();
                    let slots = ids
                    .map(function (id) {
                        let s = readSlot(id);
                        return s ? Object.assign({ id: id }, s) : null;
                    })
                    .filter(Boolean);
                    emptyEl.classList.toggle("hidden", slots.length > 0);
                    slots = sortSlots(slots, sortEl.value);

                    slots.forEach(function (slot) {
    					let row = template.content.firstElementChild.cloneNode(true);
    					row.dataset.slotId = slot.id;
    					let nameEl = row.querySelector(".slot-row-name");
    					nameEl.textContent = slot.name || "";
    					nameEl.style.color = slot.colour;
    					row.querySelector(".slot-row-label").textContent = slot.label || "(unnamed)";
    					row.querySelector(".slot-row-knot").textContent = slot.knot || "";
    					row.querySelector(".slot-row-choices").textContent = slot.choiceCount + " choices";
    					row.querySelector(".slot-row-date").textContent = formatDate(new Date(slot.savedAt));
    					listEl.appendChild(row);
					});
                }

                sortEl.addEventListener("change", function () {
                    try {
                        window.localStorage.setItem(SLOT_SORT_KEY, sortEl.value);
                    } catch (e) {}
                    renderSlots();
                });
                document.getElementById("save").addEventListener("click", openSaveModal);
                document.getElementById("stats").addEventListener("click", openStatsModal);

                // close on backdrop or ✕
                modalEl.addEventListener("click", function (e) {
                    if (e.target.hasAttribute("data-close")) closeSaveModal();
                });
                statsModalEl.addEventListener("click", function (e) {
                    if (e.target.hasAttribute("data-close")) closeStatsModal();
                });

                // "New Save" inside the modal
                confirmEl.addEventListener("click", function () {
                    createSlot(labelEl.value.trim());
                    labelEl.value = "";
                    renderSlots();
                });

                // delegated row actions (Load / Rename / Delete)
                listEl.addEventListener("click", function (e) {
                    let btn = e.target.closest("[data-action]");
                    if (!btn) return;
                    let row = btn.closest(".slot-row");
                    let id  = row.dataset.slotId;

                    if (btn.dataset.action === "load") {
                        loadSlot(id);
                        closeSaveModal();
                    } else if (btn.dataset.action === "delete") {
                        if (confirm("Delete this save?")) {
                            deleteSlot(id);
                            renderSlots();
                        }
                    } else if (btn.dataset.action === "rename") {
                        let next = prompt("New label:", readSlot(id).label || "");
                        if (next !== null) {
                            let slot = readSlot(id);
                            slot.label = next;
                            writeSlot(id, slot);
                            renderSlots();
                        }
                    }
                });

                function getLatestChapter() {
                    const visits = story.state._visitCounts;
                    const chapters = [];
                    const entries = visits instanceof Map ? visits.entries() : Object.entries(visits);
                    for (const [path, count] of entries) {
                        if (count > 0) {
                            const match = path.match(/^(?:[a-z]+_)?ch(\d+)(?:\.|$)/);
                            if (match) chapters.push(parseInt(match[1], 10));
                        }
                    }
                    return chapters.length ? Math.max(...chapters) : 0;
                }

                function createSlot(label) {
    				const now = Date.now();
    				const id = String(now);
    				const choicePath = story.currentChoices[0].sourcePath.split(".");
    				const currKnot = "ch" + String(getLatestChapter()) + "." + choicePath[1];
    				writeSlot(id, {
        				history: choiceHistory.slice(),
        				savedAt: now,
        				label: label || "",
        				knot: currKnot || "",
        				choiceCount: choiceHistory.length,
        				name: vars.$("name"),
        				colour: statRGB(vars.$("red"), vars.$("yellow"), vars.$("green"), vars.$("blue"), vars.$("purple"))
    				});
    				let index = readSlotIndex();
    				index.unshift(id);
    				writeSlotIndex(index);
    				return id;
				}

                function deleteSlot(id) {
                    window.localStorage.removeItem(getSaveName(id));
                    writeSlotIndex(readSlotIndex().filter(function (x) { return x !== id; }));
                }

                function loadSlot(id) {
                    const slot = readSlot(id);
                    if (!slot || !Array.isArray(slot.history)) return false;
                    return loadFromKey(slot.history);
                }
            }
        })(storyContent);
    </script>
</body>
</html>
